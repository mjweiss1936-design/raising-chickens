<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feed the Chickens - 2.5D Farm</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: 'Courier New', Courier, monospace;
            color: white;
        }
        #game-container {
            position: relative;
        }
        canvas {
            background-color: #87CEEB; /* Sky blue base */
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
            border: 4px solid #333;
            border-radius: 8px;
            display: block;
            image-rendering: pixelated;
        }
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            pointer-events: none;
            text-shadow: 2px 2px 0px black;
        }
        h1 {
            margin: 0 0 5px 0;
            font-size: 28px;
            color: #FFD700;
        }
        p {
            margin: 0;
            font-size: 16px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div id="game-container">
    <div id="ui">
        <h1>Farm Yard</h1>
        <p>Press <strong>SPACEBAR</strong> to drop a bag of corn!</p>
    </div>
    <canvas id="gameCanvas" width="800" height="600"></canvas>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    // 2.5D Boundaries
    const horizonY = 220; // Where the sky meets the grass
    const playArea = {
        minX: 20,
        maxX: canvas.width - 20,
        minY: horizonY + 20,
        maxY: canvas.height - 20
    };

    // Game Entities
    let chickens = [];
    let foods = [];
    let bags = [];

    // Helper: Draw a shadow for 2.5D depth
    function drawShadow(x, y, radiusX, radiusY) {
        ctx.fillStyle = 'rgba(0, 0, 0, 0.2)';
        ctx.beginPath();
        ctx.ellipse(x, y, radiusX, radiusY, 0, 0, Math.PI * 2);
        ctx.fill();
    }

    class CornBag {
        constructor(x, y) {
            this.x = x;
            this.y = y; // Ground depth position
            this.z = 400; // Height in the sky
            this.vz = -2; // Vertical velocity
            this.gravity = 0.4;
            this.active = true;
        }

        update() {
            this.vz -= this.gravity;
            this.z += this.vz;

            // Hit the ground
            if (this.z <= 0) {
                this.z = 0;
                this.burst();
            }
        }

        burst() {
            this.active = false;
            // Spawn corn pellets in an oval shape to fake 3D scatter
            for (let i = 0; i < 12; i++) {
                let angle = Math.random() * Math.PI * 2;
                let radiusX = Math.random() * 40;
                let radiusY = Math.random() * 15; // Flatter on the Y axis for perspective
                
                foods.push(new Food(
                    this.x + Math.cos(angle) * radiusX,
                    this.y + Math.sin(angle) * radiusY
                ));
            }
        }

        draw() {
            // Shadow grows as it gets closer to ground
            let shadowScale = Math.max(0.1, 1 - (this.z / 400));
            drawShadow(this.x, this.y, 15 * shadowScale, 6 * shadowScale);

            // Draw Bag
            ctx.save();
            ctx.translate(this.x, this.y - this.z); // Render height using Y-Z
            
            // Sack body
            ctx.fillStyle = '#8b5a2b';
            ctx.beginPath();
            ctx.moveTo(-12, 15);
            ctx.lineTo(12, 15);
            ctx.lineTo(15, -10);
            ctx.lineTo(-15, -10);
            ctx.closePath();
            ctx.fill();

            // Sack tie at the top
            ctx.fillStyle = '#6b4423';
            ctx.beginPath();
            ctx.moveTo(-8, -10);
            ctx.lineTo(8, -10);
            ctx.lineTo(12, -18);
            ctx.lineTo(-12, -18);
            ctx.closePath();
            ctx.fill();

            // A little label
            ctx.fillStyle = '#eaddca';
            ctx.fillRect(-6, -2, 12, 8);
            
            ctx.restore();
        }
    }

    class Food {
        constructor(x, y) {
            this.x = x;
            this.y = y;
            this.consumed = false;
        }

        update() {
            // Static, does nothing
        }

        draw() {
            ctx.fillStyle = '#ffcc00'; // Corn yellow
            ctx.beginPath();
            // Draw as flat oval for perspective
            ctx.ellipse(this.x, this.y, 4, 2, 0, 0, Math.PI * 2);
            ctx.fill();
        }
    }

    class Chicken {
        constructor(x, y) {
            this.x = x;
            this.y = y;
            this.z = 0; // Stays on ground
            this.facingDir = Math.random() > 0.5 ? 1 : -1; // 1 = right, -1 = left
            this.speed = 1 + Math.random() * 1;
            this.size = 18;
            
            this.state = 'wander'; // 'wander', 'seek', 'peck'
            this.targetFood = null;
            
            this.wanderTimer = Math.random() * 60;
            this.peckFrames = 0;
            this.maxPeckFrames = 15;
            this.walkCycle = 0;
        }

        update() {
            let isMoving = false;

            if (this.state === 'peck') {
                this.peckFrames--;
                if (this.peckFrames <= 0) {
                    if (this.targetFood && !this.targetFood.consumed) {
                        this.targetFood.consumed = true;
                    }
                    this.state = 'wander';
                    this.targetFood = null;
                    this.wanderTimer = 20;
                }
                return; // Stop moving while pecking
            }

            if (this.state === 'wander') {
                // Scan for nearest food
                let closest = null;
                let minDist = Infinity;

                for (let f of foods) {
                    if (f.consumed) continue;
                    let dx = f.x - this.x;
                    let dy = f.y - this.y;
                    // Adjust distance calculation to favor horizontal movement slightly (perspective fake)
                    let dist = Math.sqrt(dx * dx + (dy * 2) * (dy * 2));

                    if (dist < 400 && dist < minDist) {
                        minDist = dist;
                        closest = f;
                    }
                }

                if (closest) {
                    this.targetFood = closest;
                    this.state = 'seek';
                } else {
                    this.wanderTimer--;
                    if (this.wanderTimer <= 0) {
                        // Pick random target direction
                        this.targetX = this.x + (Math.random() - 0.5) * 100;
                        this.targetY = this.y + (Math.random() - 0.5) * 60;
                        
                        // Constrain to play area
                        this.targetX = Math.max(playArea.minX, Math.min(playArea.maxX, this.targetX));
                        this.targetY = Math.max(playArea.minY, Math.min(playArea.maxY, this.targetY));
                        
                        this.wanderTimer = 60 + Math.random() * 60;
                    }

                    // Move towards wander target
                    if (this.targetX && this.targetY) {
                        this.moveTo(this.targetX, this.targetY);
                        isMoving = true;
                    }
                }
            }

            if (this.state === 'seek') {
                if (!this.targetFood || this.targetFood.consumed) {
                    this.state = 'wander';
                    this.targetFood = null;
                } else {
                    let dx = this.targetFood.x - this.x;
                    let dy = this.targetFood.y - this.y;
                    let dist = Math.sqrt(dx * dx + dy * dy);

                    if (dist <= 6) {
                        this.state = 'peck';
                        this.peckFrames = this.maxPeckFrames;
                    } else {
                        this.moveTo(this.targetFood.x, this.targetFood.y);
                        isMoving = true;
                    }
                }
            }

            // Animate legs if moving
            if (isMoving) {
                this.walkCycle += 0.2 * this.speed;
            } else {
                this.walkCycle = 0;
            }
        }

        moveTo(tx, ty) {
            let dx = tx - this.x;
            let dy = ty - this.y;
            let dist = Math.sqrt(dx * dx + dy * dy);
            
            if (dist > 1) {
                this.x += (dx / dist) * this.speed;
                this.y += (dy / dist) * (this.speed * 0.7); // Move slower on Y axis for perspective
            }

            // Face movement direction
            if (dx > 0.5) this.facingDir = 1;
            if (dx < -0.5) this.facingDir = -1;
        }

        draw() {
            drawShadow(this.x, this.y, 12, 5);

            ctx.save();
            ctx.translate(this.x, this.y);
            ctx.scale(this.facingDir, 1); // Flip horizontally based on direction

            // Pecking animation - tilt the chicken forward
            if (this.state === 'peck') {
                let progress = this.peckFrames / this.maxPeckFrames;
                // Dip head down
                let angle = Math.sin(progress * Math.PI) * (Math.PI / 4);
                ctx.rotate(angle);
            }

            // Bouncing walk cycle
            let bounceY = -Math.abs(Math.sin(this.walkCycle)) * 3;
            ctx.translate(0, bounceY);

            // Draw Legs
            ctx.strokeStyle = '#ffa500';
            ctx.lineWidth = 2;
            ctx.beginPath();
            
            let legSwing1 = Math.sin(this.walkCycle) * 5;
            let legSwing2 = Math.sin(this.walkCycle + Math.PI) * 5;

            // Back leg
            ctx.moveTo(-4, 5);
            ctx.lineTo(-4 + legSwing1, 15);
            // Front leg
            ctx.moveTo(4, 5);
            ctx.lineTo(4 + legSwing2, 15);
            ctx.stroke();

            // Draw Body (Main Triangle)
            ctx.fillStyle = '#ffffff'; // White body
            ctx.beginPath();
            ctx.moveTo(this.size, 0); // Front chest
            ctx.lineTo(-this.size * 0.8, -this.size * 0.7); // Tail top
            ctx.lineTo(-this.size * 0.6, this.size * 0.5);  // Belly bottom
            ctx.closePath();
            ctx.fill();
            
            // Body Outline
            ctx.strokeStyle = '#dddddd';
            ctx.lineWidth = 1;
            ctx.stroke();

            // Wing (Smaller triangle inside)
            ctx.fillStyle = '#f0f0f0';
            ctx.beginPath();
            ctx.moveTo(0, 0);
            ctx.lineTo(-10, -5);
            ctx.lineTo(-8, 5);
            ctx.closePath();
            ctx.fill();

            // Draw Beak
            ctx.fillStyle = '#ffa500';
            ctx.beginPath();
            ctx.moveTo(this.size - 2, -2);
            ctx.lineTo(this.size + 8, 2); // Tip
            ctx.lineTo(this.size - 2, 6);
            ctx.closePath();
            ctx.fill();

            // Draw Comb (Red bit on top)
            ctx.fillStyle = '#cc0000';
            ctx.beginPath();
            ctx.moveTo(this.size - 8, -this.size * 0.4);
            ctx.lineTo(this.size - 4, -this.size * 0.8);
            ctx.lineTo(this.size, -this.size * 0.3);
            ctx.closePath();
            ctx.fill();

            // Wattle (Red bit under beak)
            ctx.beginPath();
            ctx.arc(this.size - 4, 6, 3, 0, Math.PI * 2);
            ctx.fill();

            // Eye
            ctx.fillStyle = 'black';
            ctx.beginPath();
            ctx.arc(this.size - 6, -2, 1.5, 0, Math.PI * 2);
            ctx.fill();

            ctx.restore();
        }
    }

    function drawBackground() {
        // Sky is handled by canvas background color
        
        // Draw some clouds
        ctx.fillStyle = 'rgba(255, 255, 255, 0.6)';
        ctx.beginPath();
        ctx.arc(150, 80, 30, 0, Math.PI*2);
        ctx.arc(190, 80, 40, 0, Math.PI*2);
        ctx.arc(230, 80, 30, 0, Math.PI*2);
        ctx.fill();

        ctx.beginPath();
        ctx.arc(600, 120, 20, 0, Math.PI*2);
        ctx.arc(630, 120, 30, 0, Math.PI*2);
        ctx.arc(660, 120, 20, 0, Math.PI*2);
        ctx.fill();

        // Draw distant mountains/hills
        ctx.fillStyle = '#4a7c49';
        ctx.beginPath();
        ctx.moveTo(0, horizonY);
        ctx.quadraticCurveTo(200, horizonY - 80, 400, horizonY);
        ctx.quadraticCurveTo(600, horizonY - 120, 800, horizonY);
        ctx.lineTo(800, horizonY);
        ctx.lineTo(0, horizonY);
        ctx.fill();

        // Draw ground
        ctx.fillStyle = '#659c64'; // Farm grass green
        ctx.fillRect(0, horizonY, canvas.width, canvas.height - horizonY);

        // Draw horizon fence line
        ctx.strokeStyle = '#5c4033'; // Brown wood
        ctx.lineWidth = 3;
        // Horizontal rails
        ctx.beginPath();
        ctx.moveTo(0, horizonY + 10); ctx.lineTo(800, horizonY + 10);
        ctx.moveTo(0, horizonY + 25); ctx.lineTo(800, horizonY + 25);
        ctx.stroke();
        // Posts
        for(let x = 20; x < 800; x += 80) {
            ctx.fillRect(x, horizonY - 5, 6, 40);
        }
    }

    // Initialize Game
    function init() {
        for (let i = 0; i < 6; i++) {
            chickens.push(new Chicken(
                Math.random() * canvas.width,
                horizonY + Math.random() * (canvas.height - horizonY)
            ));
        }
        requestAnimationFrame(gameLoop);
    }

    // Input Handling
    window.addEventListener('keydown', (e) => {
        if (e.code === 'Space') {
            e.preventDefault();
            dropCornBag();
        }
    });

    function dropCornBag() {
        // Drop bag at a random location in the play area
        let targetX = playArea.minX + Math.random() * (playArea.maxX - playArea.minX);
        let targetY = playArea.minY + Math.random() * (playArea.maxY - playArea.minY);
        
        bags.push(new CornBag(targetX, targetY));
    }

    // Main Game Loop
    function gameLoop() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Draw Environment First
        drawBackground();

        // Update entities
        foods = foods.filter(f => !f.consumed);
        bags = bags.filter(b => b.active);

        foods.forEach(f => f.update());
        bags.forEach(b => b.update());
        chickens.forEach(c => c.update());

        // Y-SORTING FOR 2.5D DEPTH
        // Gather all renderable entities that exist on the ground plane
        let renderables = [...foods, ...bags, ...chickens];
        
        // Sort by their Y coordinate (lower Y = drawn first / behind)
        renderables.sort((a, b) => a.y - b.y);

        // Draw sorted entities
        renderables.forEach(entity => entity.draw());

        requestAnimationFrame(gameLoop);
    }

    // Start
    init();
</script>

</body>
</html>
