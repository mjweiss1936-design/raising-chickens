<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feed the Farm - 2.5D</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #1a1a1a;
            overflow: hidden;
            overscroll-behavior: none;
            font-family: 'Courier New', Courier, monospace;
            color: white;
        }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
        }
        /* Fixed 16:9 stage that scales to fill whatever space it's given */
        #game-container {
            position: relative;
            aspect-ratio: 16 / 9;
            width: min(100vw, calc(100vh * 16 / 9));
            max-height: 100vh;
            line-height: 0;
        }
        canvas {
            background-color: #87CEEB;
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
            border: 4px solid #333;
            border-radius: 8px;
            display: block;
            width: 100%;
            height: 100%;
            box-sizing: border-box;
            image-rendering: pixelated;
            /* mobile: no scrolling, pinch-zoom or double-tap-zoom on the game */
            touch-action: none;
            -webkit-user-select: none;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        /* Edge to edge when fullscreen -- no border, no rounding */
        #game-container:fullscreen {
            margin: auto;
        }
        #game-container:fullscreen canvas {
            border: none;
            border-radius: 0;
            box-shadow: none;
        }
    </style>
</head>
<body>

<div id="game-container">
    <canvas id="gameCanvas" width="1280" height="720"></canvas>
</div>

<script>
    // --- PIXEL RENDER SETUP ---
    // The whole scene is drawn at logical 800x600 into a half-size buffer, then
    // blitted back up with smoothing off. Same coordinates, chunky pixels.
    const canvas = document.getElementById('gameCanvas');
    const screenCtx = canvas.getContext('2d');
    const PIXEL = 2;

    const buffer = document.createElement('canvas');
    buffer.width = canvas.width / PIXEL;
    buffer.height = canvas.height / PIXEL;
    const ctx = buffer.getContext('2d');

    const horizonY = 250;
    const playArea = {
        minX: 20, maxX: canvas.width - 20,
        minY: horizonY + 20, maxY: canvas.height - 20
    };

    // Arrays for all entities
    let chickens = [];
    let horses = [];
    let cows = [];
    let eggs = [];
    let foods = [];
    let bags = [];
    let particles = [];
    let skyBirds = [];
    let bolts = [];
    let grasses = [];

    // --- PREDATORS ---
    // Fox, wolf, alligator and bear are all the same animal underneath: they
    // run in, try to grab a hen, and a bolt of lightning sends them packing.
    // Only the artwork and the numbers are different.
    let predators = [];
    let nextPredAt = 60 * 26;
    const PRED_MAX = 6;

    // The farmer turns up shouting, then loses his nerve completely. Harmless.
    let farmers = [];
    let nextFarmerAt = 60 * 44;

    // --- SPATIAL GRID ---
    // With hundreds of chickens on the field, checking every bird against
    // every other bird is hopeless. Bucket everything into cells and only
    // ever look at the nine cells around you.
    const HEN_CELL = 56, CORN_CELL = 150;
    const henGrid = new Map(), cornGrid = new Map();
    function gridBuild(map, list, cell) {
        map.clear();
        for (let i = 0; i < list.length; i++) {
            let o = list[i];
            let k = (((o.x / cell) | 0) * 1000) + ((o.y / cell) | 0);
            let b = map.get(k);
            if (b) b.push(o); else map.set(k, [o]);
        }
    }
    function gridNear(map, cell, x, y, out) {
        out.length = 0;
        let cx = (x / cell) | 0, cy = (y / cell) | 0;
        for (let i = -1; i <= 1; i++) for (let j = -1; j <= 1; j++) {
            let b = map.get((cx + i) * 1000 + (cy + j));
            if (b) for (let k = 0; k < b.length; k++) out.push(b[k]);
        }
        return out;
    }
    const _nearHens = [], _nearCorn = [], _nearBall = [];
    function nearHens(x, y) { return gridNear(henGrid, HEN_CELL, x, y, _nearHens); }
    function nearCorn(x, y) { return gridNear(cornGrid, CORN_CELL, x, y, _nearCorn); }

    // Mouse aiming -- corn is placed where you click
    // Raw (unclamped) pointer, for on-screen buttons up in the sky area
    let rawMouseX = -999, rawMouseY = -999;

    // On-screen buttons, up in the sky so they never cover the field.
    // Sized generously: the canvas scales to about half on a landscape phone,
    // so these need to be big in game units to be a comfortable finger target.
    // Bolt sits top-left (the action button). Music sits over on the right,
    // tucked below the goal bar and clear of the right-hand stats.
    const BOLT_BTN  = { x: 20, y: 112, w: 206, h: 62 };
    const MUSIC_BTN = { x: 878, y: 186, w: 206, h: 56 };
    let gameStarted = false;
    function beginGame() {
        initAudio();          // this click counts as the gesture that unlocks sound
        gameStarted = true;
        restartGame();
    }
    function inBtn(b, px, py) {
        return px >= b.x && px <= b.x + b.w && py >= b.y && py <= b.y + b.h;
    }
    function inMusicBtn(px, py) { return inBtn(MUSIC_BTN, px, py); }
    function inBoltBtn(px, py) { return inBtn(BOLT_BTN, px, py); }
    function inAnyBtn(px, py) { return inMusicBtn(px, py) || inBoltBtn(px, py); }

    // Tapping the bolt button does exactly what P does
    function pressBolt() {
        if (gameState !== 'playing') return;
        if (!strikeLightning()) { boltDeny = 45; sndDud(); }
    }

    let rabbits = [];
    let poops = [];

    // Grass: quick to grow, and only ever one clump in any given small area
    const GRASS_RATE = 1 / (60 * 9);   // ~9s from sprout to full
    const GRASS_RIPE = 0.55;           // worth walking over for
    const GRASS_SPACING = 130;         // no two clumps closer than this
    const GRASS_MAX = 12;
    let nextGrassAt = 60 * 2;
    let cowMeals = 0;

    // Rabbits only bother showing up once the field is worth raiding
    const RABBIT_THRESHOLD = 3;
    const RABBIT_MAX = 2;
    let nextRabbitAt = 60 * 6;
    let grassStolen = 0;

    const POOP_MAX = 10;

    // Two minutes in, the whole flock lays at once and the yard gets strange
    const EGG_BOOM_FRAME = 120 * 60;
    let eggBoomDone = false;
    const CRAZY_COLORS = ['#ff6bcb', '#7cf0ff', '#ffe14d', '#a6ff6b', '#ff9b54', '#c58bff'];

    // A few minutes in, nothing normal hatches any more. Measured from the
    // start of the current game so a replay begins fresh, not mid-chaos.
    const CRAZY_ERA_FRAME = 180 * 60;
    // ...but only a sprinkling of them, or the bear would carry off the whole
    // farm every time it wandered through and the flock could never grow.
    const CRAZY_HATCH = 0.14;
    let crazyEraAnnounced = false;
    function gameAge() { return frameCount - gameStartFrame; }
    function crazyEra() { return gameAge() >= CRAZY_ERA_FRAME; }

    // The horse fattens over a whole session, not a couple of bags
    const HORSE_PLUMP_PER_KERNEL = 0.002; // 500 kernels from lean to boulder

    // Feed a hen enough and she gets fat; fat hens lay whole clutches
    // Lay well before the fatness cap, and only lose a little of it, so a
    // hen stays plump through a clutch. That is what makes the flock explode.
    let FAT_LAY_THRESHOLD = 1.45;
    const CHICKEN_CAP = 400;

    // Forget to feed them and they starve
    const HUNGER_WARN = 60 * 55;    // starts looking rough
    const STARVE_FRAMES = 60 * 90;  // 90s with no corn and it's over
    let chickensStarved = 0;
    let crazyDeparted = 0;

    // Rabbit swarm: when the field is overgrown, they strip the lot
    let swarmCd = 0;
    // ...and every so often a great many rabbits simply run across the farm
    let nextStampedeAt = 60 * 50;

    // ============================================================
    //  SOUND, MUSIC AND SPEECH
    //  Everything here is generated in the browser -- no audio files,
    //  no hosting. Effects are synthesised with Web Audio and the words
    //  are read aloud with the built-in speech synthesiser.
    // ============================================================

    let audioStarted = false;
    let soundOn = true;
    let hungryNagCd = 0;
    let actx = null, masterGain = null, musicGain = null, sfxGain = null;
    let noiseBuf = null;

    // --- Background music: two real tracks, OFF by default ---
    // The calm farm tune plays normally. The moment any crazy chickens are on
    // the field the music switches to their theme, and switches back once
    // they're gone (e.g. when the bear leads them all away).
    const MUSIC_CALM  = 'Pasture_Under_the_Rising_Sun.mp3';
    const MUSIC_CRAZY = 'crazy-chickens.mp3';
    const MUSIC_WIN   = 'victory.mp3';
    let musicOn = false;              // starts muted, on purpose
    let musicCalmEl = null, musicCrazyEl = null, victoryEl = null;
    let musicPlayingEl = null;
    let victoryPlaying = false;

    function initMusic() {
        if (musicCalmEl) return;
        musicCalmEl = new Audio(MUSIC_CALM);
        musicCalmEl.loop = true; musicCalmEl.volume = 0.45;
        musicCalmEl.preload = 'none';   // nothing downloads until music is on
        musicCrazyEl = new Audio(MUSIC_CRAZY);
        musicCrazyEl.loop = true; musicCrazyEl.volume = 0.5;
        musicCrazyEl.preload = 'none';
        // The victory track is a reward sting, so it follows the MUTE key
        // rather than the music toggle -- otherwise almost nobody would
        // ever hear it, since music starts off.
        victoryEl = new Audio(MUSIC_WIN);
        victoryEl.loop = false; victoryEl.volume = 0.6;
        victoryEl.preload = 'none';
        victoryEl.addEventListener('ended', () => {
            stopVictory();              // make sure it's fully released
            updateMusic();              // let the background music back in
        });
    }

    function playVictory() {
        initMusic();
        if (!soundOn) return;           // muted means muted
        // hush the background track so they don't play over each other
        for (let el of [musicCalmEl, musicCrazyEl]) if (el && !el.paused) el.pause();
        musicPlayingEl = null;
        victoryPlaying = true;
        victoryEl.preload = 'auto';
        try { victoryEl.currentTime = 0; } catch (e) {}
        let p = victoryEl.play();
        if (p && p.catch) p.catch(() => {});
    }

    function stopVictory() {
        victoryPlaying = false;
        if (victoryEl && !victoryEl.paused) {
            victoryEl.pause();
            try { victoryEl.currentTime = 0; } catch (e) {}
        }
    }

    // Are there crazy chickens loose right now?
    function crazyOnTheLoose() {
        for (let c of chickens) if (c.crazy && !c.dead) return true;
        return false;
    }

    function updateMusic() {
        if (!musicCalmEl) return;
        // the victory track owns the speakers while it's playing
        if (victoryPlaying) {
            for (let el of [musicCalmEl, musicCrazyEl]) if (!el.paused) el.pause();
            musicPlayingEl = null;
            return;
        }
        let want = musicOn && soundOn;
        let target = !want ? null : (crazyOnTheLoose() ? musicCrazyEl : musicCalmEl);
        // stop anything that shouldn't be playing
        for (let el of [musicCalmEl, musicCrazyEl]) {
            if (el !== target && !el.paused) el.pause();
        }
        if (target) {
            // starting a different track? take it from the top for the drama
            if (target !== musicPlayingEl) target.currentTime = 0;
            if (target.paused) {
                target.preload = 'auto';
                let p = target.play();
                if (p && p.catch) p.catch(() => {});  // browser may block; harmless
            }
        }
        musicPlayingEl = target;
    }

    function toggleMusic() {
        initMusic();
        musicOn = !musicOn;
        if (musicOn) soundOn = true;              // turning music on un-mutes
        if (masterGain) masterGain.gain.value = soundOn ? 0.9 : 0;
        updateMusic();
    }

    function initAudio() {
        if (audioStarted) return;
        try {
            actx = new (window.AudioContext || window.webkitAudioContext)();
        } catch (e) { return; }
        if (actx.state === 'suspended') actx.resume();

        masterGain = actx.createGain(); masterGain.gain.value = 0.9;
        masterGain.connect(actx.destination);
        musicGain = actx.createGain(); musicGain.gain.value = 0.16; musicGain.connect(masterGain);
        sfxGain = actx.createGain(); sfxGain.gain.value = 0.55; sfxGain.connect(masterGain);

        // one reusable buffer of white noise for percussive sounds
        let len = actx.sampleRate * 1.5;
        noiseBuf = actx.createBuffer(1, len, actx.sampleRate);
        let d = noiseBuf.getChannelData(0);
        for (let i = 0; i < len; i++) d[i] = Math.random() * 2 - 1;

        audioStarted = true;
        nextNoteTime = actx.currentTime + 0.15;
        // NB: the old synthesised tune is retired -- the mp3 is the music now,
        // and it stays off until the player presses N.
        initMusic();
    }

    // --- small synth helpers ---
    function tone(opts) {
        if (!audioStarted || !soundOn || !actx) return;
        let t = actx.currentTime + (opts.delay || 0);
        let o = actx.createOscillator();
        let g = actx.createGain();
        o.type = opts.type || 'sine';
        o.frequency.setValueAtTime(opts.freq, t);
        if (opts.slideTo) o.frequency.exponentialRampToValueAtTime(Math.max(20, opts.slideTo), t + opts.dur);
        if (opts.wobble) {
            let lfo = actx.createOscillator(), lg = actx.createGain();
            lfo.frequency.value = opts.wobble; lg.gain.value = opts.wobbleAmt || 12;
            lfo.connect(lg); lg.connect(o.frequency); lfo.start(t); lfo.stop(t + opts.dur);
        }
        g.gain.setValueAtTime(0.0001, t);
        g.gain.exponentialRampToValueAtTime(opts.vol || 0.25, t + 0.012);
        g.gain.exponentialRampToValueAtTime(0.0001, t + opts.dur);
        o.connect(g); g.connect(opts.bus || sfxGain);
        o.start(t); o.stop(t + opts.dur + 0.02);
    }

    function noise(opts) {
        if (!audioStarted || !soundOn || !actx || !noiseBuf) return;
        let t = actx.currentTime + (opts.delay || 0);
        let s = actx.createBufferSource(); s.buffer = noiseBuf;
        let f = actx.createBiquadFilter();
        f.type = opts.filterType || 'lowpass';
        f.frequency.setValueAtTime(opts.freq || 1200, t);
        if (opts.sweepTo) f.frequency.exponentialRampToValueAtTime(Math.max(40, opts.sweepTo), t + opts.dur);
        let g = actx.createGain();
        g.gain.setValueAtTime(opts.vol || 0.3, t);
        g.gain.exponentialRampToValueAtTime(0.0001, t + opts.dur);
        s.connect(f); f.connect(g); g.connect(opts.bus || sfxGain);
        s.start(t); s.stop(t + opts.dur + 0.02);
    }

    // --- named farmyard sounds ---
    let sfxCd = {};
    function throttled(key, frames) {
        if ((sfxCd[key] || 0) > frameCount) return false;
        sfxCd[key] = frameCount + frames;
        return true;
    }

    function sndCluck() {
        if (!throttled('cluck', 22)) return;
        tone({ freq: 900 + Math.random() * 250, slideTo: 420, dur: 0.09, type: 'square', vol: 0.10 });
        tone({ freq: 620, slideTo: 900, dur: 0.06, type: 'square', vol: 0.07, delay: 0.09 });
    }
    function sndPeck() {
        if (!throttled('peck', 8)) return;
        noise({ freq: 2600, dur: 0.035, vol: 0.10, filterType: 'bandpass' });
    }
    function sndCornLand() {
        noise({ freq: 900, sweepTo: 180, dur: 0.28, vol: 0.35 });
        tone({ freq: 150, slideTo: 60, dur: 0.22, type: 'sine', vol: 0.28 });
    }
    function sndThunder() {
        noise({ freq: 5000, sweepTo: 90, dur: 1.5, vol: 0.6 });
        tone({ freq: 70, slideTo: 32, dur: 1.7, type: 'sawtooth', vol: 0.35 });
        noise({ freq: 2200, sweepTo: 300, dur: 0.5, vol: 0.3, delay: 0.22 });
    }
    function sndMoo() {
        tone({ freq: 210, slideTo: 150, dur: 0.85, type: 'sawtooth', vol: 0.20, wobble: 5, wobbleAmt: 9 });
    }
    function sndNeigh() {
        tone({ freq: 700, slideTo: 300, dur: 0.55, type: 'sawtooth', vol: 0.17, wobble: 22, wobbleAmt: 55 });
    }
    function sndYip() {
        tone({ freq: 1150, slideTo: 700, dur: 0.13, type: 'square', vol: 0.16 });
        tone({ freq: 950, slideTo: 620, dur: 0.11, type: 'square', vol: 0.13, delay: 0.15 });
    }
    function sndGrowl() {
        tone({ freq: 95, slideTo: 55, dur: 1.0, type: 'sawtooth', vol: 0.32, wobble: 13, wobbleAmt: 16 });
    }
    function sndHatch() {
        tone({ freq: 1500, slideTo: 2300, dur: 0.10, type: 'triangle', vol: 0.16 });
        tone({ freq: 2000, slideTo: 2800, dur: 0.09, type: 'triangle', vol: 0.13, delay: 0.11 });
    }
    function sndHop() {
        if (!throttled('hop', 14)) return;
        tone({ freq: 500, slideTo: 850, dur: 0.07, type: 'sine', vol: 0.09 });
    }
    function sndPlop() {
        noise({ freq: 500, sweepTo: 120, dur: 0.18, vol: 0.22 });
    }
    function sndFlap() {
        if (!throttled('flap', 12)) return;
        noise({ freq: 700, sweepTo: 300, dur: 0.16, vol: 0.16 });
    }
    function sndSparkle() {
        [0, 0.08, 0.16].forEach((d, i) =>
            tone({ freq: 900 + i * 350, dur: 0.12, type: 'triangle', vol: 0.13, delay: d }));
    }
    function sndDud() { // lightning not charged yet
        tone({ freq: 220, slideTo: 130, dur: 0.14, type: 'square', vol: 0.10 });
    }
    function sndFanfare() { // you win!
        let notes = [523.25, 659.25, 783.99, 1046.50];
        notes.forEach((f, i) => {
            tone({ freq: f, dur: 0.3, type: 'square', vol: 0.16, delay: i * 0.13 });
            tone({ freq: f * 1.5, dur: 0.3, type: 'triangle', vol: 0.07, delay: i * 0.13 });
        });
        tone({ freq: 1046.50, dur: 0.5, type: 'square', vol: 0.16, delay: 0.55 });
    }

    // --- music: a bouncy little barn-dance tune ---
    // Melody over an oom-pah bass with kick, snare and hats. 8 bars long so it
    // doesn't feel like a 4-second loop going round and round.
    const _ = null;
    const NT = { C4: 261.63, D4: 293.66, E4: 329.63, F4: 349.23, G4: 392.00, A4: 440.00,
                 B4: 493.88, C5: 523.25, D5: 587.33, E5: 659.25, F5: 698.46, G5: 783.99 };
    const N = NT;
    const TUNE = [
        // bar 1                                   bar 2
        N.G4, N.G4, N.A4, N.B4, N.C5, _, N.B4, N.A4,
        N.G4, _, N.E4, N.G4, N.A4, _, _, _,
        // bar 3 (over F)                          bar 4 (over G)
        N.F4, N.F4, N.G4, N.A4, N.B4, _, N.A4, N.G4,
        N.G4, _, _, _, N.D4, _, N.E4, N.F4,
        // bar 5                                   bar 6
        N.G4, N.G4, N.A4, N.B4, N.C5, N.D5, N.E5, N.D5,
        N.C5, _, N.B4, N.A4, N.G4, _, _, _,
        // bar 7 (over G)                          bar 8
        N.A4, N.A4, N.B4, N.C5, N.D5, _, N.C5, N.B4,
        N.C5, _, _, _, _, _, N.E4, N.F4
    ];
    // one chord per bar
    const CHORDS = [
        { root: 130.81, triad: [261.63, 329.63, 392.00] }, // C
        { root: 130.81, triad: [261.63, 329.63, 392.00] }, // C
        { root: 174.61, triad: [349.23, 440.00, 523.25] }, // F
        { root: 196.00, triad: [392.00, 493.88, 587.33] }, // G
        { root: 130.81, triad: [261.63, 329.63, 392.00] }, // C
        { root: 130.81, triad: [261.63, 329.63, 392.00] }, // C
        { root: 196.00, triad: [392.00, 493.88, 587.33] }, // G
        { root: 130.81, triad: [261.63, 329.63, 392.00] }  // C
    ];
    const STEP_DUR = 0.20; // eighth notes at 150bpm -- properly bouncy
    let musicStep = 0, nextNoteTime = 0;

    function kick(d) {
        tone({ freq: 130, slideTo: 45, dur: 0.16, type: 'sine', vol: 0.5, bus: musicGain, delay: d });
    }
    function snare(d) {
        noise({ freq: 2000, sweepTo: 700, dur: 0.13, vol: 0.20, filterType: 'highpass',
                bus: musicGain, delay: d });
    }
    function hat(d) {
        noise({ freq: 9000, dur: 0.035, vol: 0.055, filterType: 'highpass',
                bus: musicGain, delay: d });
    }

    function musicTick() {
        if (!audioStarted || !soundOn || !actx) return;
        while (nextNoteTime < actx.currentTime + 0.3) {
            let d = nextNoteTime - actx.currentTime;
            if (d < 0) d = 0;
            let s = musicStep % TUNE.length;
            let beat = s % 8;
            let chord = CHORDS[(s / 8 | 0) % CHORDS.length];

            // melody -- square lead, short and plucky
            let m = TUNE[s];
            if (m) {
                tone({ freq: m, dur: 0.19, type: 'square', vol: 0.13, bus: musicGain, delay: d });
                tone({ freq: m * 2, dur: 0.12, type: 'triangle', vol: 0.045, bus: musicGain, delay: d });
            }
            // oom-pah: root on the beat, chord stab on the off
            if (beat % 4 === 0) {
                tone({ freq: chord.root, dur: 0.22, type: 'triangle', vol: 0.30, bus: musicGain, delay: d });
            } else if (beat % 4 === 2) {
                chord.triad.forEach(f =>
                    tone({ freq: f, dur: 0.10, type: 'square', vol: 0.055, bus: musicGain, delay: d }));
            }
            // drums
            if (beat === 0 || beat === 4) kick(d);
            if (beat === 2 || beat === 6) snare(d);
            if (beat % 2 === 1) hat(d);

            nextNoteTime += STEP_DUR;
            musicStep++;
        }
    }

    // --- speech: read the words out loud for young players ---

    // Big on-screen event announcement -- always read aloud
    let banner = null;
    function showBanner(text, color) {
        banner = { text: text, color: color, life: 170, maxLife: 170 };
    }

    // Flies: they turn up for the poop and slowly clear it away
    let flies = [];
    const FLY_MAX = 14;
    const FLY_PER_POOP = 4;
    const FLY_EAT = 1 / (60 * 14); // one fly clears a pat in ~14s
    let nextFlyAt = 60 * 4;

    // Timers & score
    let frameCount = 0;
    let gameStartFrame = 0;   // reset on replay so timed events restart too
    let chickensLost = 0;
    let chickensVaporised = 0;
    let foxesZapped = 0;
    let flash = 0;          // white screen flash from a lightning strike
    let nextBearAt = 60 * (25 + Math.random() * 45);
    let nextFlockAt = 60 * (5 + Math.random() * 8);
    const EGG_SPAWN_FRAMES = 60 * 30; // a spare egg turns up every 30s

    // Corn "magazine": you hold a few handfuls of corn. Each throw spends one,
    // and they refill on a timer -- so you can throw a quick burst then must
    // pace yourself. Holding space feeds at the refill rate, never a flood.
    const CORN_MAG = 5;               // handfuls you can hold at once
    const CORN_REFILL_FRAMES = 120;   // one handful back every 2s to start with
    const CORN_THROW_GAP = 12;        // min frames between throws (caps burst rate)
    const CORN_LIMIT = 1500;          // most kernels allowed on the grass at once

    // A big flock eats a LOT. Past a hundred birds the sacks get fatter and
    // the supply comes back quicker, so you can actually keep up with them.
    const BIG_SACK_AT = 50;           // past this many mouths, out come the big sacks
    let bigSackAnnounced = false;
    function bagKernels() {
        let base = chickens.length >= BIG_SACK_AT ? 46 : 26;
        return Math.min(96, base + ((chickens.length / 6) | 0));
    }
    function refillFrames() { return Math.max(48, CORN_REFILL_FRAMES - chickens.length * 0.26); }
    let cornReady = CORN_MAG;
    let cornRefillCd = CORN_REFILL_FRAMES;
    let cornThrowCd = 0;
    let spaceHeld = false;
    let denyFlash = 0;

    function bagsLeft() { return cornReady; } // kept for HUD compatibility

    // Throw one handful of corn -- at (tx,ty) if given, otherwise wherever the
    // mouse is, otherwise somewhere random. Rate-limited, so holding or mashing
    // can never flood the field.
    function throwCorn() {
        if (gameState !== 'playing') return false;
        if (cornThrowCd > 0) return false;
        if (cornReady <= 0) { denyFlash = 30; return false; }
        // No aiming -- it lands wherever it lands, like chucking a handful
        let x = playArea.minX + Math.random() * (playArea.maxX - playArea.minX);
        let y = playArea.minY + Math.random() * (playArea.maxY - playArea.minY);
        cornReady--;
        cornThrowCd = CORN_THROW_GAP;
        bags.push(new CornBag(clampX(x), clampY(y)));
        return true;
    }

    // Screen pixels -> the game's logical 1280x720 coordinates
    function canvasPos(e) {
        let r = canvas.getBoundingClientRect();
        return {
            x: (e.clientX - r.left) * (canvas.width / r.width),
            y: (e.clientY - r.top) * (canvas.height / r.height)
        };
    }

    // Lightning cooldown -- a long recharge so it can't be spammed
    let boltCd = 0;
    const BOLT_COOLDOWN = 60 * 3;  // zap away as often as you like...
    const BOLT_ZAP_R = 40;         // ...but stand under it and you are toast
    let boltDeny = 0;              // flashes when pressed too early

    // ============================================================
    //  GOAL, SCORE AND WIN STATE
    //  The point of the game: raise a flock of nice plump chickens.
    //  You score points for good farming, and you WIN when you have
    //  enough plump chickens at once -- then they march into the coop.
    // ============================================================
    let gameState = 'playing';        // 'playing' | 'winning' | 'won'
    let score = 0;
    let scorePop = 0;                 // little bounce when the score jumps
    // --- Difficulty knobs (mutable so they're easy to tune) ---
    // THREE HUNDRED plump chickens. They never get very big -- they just
    // keep multiplying until the farm is completely overrun, which is the point.
    let PLUMP_THRESHOLD = 1.22;       // a chicken this round counts as "plump"
    let WIN_PLUMP = 300;              // this many plump chickens at once = you win!
    let MAX_FATNESS = 1.5;            // and no chicken ever gets rounder than this
    let FATTEN_PER_KERNEL = 0.012;    // ~18 kernels to make one hen properly plump
    let METAB_PER_FRAME = 0.00002;    // and she slowly slims again, so keep feeding
    // How switched-on the hens are. Lower = dumber = they blunder into hazards
    // unless you keep corn down somewhere safe to hold their attention.
    let HEN_SMARTS = 0.9;             // chance she thinks twice about a bad spot
    let HEN_PREDATOR_SENSE = 1.0;     // fraction of a predator's scare range she notices


    let coop = null;                  // the henhouse, built when you win
    let confetti = [];
    let winHoldTimer = 0;
    let chickensHoused = 0;
    // When a win/lose screen appeared. A click already on its way must NOT
    // dismiss it -- otherwise the player never sees it and the score appears
    // to reset itself for no reason.
    let endScreenAt = -9999;
    const END_SCREEN_LOCK = 100;      // ~1.7s before a tap can restart
    function endScreenReady() { return frameCount - endScreenAt > END_SCREEN_LOCK; }

    function plumpCount() {
        let n = 0;
        for (let c of chickens) {
            if (c.dead || c.state === 'exodus' || c.state === 'toCoop') continue;
            if (c.fatness >= PLUMP_THRESHOLD) n++;
        }
        return n;
    }
    function addScore(n) {
        if (gameState !== 'playing') return;
        score += n;
        scorePop = 1;
    }

    // Helper Math
    function dist(x1, y1, x2, y2) {
        let dx = x2 - x1;
        let dy = y2 - y1;
        return Math.sqrt(dx * dx + (dy * 2) * (dy * 2)); // perspective distance
    }

    function clampX(x) { return Math.max(playArea.minX, Math.min(playArea.maxX, x)); }
    function clampY(y) { return Math.max(playArea.minY, Math.min(playArea.maxY, y)); }

    // Running straight away from a threat is useless when that heading ends in
    // a fence. Sample headings all round, project each one, clamp it to the
    // yard, and keep whichever actually ends up furthest from the threat --
    // so a cornered animal peels off along the fence instead of pinning itself.
    function pickEscapeTarget(x, y, fromX, fromY, reach) {
        let best = { x: x, y: y }, bestScore = -Infinity;
        let base = Math.atan2(y - fromY, x - fromX);
        for (let i = 0; i < 16; i++) {
            let a = base + (i / 16) * Math.PI * 2;
            let tx = clampX(x + Math.cos(a) * reach);
            let ty = clampY(y + Math.sin(a) * reach * 0.5);
            // Distance gained from the threat, plus credit for actually moving
            let score = dist(tx, ty, fromX, fromY) + dist(tx, ty, x, y) * 0.35;
            // Never bolt straight into something that will kill you
            for (let z of killZones()) if (dist(tx, ty, z.x, z.y) < z.kill + 70) score -= 1400;
            if (score > bestScore) { bestScore = score; best = { x: tx, y: ty }; }
        }
        return best;
    }

    // Nearest thing worth running away from. Cows and bears bully everyone.
    function nearestBully(x, y, range) {
        let best = null, bestD = range;
        for (let c of cows) {
            let d = dist(x, y, c.x, c.y);
            if (d < bestD) { bestD = d; best = c; }
        }
        for (let b of predators) {
            if (!b.bully) continue;
            let d = dist(x, y, b.x, b.y);
            if (d < bestD) { bestD = d; best = b; }
        }
        return best ? { obj: best, d: bestD } : null;
    }

    // Feeding a hen is the same event wherever the food came from: she fills
    // out, she may cross into plump for the first time, and a full hen lays.
    function feedHen(c, amount) {
        c.fatness = Math.min(MAX_FATNESS, c.fatness + amount);
        if (!c.countedPlump && c.fatness >= PLUMP_THRESHOLD) {
            c.countedPlump = true;
            addScore(150);
            sndSparkle();
            for (let k = 0; k < 4; k++) heart(c.x + (Math.random() - 0.5) * 20, c.y - c.size);
        }
        if (c.fatness >= FAT_LAY_THRESHOLD && c.layCd <= 0) c.layClutch();
    }

    // Is this bird available to be chased and eaten? Anyone tucked up inside
    // the castle, off with the bear, or marching to the coop is off the menu.
    function huntable(c) {
        return c && !c.dead && !c.safe && c.state !== 'exodus' && c.state !== 'toCoop';
    }
    // Is this bird free to be handed a job?
    function idleHen(c) {
        return c && !c.dead && !c.job && !c.crazy && c.jobCd <= 0 &&
               c.state !== 'exodus' && c.state !== 'toCoop' && c.fatness > 0.75;
    }

    function drawShadow(x, y, radiusX, radiusY) {
        ctx.fillStyle = 'rgba(0, 0, 0, 0.2)';
        ctx.beginPath();
        ctx.ellipse(x, y, radiusX, radiusY, 0, 0, Math.PI * 2);
        ctx.fill();
    }

    // --- PARTICLES (juice) ---

    class Particle {
        constructor(x, y, opts = {}) {
            this.x = x; this.y = y;
            this.z = opts.z || 0;
            this.vx = opts.vx || 0;
            this.vy = opts.vy || 0;
            this.vz = opts.vz || 0;
            this.gravity = opts.gravity === undefined ? 0.25 : opts.gravity;
            this.life = opts.life || 30;
            this.maxLife = this.life;
            this.color = opts.color || 'white';
            this.size = opts.size || 3;
            this.kind = opts.kind || 'dot'; // dot | heart | feather
            this.spin = Math.random() * Math.PI;
            this.active = true;
        }
        update() {
            this.x += this.vx;
            this.y += this.vy;
            this.z += this.vz;
            this.vz -= this.gravity;
            this.spin += 0.15;
            if (this.z < 0) { this.z = 0; this.vz = 0; this.vx *= 0.7; this.vy *= 0.7; }
            this.life--;
            if (this.life <= 0) this.active = false;
        }
        draw() {
            ctx.save();
            ctx.globalAlpha = Math.max(0, Math.min(1, this.life / this.maxLife));
            ctx.translate(this.x, this.y - this.z);
            ctx.fillStyle = this.color;

            if (this.kind === 'heart') {
                let s = this.size;
                ctx.beginPath();
                ctx.arc(-s * 0.4, -s * 0.3, s * 0.5, 0, Math.PI * 2);
                ctx.arc(s * 0.4, -s * 0.3, s * 0.5, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.moveTo(-s * 0.85, -s * 0.1);
                ctx.lineTo(s * 0.85, -s * 0.1);
                ctx.lineTo(0, s);
                ctx.fill();
            } else if (this.kind === 'feather') {
                ctx.rotate(this.spin);
                ctx.beginPath();
                ctx.ellipse(0, 0, this.size, this.size * 0.4, 0, 0, Math.PI * 2);
                ctx.fill();
            } else {
                // chunky square = pixel dust
                ctx.fillRect(-this.size / 2, -this.size / 2, this.size, this.size);
            }
            ctx.restore();
        }
    }

    function puff(x, y, count, color, spread) {
        for (let i = 0; i < count; i++) {
            let a = Math.random() * Math.PI * 2;
            particles.push(new Particle(x, y, {
                vx: Math.cos(a) * spread * (0.4 + Math.random()),
                vy: Math.sin(a) * spread * 0.4 * (0.4 + Math.random()),
                vz: 1 + Math.random() * 2,
                gravity: 0.12,
                life: 25 + Math.random() * 20,
                color: color,
                size: 2 + Math.random() * 3
            }));
        }
    }

    function heart(x, y) {
        particles.push(new Particle(x, y, {
            z: 20, vz: 1.2, gravity: -0.02, vx: (Math.random() - 0.5) * 0.4,
            life: 50, color: '#ff5a7a', size: 5, kind: 'heart'
        }));
    }

    function featherBurst(x, y) {
        for (let i = 0; i < 14; i++) {
            let a = Math.random() * Math.PI * 2;
            particles.push(new Particle(x, y, {
                z: 8,
                vx: Math.cos(a) * (0.5 + Math.random() * 1.5),
                vy: Math.sin(a) * (0.3 + Math.random()) * 0.6,
                vz: 1 + Math.random() * 3,
                gravity: 0.07,
                life: 50 + Math.random() * 30,
                color: Math.random() > 0.3 ? '#ffffff' : '#ffe9a8',
                size: 3 + Math.random() * 3,
                kind: 'feather'
            }));
        }
    }

    // --- ENTITIES ---

    class CornBag {
        constructor(x, y) {
            this.x = x; this.y = y; this.z = 400;
            this.vz = -2; this.gravity = 0.4;
            this.active = true;
        }
        update() {
            this.vz -= this.gravity; this.z += this.vz;
            if (this.z <= 0) { this.z = 0; this.burst(); }
        }
        burst() {
            this.active = false;
            sndCornLand();
            sndCluck();
            puff(this.x, this.y, 18, '#c9b184', 3.2);
            // Fling the kernels outwards -- they arc, bounce and roll to a stop
            // A big messy splatter of corn flung everywhere. The more mouths
            // there are to feed, the bigger the handful.
            let n = bagKernels();
            for (let i = 0; i < n; i++) {
                let angle = Math.random() * Math.PI * 2;
                let power = 1.6 + Math.random() * 5.0;
                foods.push(new Food(this.x, this.y, {
                    vx: Math.cos(angle) * power,
                    vy: Math.sin(angle) * power * 0.45,
                    vz: 1.6 + Math.random() * 3.2
                }));
            }
            // Never let the grass disappear under corn -- retire the oldest
            // kernels (marking them eaten so nobody is left chasing a ghost).
            if (foods.length > CORN_LIMIT) {
                for (let i = 0, over = foods.length - CORN_LIMIT; i < over; i++) foods[i].consumed = true;
            }
        }
        draw() {
            let sScale = Math.max(0.1, 1 - (this.z / 400));
            drawShadow(this.x, this.y, 15 * sScale, 6 * sScale);
            ctx.save();
            ctx.translate(this.x, this.y - this.z);
            ctx.fillStyle = '#8b5a2b';
            ctx.beginPath(); ctx.moveTo(-12, 15); ctx.lineTo(12, 15); ctx.lineTo(15, -10); ctx.lineTo(-15, -10); ctx.fill();
            ctx.fillStyle = '#6b4423';
            ctx.beginPath(); ctx.moveTo(-8, -10); ctx.lineTo(8, -10); ctx.lineTo(12, -18); ctx.lineTo(-12, -18); ctx.fill();
            ctx.fillStyle = '#eaddca'; ctx.fillRect(-6, -2, 12, 8);
            ctx.restore();
        }
    }

    class Food {
        constructor(x, y, opts = {}) {
            this.x = x; this.y = y;
            this.z = 0;
            this.vx = opts.vx || 0;
            this.vy = opts.vy || 0;
            this.vz = opts.vz || 0;
            this.landed = !(this.vx || this.vy || this.vz);
            this.consumed = false;
            this.claimedBy = null; // only one chicken may chase a given kernel
        }
        update() {
            if (this.landed) return;
            this.x += this.vx;
            this.y += this.vy;
            this.z += this.vz;
            this.vz -= 0.35;
            if (this.z <= 0) {
                this.z = 0;
                if (Math.abs(this.vz) > 1.2) {
                    // one lively bounce
                    this.vz *= -0.35; this.vx *= 0.5; this.vy *= 0.5;
                } else {
                    this.landed = true; this.vx = this.vy = this.vz = 0;
                }
            }
            this.x = clampX(this.x);
            this.y = clampY(this.y);
        }
        draw() {
            if (this.z > 0.5) drawShadow(this.x, this.y, 3, 1.5);
            ctx.fillStyle = '#ffcc00';
            ctx.beginPath(); ctx.ellipse(this.x, this.y - this.z, 4, 2, 0, 0, Math.PI * 2); ctx.fill();
        }
    }

    class Egg {
        constructor(x, y) {
            this.x = clampX(x); this.y = clampY(y);
            this.maxTimer = 240; // 4 seconds to hatch
            this.timer = this.maxTimer;
            this.active = true;
            this.crazy = false;
        }
        update() {
            this.timer--;
            if (this.timer <= 0) {
                this.active = false;
                sndHatch();
                addScore(50); // a new chick joins the flock
                puff(this.x, this.y, 10, this.crazy ? '#ffd6f5' : '#fffaf0', this.crazy ? 2.4 : 1.6);
                chickens.push(new Chicken(this.x, this.y, 0.4, this.crazy)); // Start tiny!
            }
        }
        draw() {
            drawShadow(this.x, this.y, 6, 3);
            // Wobble harder the closer it is to hatching
            let urgency = 1 - (this.timer / this.maxTimer);
            let wob = Math.sin(this.timer * 0.4) * 0.25 * urgency;
            ctx.save();
            ctx.translate(this.x, this.y);
            ctx.rotate(wob);
            ctx.fillStyle = '#fffaf0';
            ctx.beginPath(); ctx.ellipse(0, -6, 5, 7, 0, 0, Math.PI * 2); ctx.fill();
            // Crack shows up right before it pops
            if (urgency > 0.6) {
                ctx.strokeStyle = '#c9b184'; ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.moveTo(-4, -7); ctx.lineTo(-1, -5); ctx.lineTo(1, -8); ctx.lineTo(4, -6);
                ctx.stroke();
            }
            ctx.restore();
        }
    }

    class Chicken {
        constructor(x, y, fatness = 1.0, crazy = false) {
            this.x = clampX(x); this.y = clampY(y);
            this.facingDir = Math.random() > 0.5 ? 1 : -1;
            this.baseSpeed = 1.5 + Math.random();
            this.baseSize = 13; // trimmed so hens read small next to the horse
            this.crazy = crazy;
            if (crazy) {
                this.baseSpeed *= 1.7;
                this.bodyColor = CRAZY_COLORS[Math.floor(Math.random() * CRAZY_COLORS.length)];
                this.wobble = Math.random() * Math.PI * 2;
            }
            this.fatness = fatness; // < 1 = baby, 1 = normal, > 1 = fat
            this.dead = false;

            this.state = 'wander';
            this.targetFood = null;
            this.timer = Math.random() * 60;
            this.walkCycle = 0;
            this.peckCycle = 0;
            this.alarm = 0;

            // Airborne state, for the panicked hop-flutter away from the cow
            this.z = 0;
            this.vz = 0;
            this.flyVx = 0;
            this.flyVy = 0;
            this.wingCycle = 0;
            this.flutterCd = 0;
            this.faceCd = 0;
            this.layCd = 0;
            this.hunger = 0;
            this.countedPlump = fatness >= PLUMP_THRESHOLD;

            // Once there are enough of them, chickens take up hobbies.
            this.job = null;      // build | guard | sit | soccer | inside
            this.site = null;     // the project they belong to
            this.slot = 0;        // which position on that project is theirs
            this.tool = 0;
            this.workCycle = 0;
            this.atPost = false;  // actually standing on their mark, doing work
            this.hidden = false;  // drawn by a building instead of by the flock
            this.safe = false;    // tucked up inside the castle, can't be eaten
            this.sitting = false;
            this.guardCd = 0;
            this.jab = 0;
            this.stayCd = 0;      // frames left on this shift
            this.jobCd = 0;       // must go and eat before taking another one
            this.shopCd = 0;      // time left at the front of the market queue

            // Each bird keeps its own patch of yard and mooches around it, so
            // the flock spreads out instead of orbiting one spot.
            this.homeX = this.x;
            this.homeY = this.y;
            this.roam = 90 + Math.random() * 70;
        }

        get size() { return this.baseSize * this.fatness; }

        releaseFood() {
            if (this.targetFood && this.targetFood.claimedBy === this) this.targetFood.claimedBy = null;
            this.targetFood = null;
        }

        // Off with the bear, never to return
        startExodus(dirX) {
            this.state = 'exodus';
            this.z = Math.max(this.z, 2);
            this.vz = 2.2 + Math.random() * 1.2;
            this.flyVx = dirX * (2.8 + Math.random() * 1.8);
            this.flyVy = -0.2 - Math.random() * 0.5;
            this.facingDir = dirX > 0 ? 1 : -1;
            this.alarm = 0;
            this.releaseFood();
            puff(this.x, this.y, 7, '#ffd6f5', 1.8);
        }

        // A well-fed hen drops a whole clutch, then slims back down. This is
        // the loop: more corn -> fatter birds -> more eggs -> more birds.
        layClutch() {
            let room = CHICKEN_CAP - chickens.length - eggs.length;
            if (room <= 0) { this.layCd = 60 * 5; return; }
            let n = Math.min(room, 1 + Math.floor(Math.random() * 2));
            for (let i = 0; i < n; i++) {
                let a = Math.random() * Math.PI * 2;
                let r = 12 + Math.random() * 24;
                let e = new Egg(this.x + Math.cos(a) * r, this.y + Math.sin(a) * r * 0.5);
                e.crazy = crazyEra() && Math.random() < CRAZY_HATCH;
                eggs.push(e);
            }
            // She stays (just) plump through a clutch, so the flock still grows
            this.fatness = Math.max(1.0, this.fatness - 0.25);
            this.countedPlump = this.fatness >= PLUMP_THRESHOLD; // can earn it again
            this.layCd = 60 * 10;
            addScore(30); // laying a nest is good farming
            puff(this.x, this.y, 9, '#fff3c4', 1.6);
            heart(this.x, this.y - this.size);
            sndCluck();
        }

        // Chickens can't really fly, but they can panic upwards for a moment.
        // Crazy birds do it unprovoked, so the alarm marker is optional.
        flutter(fromX, fromY, spooked = true) {
            let a = Math.atan2(this.y - fromY, this.x - fromX);
            let power = 3.2 + Math.random();
            this.vz = 4.5 + Math.random() * 1.5;
            this.flyVx = Math.cos(a) * power;
            this.flyVy = Math.sin(a) * power * 0.5;
            this.facingDir = this.flyVx > 0 ? 1 : -1;
            this.faceCd = 20;
            this.flutterCd = spooked ? 110 : 40;
            sndFlap();
            this.state = 'flee';
            if (spooked) this.alarm = 45;
            this.releaseFood();
            puff(this.x, this.y, 6, '#d8e2c4', 1.5);
            for (let i = 0; i < 5; i++) {
                particles.push(new Particle(this.x, this.y, {
                    z: 6, vx: (Math.random() - 0.5) * 1.6, vy: (Math.random() - 0.5) * 0.8,
                    vz: 1 + Math.random() * 2, gravity: 0.06, life: 45,
                    color: '#ffffff', size: 3, kind: 'feather'
                }));
            }
        }

        // Personal space. Push apart from anyone standing too close, weighted
        // by how badly they overlap so it fades to zero at the edge (no jitter).
        separate() {
            let sx = 0, sy = 0, n = 0;
            let myR = 16 + this.size * 0.7;
            let mob = nearHens(this.x, this.y);
            for (let i = 0; i < mob.length; i++) {
                let o = mob[i];
                if (o === this || o.dead || o.hidden) continue;
                let dx = this.x - o.x;
                let dy = (this.y - o.y) * 2; // perspective: depth counts double
                let d2 = dx * dx + dy * dy;
                let r = myR + o.size * 0.7;
                if (d2 > 0.01 && d2 < r * r) {
                    let d = Math.sqrt(d2);
                    let w = 1 - d / r;
                    sx += (dx / d) * w;
                    sy += (dy / d) * w;
                    n++;
                }
            }
            if (n === 0) return;
            // Shove less while eating, so a bird isn't nudged off its kernel
            let push = (this.state === 'peck') ? 0.3 : 0.9;
            this.x = clampX(this.x + sx * push);
            this.y = clampY(this.y + sy * push * 0.5);
        }

        update() {
            // Victory parade: waddle to the coop and pop inside
            if (this.state === 'toCoop') {
                if (!coop) { this.state = 'wander'; return; }
                let dx = coop.doorX - this.x, dy = coop.doorY - this.y;
                let d = Math.hypot(dx, dy);
                this.walkCycle += 0.3;
                if (d < 10) {
                    // in you go!
                    this.dead = true;
                    chickensHoused++;
                    puff(coop.doorX, coop.doorY, 8, '#fff2c8', 1.4);
                    // only a few of them get their own burst -- with a flock this
                    // big, one each would bury the whole screen in paper
                    if (Math.random() < 0.06) spawnConfetti(5);
                    if (Math.random() < 0.25) sndCluck();
                } else {
                    let sp = 3.4;   // three hundred birds is a lot of parade
                    this.x += (dx / d) * sp;
                    this.y += (dy / d) * sp;
                    if (dx > 1) this.facingDir = 1; else if (dx < -1) this.facingDir = -1;
                }
                return;
            }
            // Leaving for good -- climb away and don't come back
            if (this.state === 'exodus') {
                this.z += this.vz;
                this.vz = Math.min(this.vz + 0.04, 4.5);
                this.x += this.flyVx;
                this.y += this.flyVy;
                this.wingCycle += 1.0;
                if (this.x < -90 || this.x > canvas.width + 90 || this.z > 420) {
                    this.dead = true;
                    crazyDeparted++;
                }
                return;
            }

            // --- Has this one got a job on? ---
            // A hen tucked up in a house is safe, but there is nothing to eat
            // in there -- she doesn't grow an ounce. Sooner or later she has to
            // come back out, find some corn, and let somebody else have her bed.
            if (this.job) {
                if (this.stayCd > 0 && --this.stayCd <= 0) {
                    puff(this.x, this.y - 12, 4, '#fff2c8', 1.3);
                    this.jobCd = 60 * (9 + Math.random() * 9);   // off to find her supper
                    releaseJob(this);
                } else {
                    // indoors, on the wall, or going round on a ride: the building runs them
                    if (this.job === 'inside' || this.job === 'patrol' || this.job === 'ride') return;
                    if (this.updateJob()) return;
                }
            }
            if (this.jobCd > 0) this.jobCd--;

            // Chicks grow to full size on their own. Past 1.0 you only get
            // fatter by eating, and it is deliberately glacial.
            if (this.fatness < 1) this.fatness = Math.min(1, this.fatness + 0.0012);
            if (this.layCd > 0) this.layCd--;

            // Metabolism: a plump hen slowly slims back toward normal, so you
            // have to keep the whole flock fed to hold them all plump at once.
            if (this.fatness > 1.0) this.fatness = Math.max(1.0, this.fatness - METAB_PER_FRAME);

            this.separate();

            if (this.faceCd > 0) this.faceCd--;
            if (this.flutterCd > 0) this.flutterCd--;

            // --- Airborne: nothing else matters until we land ---
            if (this.z > 0 || this.vz > 0) {
                this.z += this.vz;
                this.vz -= 0.45;
                this.x = clampX(this.x + this.flyVx);
                this.y = clampY(this.y + this.flyVy);
                this.flyVx *= 0.97;
                this.flyVy *= 0.97;
                this.wingCycle += 0.9;
                if (this.z <= 0) {
                    this.z = 0; this.vz = 0; this.flyVx = 0; this.flyVy = 0;
                    puff(this.x, this.y, 5, '#c9d8a8', 1.2);
                    this.state = 'flee';
                }
                if (this.alarm > 0) this.alarm--;
                return;
            }

            // Crazy birds go off like popcorn, for no reason whatsoever
            if (this.crazy) {
                this.wobble += 0.3;
                if (this.flutterCd <= 0 && Math.random() < 0.006) {
                    this.flutter(this.x - (Math.random() - 0.5) * 60,
                                 this.y - (Math.random() - 0.5) * 60, false);
                    return;
                }
            }

            // Cow or bear about to trample us? Get airborne.
            if (this.flutterCd <= 0) {
                let bully = nearestBully(this.x, this.y, 90);
                if (bully) { this.flutter(bully.obj.x, bully.obj.y); return; }
            }

            let currentSpeed = this.baseSpeed / Math.max(0.5, this.fatness);
            let isMoving = false;

            // Check for threats (Cow or Fox)
            let nearestThreatDist = Infinity;
            let threatX = 0, threatY = 0;

            for (let c of cows) {
                let d = dist(this.x, this.y, c.x, c.y);
                if (d < 130 && d < nearestThreatDist) { nearestThreatDist = d; threatX = c.x; threatY = c.y; }
            }
            // A hen keeps clear of anything with teeth on her own -- even while
            // walking to corn, she'll go around. The ONE exception is when the
            // corn she's after is sitting right inside the danger: greed wins.
            let chasingFood = (this.state === 'seek' && this.targetFood && !this.targetFood.consumed);
            let lureX = chasingFood ? this.targetFood.x : 0;
            let lureY = chasingFood ? this.targetFood.y : 0;
            // She only clocks a predator quite late -- she is not a clever bird.
            for (let z of killZones()) {
                if (chasingFood && dist(lureX, lureY, z.x, z.y) < z.kill + 65) continue; // corn is in there
                let d = dist(this.x, this.y, z.x, z.y);
                if (d < z.scare * HEN_PREDATOR_SENSE && d < nearestThreatDist) {
                    nearestThreatDist = d; threatX = z.x; threatY = z.y;
                }
            }

            if (nearestThreatDist < 220) {
                this.state = 'flee';
                this.releaseFood();
                this.alarm = 20;
                let esc = pickEscapeTarget(this.x, this.y, threatX, threatY, 120);
                this.moveTo(esc.x, esc.y, currentSpeed * 1.6);
                this.walkCycle += 0.35 * currentSpeed;
                return;
            } else if (this.state === 'flee') {
                this.state = 'wander'; // Safe now
            }
            if (this.alarm > 0) this.alarm--;

            if (this.state === 'peck') {
                this.peckCycle--;
                if (this.peckCycle <= 0) {
                    if (this.targetFood && !this.targetFood.consumed) {
                        this.targetFood.consumed = true;
                        this.hunger = 0; // fed
                        sndPeck();
                        if (Math.random() < 0.10) sndCluck();
                        addScore(2); // a little something for every bite
                        // Get fatter -- very, very slowly. Cap at 2.2
                        if (Math.random() < 0.15) heart(this.x, this.y - this.size);
                        feedHen(this, FATTEN_PER_KERNEL);
                    }
                    this.state = 'wander'; this.targetFood = null; this.timer = 20;
                }
                return;
            }

            if (this.state === 'wander') {
                // Go for the nearest kernel nobody else has called dibs on
                let closest = null; let minDist = Infinity;
                // Look in the neighbouring cells first. Only when the field is
                // nearly bare is it cheap enough to go looking everywhere.
                let pool = nearCorn(this.x, this.y);
                if (pool.length === 0 && foods.length <= 260) pool = foods;
                for (let i = 0; i < pool.length; i++) {
                    let f = pool[i];
                    if (f.consumed) continue;
                    if (f.claimedBy && f.claimedBy !== this && !f.claimedBy.dead) continue;
                    let d = dist(this.x, this.y, f.x, f.y);
                    // small random tiebreak so equidistant birds don't all agree
                    d *= 0.85 + Math.random() * 0.3;
                    if (d < 460 && d < minDist) { minDist = d; closest = f; }
                }

                if (closest) {
                    this.targetFood = closest;
                    closest.claimedBy = this;
                    this.state = 'seek';
                } else {
                    this.timer--;
                    if (this.timer <= 0) {
                        // Now and then, up sticks and move the whole home range
                        if (Math.random() < 0.12) {
                            this.homeX = playArea.minX + Math.random() * (playArea.maxX - playArea.minX);
                            this.homeY = playArea.minY + Math.random() * (playArea.maxY - playArea.minY);
                        }
                        let a = Math.random() * Math.PI * 2;
                        let r = Math.random() * this.roam * (this.crazy ? 1.6 : 1);
                        this.tX = clampX(this.homeX + Math.cos(a) * r);
                        this.tY = clampY(this.homeY + Math.sin(a) * r * 0.5);
                        // Only occasionally does she think better of it
                        if (Math.random() < HEN_SMARTS && spotDanger(this.tX, this.tY)) {
                            for (let tries = 0; tries < 6; tries++) {
                                let a2 = Math.random() * Math.PI * 2;
                                let r2 = Math.random() * this.roam;
                                let nx = clampX(this.homeX + Math.cos(a2) * r2);
                                let ny = clampY(this.homeY + Math.sin(a2) * r2 * 0.5);
                                if (!spotDanger(nx, ny)) { this.tX = nx; this.tY = ny; break; }
                            }
                        }
                        // crazy birds change their minds constantly
                        this.timer = this.crazy ? 12 + Math.random() * 22 : 50 + Math.random() * 70;
                    }
                    if (this.tX !== undefined) { isMoving = this.moveTo(this.tX, this.tY, currentSpeed); }
                }
            }

            if (this.state === 'seek') {
                if (!this.targetFood || this.targetFood.consumed) {
                    this.state = 'wander'; this.releaseFood();
                } else {
                    let d = dist(this.x, this.y, this.targetFood.x, this.targetFood.y);
                    if (d <= 8) {
                        this.state = 'peck'; this.peckCycle = 15;
                    } else {
                        isMoving = this.moveTo(this.targetFood.x, this.targetFood.y, currentSpeed);
                    }
                }
            }

            this.walkCycle = isMoving ? this.walkCycle + 0.2 * currentSpeed : 0;
        }

        // --- WORKING CHICKENS ------------------------------------------
        // Anything with teeth nearby? Down tools.
        jobScared() {
            let z = killZones();
            for (let i = 0; i < z.length; i++) {
                if (dist(this.x, this.y, z[i].x, z[i].y) < z[i].scare * 0.85) return z[i];
            }
            return null;
        }

        updateJob() {
            if (this.job === 'build')  return this.doBuild();
            if (this.job === 'guard')  return this.doGuard();
            if (this.job === 'sit')    return this.doSit();
            if (this.job === 'soccer') return this.doSoccer();
            if (this.job === 'shop')   return this.doShop();
            return false;
        }

        // Walk to your mark on the site and swing your tool at it.
        doBuild() {
            let site = this.site;
            if (!site || site.done) { releaseJob(this); return false; }
            if (this.jobScared()) {          // downs tools, hard hat and all
                puff(this.x, this.y - 12, 3, '#ffd23b', 1.3);
                releaseJob(this);
                return false;
            }
            let p = site.slotPos(this.slot);
            if (dist(this.x, this.y, p.x, p.y) > 11) {
                this.atPost = false;
                this.moveTo(p.x, p.y, this.baseSpeed * 1.15);
                this.walkCycle += 0.3;
            } else {
                this.atPost = true;
                this.walkCycle = 0;
                this.workCycle += 0.2;
                this.face(site.x - this.x);
                // sawdust flying off at the top of every swing
                if (Math.sin(this.workCycle) > 0.985) {
                    puff(this.x + this.facingDir * 10, this.y - this.size, 2, '#e0cba8', 1.0);
                }
            }
            return true;
        }

        // Pitchfork brigade: patrol the yard, and see off anything that turns up.
        doGuard() {
            if (this.guardCd > 0) this.guardCd--;
            if (this.jab > 0) this.jab--;
            this.walkCycle += 0.3;
            let best = null, bestD = 440;
            for (let pr of predators) {
                if (pr.scared || pr.hasChicken) continue;
                let d = dist(this.x, this.y, pr.x, pr.y);
                if (d < bestD) { bestD = d; best = pr; }
            }
            if (best && this.guardCd <= 0) {
                this.moveTo(best.x, best.y, this.baseSpeed * 1.55);
                this.alarm = 0;
                if (bestD < 42) {
                    this.guardCd = 100;
                    this.jab = 20;
                    if (Math.random() < 0.7) {
                        best.scare();
                        foxesZapped++; addScore(200);
                        showBanner('THE GUARDS SEE IT OFF!', '#8aff6b');
                        sndSparkle();
                        puff(best.x, best.y, 14, '#ffe14d', 2.6);
                    } else {
                        // shrugged it off -- and now the guard has second thoughts
                        this.flutter(best.x, best.y);
                        this.guardCd = 150;
                    }
                }
            } else {
                // a slow loop of the whole yard
                this.patrolT = (this.patrolT === undefined ? Math.random() * 6.283 : this.patrolT) + 0.007;
                this.moveTo(clampX(canvas.width / 2 + Math.cos(this.patrolT) * canvas.width * 0.33),
                            clampY((playArea.minY + playArea.maxY) / 2 + Math.sin(this.patrolT) * 140),
                            this.baseSpeed * 0.85);
            }
            return true;
        }

        // Sit round the campfire toasting a marshmallow, as chickens do.
        doSit() {
            let site = this.site;
            if (!site || !site.done) { releaseJob(this); return false; }
            if (this.jobScared()) { releaseJob(this); return false; }
            let p = site.slotPos(this.slot, true);
            if (dist(this.x, this.y, p.x, p.y) > 9) {
                this.sitting = false;
                this.moveTo(p.x, p.y, this.baseSpeed);
                this.walkCycle += 0.26;
            } else {
                this.sitting = true;
                this.walkCycle = 0;
                this.workCycle += 0.05;
                this.face(site.x - this.x);
            }
            return true;
        }

        // Queue at the stall, pay for a beakful, toddle off happy.
        doShop() {
            let site = this.site;
            if (!site || !site.done) { releaseJob(this); return false; }
            if (this.jobScared()) { releaseJob(this); return false; }
            let p = site.queuePos(this.slot);
            if (dist(this.x, this.y, p.x, p.y) > 8) {
                this.moveTo(p.x, p.y, this.baseSpeed);
                this.walkCycle += 0.26;
                return true;
            }
            this.walkCycle = 0;
            this.face(site.x - this.x);
            if (this.slot !== 0) return true;          // still waiting your turn
            if (site.stock < 1) { this.shopCd = 30; return true; }   // sold out for a moment
            if (this.shopCd <= 0) { this.shopCd = 75; return true; } // being served
            if (--this.shopCd <= 0) {
                site.stock--;
                feedHen(this, MARKET_MEAL);
                heart(this.x, this.y - this.size);
                puff(this.x, this.y - 10, 4, '#ffe14d', 1.2);
                addScore(15);
                sndPeck();
                this.jobCd = 60 * (5 + Math.random() * 5);
                releaseJob(this);
                return false;
            }
            return true;
        }

        // Chase the ball. That's the whole job.
        doSoccer() {
            if (!ball) { releaseJob(this); return false; }
            if (this.jobScared()) { releaseJob(this); return false; }
            this.moveTo(ball.x, ball.y, this.baseSpeed * 1.4);
            this.walkCycle += 0.36;
            return true;
        }

        // Returns true only if we actually covered ground, so the walk cycle
        // can't keep running while the bird is standing still.
        moveTo(tx, ty, speed) {
            let dx = tx - this.x; let dy = ty - this.y;
            let d = Math.sqrt(dx * dx + dy * dy);
            let moved = false;
            if (d > 1) {
                this.x += (dx / d) * speed;
                this.y += (dy / d) * (speed * 0.7);
                moved = true;
            }
            this.face(dx);

            this.x = clampX(this.x);
            this.y = clampY(this.y);
            return moved;
        }

        // Turning needs a deadzone and a cooldown, otherwise a bird wedged
        // against the fence flips left/right every single frame.
        face(dx) {
            if (this.faceCd > 0) return;
            let want = dx > 3 ? 1 : (dx < -3 ? -1 : 0);
            if (want !== 0 && want !== this.facingDir) {
                this.facingDir = want;
                this.faceCd = 12;
            }
        }

        draw() {
            let size = this.size;
            let lift = this.z;
            let sScale = 1 / (1 + lift * 0.02);
            drawShadow(this.x, this.y, size * 0.8 * sScale, size * 0.3 * sScale);

            ctx.save();
            ctx.translate(this.x, this.y - lift);
            ctx.scale(this.facingDir, 1);

            if (this.state === 'peck') {
                ctx.rotate(Math.sin((this.peckCycle / 15) * Math.PI) * (Math.PI / 4));
            }
            ctx.translate(0, -Math.abs(Math.sin(this.walkCycle)) * 3);
            if (this.sitting) ctx.translate(0, size * 0.36);   // parked on her bottom

            // Legs (grounded stride only -- airborne legs are drawn dangling below)
            if (lift === 0 && !this.sitting) {
                ctx.strokeStyle = '#ffa500'; ctx.lineWidth = 2; ctx.beginPath();
                let ls1 = Math.sin(this.walkCycle) * 5; let ls2 = Math.sin(this.walkCycle + Math.PI) * 5;
                ctx.moveTo(-size * 0.2, size * 0.3); ctx.lineTo(-size * 0.2 + ls1, size * 0.8);
                ctx.moveTo(size * 0.2, size * 0.3); ctx.lineTo(size * 0.2 + ls2, size * 0.8);
                ctx.stroke();
            }

            // Wings beating hard while airborne
            if (lift > 0) {
                let f = Math.sin(this.wingCycle) * 14;
                ctx.fillStyle = '#fbfbfb';
                ctx.strokeStyle = '#dddddd'; ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.moveTo(-size * 0.1, -size * 0.25);
                ctx.lineTo(-size * 0.7, -size * 0.5 - f);
                ctx.lineTo(size * 0.35, -size * 0.15 - f * 0.4);
                ctx.closePath(); ctx.fill(); ctx.stroke();
                // legs dangle rather than stride
                ctx.strokeStyle = '#ffa500'; ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(-size * 0.2, size * 0.3); ctx.lineTo(-size * 0.35, size * 0.9);
                ctx.moveTo(size * 0.2, size * 0.3); ctx.lineTo(size * 0.05, size * 0.9);
                ctx.stroke();
            }

            // Wings out when running for your life
            if (this.state === 'flee' && lift === 0) {
                let flap = Math.sin(this.walkCycle * 2) * 6;
                ctx.fillStyle = '#f2f2f2';
                ctx.beginPath();
                ctx.moveTo(-size * 0.2, -size * 0.2);
                ctx.lineTo(-size * 0.9, -size * 0.5 - flap);
                ctx.lineTo(-size * 0.3, size * 0.2);
                ctx.fill();
            }

            // Body
            ctx.fillStyle = this.crazy ? this.bodyColor
                : (this.fatness < 0.6 ? '#fff5cc' : '#ffffff'); // Baby is yellowish
            ctx.strokeStyle = this.crazy ? 'rgba(0,0,0,0.3)' : '#dddddd'; ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(size, 0); ctx.lineTo(-size * 0.8, -size * 0.7); ctx.lineTo(-size * 0.6, size * 0.5);
            ctx.closePath(); ctx.fill(); ctx.stroke();

            // Beak
            ctx.fillStyle = '#ffa500'; ctx.beginPath();
            ctx.moveTo(size - 2, -2); ctx.lineTo(size + 8 * this.fatness, 2); ctx.lineTo(size - 2, 6);
            ctx.fill();

            // Comb/Wattle (Only if grown). Crazy birds get a ridiculous mohawk.
            if (this.fatness >= 0.8) {
                ctx.fillStyle = '#cc0000'; ctx.beginPath();
                ctx.moveTo(size - 8, -size * 0.4); ctx.lineTo(size - 4, -size * 0.8); ctx.lineTo(size, -size * 0.3); ctx.fill();
                ctx.beginPath(); ctx.arc(size - 4, 6, 3 * this.fatness, 0, Math.PI * 2); ctx.fill();
                if (this.crazy) {
                    for (let i = 0; i < 3; i++) {
                        let bx = size - 12 + i * 5;
                        let flop = Math.sin(this.wobble + i) * 3;
                        ctx.beginPath();
                        ctx.moveTo(bx, -size * 0.4);
                        ctx.lineTo(bx + 2 + flop, -size * 1.25);
                        ctx.lineTo(bx + 5, -size * 0.35);
                        ctx.fill();
                    }
                }
            }

            // Eye -- googly and rolling if this one is unhinged
            if (this.crazy) {
                ctx.fillStyle = '#ffffff';
                ctx.beginPath(); ctx.arc(size - 6, -2, 3.4, 0, Math.PI * 2); ctx.fill();
                ctx.fillStyle = 'black';
                ctx.beginPath();
                ctx.arc(size - 6 + Math.cos(this.wobble * 1.7) * 1.5,
                        -2 + Math.sin(this.wobble * 2.3) * 1.5, 1.7, 0, Math.PI * 2);
                ctx.fill();
            } else {
                ctx.fillStyle = 'black';
                ctx.beginPath(); ctx.arc(size - 6, -2, 2, 0, Math.PI * 2); ctx.fill();
            }

            // --- Kit: hard hats, tools, pitchforks, marshmallows ---
            if (this.job === 'build') {
                drawHardHat(size);
                ctx.save();
                ctx.translate(size * 0.55, -size * 0.15);
                ctx.rotate(-0.55 - Math.sin(this.workCycle) * (this.atPost ? 1.0 : 0.15));
                drawTool(this.tool, size);
                ctx.restore();
            } else if (this.job === 'guard') {
                drawHelmet(size);
                ctx.save();
                ctx.translate(size * 0.45, -size * 0.2);
                ctx.rotate(this.jab > 0 ? 1.35 : -0.3 + Math.sin(this.walkCycle) * 0.14);
                drawPitchfork(size);
                ctx.restore();
            }
            if (this.sitting) drawMarshmallow(size);
            ctx.restore();

            // Panic marker floats above, drawn unflipped
            if (this.alarm > 0) {
                let my = this.y - lift - size * 2.2;
                ctx.fillStyle = '#ff2b2b';
                ctx.fillRect(this.x - 1, my, 3, 7);
                ctx.fillRect(this.x - 1, my + 9, 3, 3);
            }

            // Hunger meter -- appears only once a bird is in trouble
            if (this.hunger > HUNGER_WARN) {
                let t = (this.hunger - HUNGER_WARN) / (STARVE_FRAMES - HUNGER_WARN);
                let by = this.y - lift - size * 1.7;
                ctx.fillStyle = 'rgba(0,0,0,0.45)';
                ctx.fillRect(this.x - 9, by, 18, 4);
                ctx.fillStyle = t > 0.66 ? '#ff3b3b' : '#ffa53b';
                ctx.fillRect(this.x - 8, by + 1, 16 * (1 - t), 2);
            }
        }
    }

    const HORSE_SCALE = 1.35; // a horse should clearly dwarf a chicken

    class Horse {
        constructor(x, y) {
            this.x = x; this.y = y;
            this.facingDir = 1;
            this.speed = 2.0;
            this.state = 'wander';
            this.targetFood = null;
            this.timer = 0;
            this.walkCycle = 0;
            this.peckCycle = 0;
            this.peckMax = 42; // long enough to see a proper graze + chew
            this.faceCd = 0;
            this.galloping = false;
            this.trot = false;
            this.plump = 0;   // 0..1 -- rounder and slower, never taller
            this.poopCd = 60 * (18 + Math.random() * 18);
            this.fleeTimer = 0;
            this.fleeX = 0;
            this.fleeY = 0;
            this.dustCd = 0;
        }

        // A round horse is a slow horse
        get moveSpeed() { return this.speed * (1 - 0.7 * this.plump); }

        update() {
            let isMoving = false;
            this.galloping = false;
            if (this.faceCd > 0) this.faceCd--;
            if (this.dustCd > 0) this.dustCd--;

            // Horses go too -- and the rounder it gets, the more often and the
            // more impressive the result
            if (--this.poopCd <= 0) {
                this.poopCd = 60 * ((20 + Math.random() * 20) * (1 - 0.55 * this.plump));
                let px = clampX(this.x - (26 + this.plump * 20) * this.facingDir);
                let py = clampY(this.y + 3);
                poops.push(new Poop(px, py, 0.8 + this.plump * 0.7));
                if (poops.length > POOP_MAX) { let old = poops.shift(); old.active = false; }
                sndPlop();
                puff(px, py, 3 + Math.round(this.plump * 4), '#6b5236', 0.8 + this.plump * 0.6);
            }

            // Flee from cows and bears
            let bully = nearestBully(this.x, this.y, 170);
            // A thunderclap keeps it running even with nothing chasing it
            let spooked = !bully && this.state === 'flee' && this.fleeTimer > 0;

            if (bully || spooked) {
                // Commit to one escape heading and hold it -- recomputing the
                // angle every frame is what made it judder on the spot. Re-plan
                // early if the threat has closed in on our chosen route anyway.
                if (bully) {
                    let stale = this.fleeTimer <= 0 ||
                        dist(this.fleeX, this.fleeY, bully.obj.x, bully.obj.y) < 150;
                    if (this.state !== 'flee' || stale) {
                        let esc = pickEscapeTarget(this.x, this.y, bully.obj.x, bully.obj.y, 260);
                        this.fleeX = esc.x;
                        this.fleeY = esc.y;
                        this.fleeTimer = 45 + Math.random() * 30;
                    }
                }
                this.fleeTimer--;
                this.state = 'flee';
                this.targetFood = null;
                this.galloping = true;
                this.moveTo(this.fleeX, this.fleeY, this.moveSpeed * 1.7);
                this.walkCycle += 0.34;
                this.kickDust();
                return;
            } else if (this.state === 'flee') {
                this.state = 'wander';
                this.fleeTimer = 0;
            }

            if (this.state === 'peck') {
                this.peckCycle--;
                // little flecks of corn kicked up while the muzzle is down
                if (this.peckCycle < this.peckMax * 0.7 && this.peckCycle % 9 === 0) {
                    puff(this.x + 44 * this.facingDir, this.y + 8, 2, '#ffcc00', 0.5);
                }
                if (this.peckCycle <= 0) {
                    if (this.targetFood && !this.targetFood.consumed) {
                        this.targetFood.consumed = true;
                        // Corn goes straight to the belly -- very gradually
                        if (this.plump < 1) this.plump = Math.min(1, this.plump + HORSE_PLUMP_PER_KERNEL);
                        if (Math.random() < 0.4) heart(this.x, this.y - 40);
                        if (Math.random() < 0.12) sndNeigh();
                    }
                    this.state = 'wander'; this.targetFood = null; this.timer = 10;
                }
                return;
            }

            if (this.state === 'wander') {
                let closest = null; let minDist = Infinity;
                for (let f of foods) {
                    if (f.consumed) continue;
                    let d = dist(this.x, this.y, f.x, f.y);
                    if (d < 500 && d < minDist) { minDist = d; closest = f; }
                }

                if (closest) {
                    this.targetFood = closest; this.state = 'seek';
                } else {
                    this.timer--;
                    if (this.timer <= 0) {
                        // Every so often, take off across the field for the fun of it
                        this.trot = Math.random() < 0.35;
                        let reach = this.trot ? 340 : 150;
                        this.tX = clampX(this.x + (Math.random() - 0.5) * reach);
                        this.tY = clampY(this.y + (Math.random() - 0.5) * reach * 0.45);
                        this.timer = this.trot ? 90 + Math.random() * 60 : 60 + Math.random() * 60;
                    }
                    if (this.tX !== undefined) {
                        isMoving = this.moveTo(this.tX, this.tY, this.trot ? this.moveSpeed * 1.35 : this.moveSpeed * 0.6);
                        if (isMoving && this.trot) { this.galloping = true; this.kickDust(); }
                    }
                }
            }

            if (this.state === 'seek') {
                if (!this.targetFood || this.targetFood.consumed) {
                    this.state = 'wander'; this.targetFood = null;
                } else {
                    let d = dist(this.x, this.y, this.targetFood.x, this.targetFood.y);
                    if (d <= 30) {
                        this.state = 'peck'; this.peckCycle = this.peckMax;
                    } else {
                        isMoving = this.moveTo(this.targetFood.x, this.targetFood.y, this.moveSpeed);
                    }
                }
            }
            // Past a certain size, galloping is simply off the table
            if (this.plump > 0.65) this.galloping = false;

            // Sweating and wheezing under its own weight
            if (this.plump > 0.45 && isMoving) {
                if (Math.random() < 0.05) {
                    particles.push(new Particle(this.x + 26 * this.facingDir, this.y - 42, {
                        vx: (Math.random() - 0.4) * 0.9 * this.facingDir, vy: -0.15,
                        vz: 1.1, gravity: 0.12, life: 28, color: '#bfe6ff', size: 3
                    }));
                }
                if (this.plump > 0.8 && Math.random() < 0.03) {
                    puff(this.x, this.y + 2, 2, '#9aa87a', 0.7);
                }
            }

            this.walkCycle = isMoving ? this.walkCycle + (this.galloping ? 0.34 : 0.2 - this.plump * 0.09) : 0;
        }

        // Thunderclap: bolt away from the strike at a full gallop
        spook(fromX, fromY) {
            let esc = pickEscapeTarget(this.x, this.y, fromX, fromY, 300);
            this.fleeX = esc.x;
            this.fleeY = esc.y;
            this.fleeTimer = 70 + Math.random() * 40;
            this.state = 'flee';
            this.targetFood = null;
            this.trot = true;
        }

        // Divots thrown up by the hooves at speed
        kickDust() {
            if (this.dustCd > 0) return;
            this.dustCd = 5;
            puff(this.x - 18 * this.facingDir, this.y + 4, 2, '#8f9c6a', 0.9);
        }

        moveTo(tx, ty, speed) {
            let dx = tx - this.x; let dy = ty - this.y;
            let d = Math.sqrt(dx * dx + dy * dy);
            let moved = false;
            if (d > 1) {
                this.x += (dx / d) * speed;
                this.y += (dy / d) * (speed * 0.7);
                moved = true;
            }
            this.face(dx);

            this.x = clampX(this.x);
            this.y = clampY(this.y);
            return moved;
        }

        face(dx) {
            if (this.faceCd > 0) return;
            let want = dx > 4 ? 1 : (dx < -4 ? -1 : 0);
            if (want !== 0 && want !== this.facingDir) {
                this.facingDir = want;
                this.faceCd = 15;
            }
        }

        draw() {
            let S = HORSE_SCALE;
            drawShadow(this.x, this.y, (25 + this.plump * 22) * S, (10 + this.plump * 6) * S);
            ctx.save();
            ctx.translate(this.x, this.y);
            ctx.scale(this.facingDir * S, S);

            // Walk = four legs out of phase. Gallop = a two-beat bound with the
            // front pair and back pair swinging together, and the body leaving
            // the ground between strides.
            let g = this.galloping;
