                    ctx.globalAlpha = 1;
                }
            }
        }

        // Poles, planks, a swinging load on a rope and some hazard tape
        drawScaffold(t) {
            let sp = this.spec, top = this.y - sp.h * t - 16;
            ctx.strokeStyle = '#b98b4e'; ctx.lineWidth = 3;
            for (let sgn = -1; sgn <= 1; sgn += 2) {
                let px = this.x + sgn * (sp.w + 12);
                ctx.beginPath(); ctx.moveTo(px, this.y + 6); ctx.lineTo(px, top); ctx.stroke();
            }
            ctx.lineWidth = 2;
            for (let yy = this.y - 14; yy > top; yy -= 28) {
                ctx.beginPath();
                ctx.moveTo(this.x - sp.w - 12, yy); ctx.lineTo(this.x + sp.w + 12, yy);
                ctx.stroke();
                // a diagonal brace, for the look of the thing
                ctx.strokeStyle = 'rgba(185,139,78,0.55)';
                ctx.beginPath();
                ctx.moveTo(this.x - sp.w - 12, yy); ctx.lineTo(this.x + sp.w + 12, yy - 28);
                ctx.stroke();
                ctx.strokeStyle = '#b98b4e';
            }
            // crane arm with a plank swinging off a rope
            let sway = Math.sin(this.crane) * 22;
            ctx.strokeStyle = '#8a94a0'; ctx.lineWidth = 4;
            ctx.beginPath();
            ctx.moveTo(this.x - sp.w - 30, this.y + 6);
            ctx.lineTo(this.x - sp.w - 30, top - 34);
            ctx.lineTo(this.x - sp.w * 0.1, top - 34);
            ctx.stroke();
            ctx.strokeStyle = '#e8e0c8'; ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(this.x - sp.w * 0.1, top - 34);
            ctx.lineTo(this.x - sp.w * 0.1 + sway, top - 6);
            ctx.stroke();
            ctx.fillStyle = '#c69b5f';
            ctx.save();
            ctx.translate(this.x - sp.w * 0.1 + sway, top - 4);
            ctx.rotate(Math.cos(this.crane) * 0.16);
            ctx.fillRect(-17, -3, 34, 6);
            ctx.restore();
            // hazard tape across the front
            ctx.lineWidth = 3;
            for (let i = 0; i < 9; i++) {
                ctx.strokeStyle = i % 2 ? '#1a1a1a' : '#ffd23b';
                let x0 = this.x - sp.w - 12 + (i * (sp.w + 12) * 2) / 9;
                ctx.beginPath();
                ctx.moveTo(x0, this.y + 8);
                ctx.lineTo(x0 + (sp.w + 12) * 2 / 9, this.y + 4);
                ctx.stroke();
            }
        }

        drawSign(t) {
            let sx = this.x + this.spec.w + 40, sy = this.y - 6;
            ctx.strokeStyle = '#8a6a3a'; ctx.lineWidth = 3;
            ctx.beginPath(); ctx.moveTo(sx, sy); ctx.lineTo(sx, sy - 30); ctx.stroke();
            ctx.fillStyle = '#f4ede0'; ctx.fillRect(sx - 44, sy - 58, 88, 30);
            ctx.strokeStyle = '#8a6a3a'; ctx.lineWidth = 2;
            ctx.strokeRect(sx - 44, sy - 58, 88, 30);
            ctx.textAlign = 'center';
            ctx.fillStyle = '#7a4a20';
            ctx.font = 'bold 9px "Courier New", monospace';
            ctx.fillText(this.spec.name, sx, sy - 47);
            ctx.fillStyle = 'rgba(0,0,0,0.25)';
            ctx.fillRect(sx - 36, sy - 42, 72, 8);
            ctx.fillStyle = '#8aff6b';
            ctx.fillRect(sx - 36, sy - 42, 72 * t, 8);
            ctx.fillStyle = '#3a2a1a';
            ctx.font = 'bold 8px "Courier New", monospace';
            ctx.fillText(Math.round(t * 100) + '%', sx, sy - 35);
            ctx.textAlign = 'left';
        }

        drawBuilding() {
            if (this.key === 'coop') this.drawCoopHouse();
            else if (this.key === 'barn') this.drawBarn();
            else if (this.key === 'castle') this.drawCastle();
            else if (this.key === 'fire') this.drawCampfire();
            else if (this.key === 'house') this.drawHouse();
            else if (this.key === 'market') this.drawMarket();
            else if (this.key === 'ride') this.drawCarousel();
            else if (this.key === 'ferris') this.drawFerris();
            else if (this.key === 'coast') this.drawCoaster();
            else this.drawHangar();
        }

        drawLife() {
            if (this.key === 'barn') this.drawBarnLife();
            else if (this.key === 'castle') this.drawCastleLife();
            else if (this.key === 'coop') this.drawCoopLife();
            else if (this.key === 'house') this.drawHouseLife();
        }

        // where the next customer in the queue should stand
        queuePos(i) {
            return { x: clampX(this.x - 8 - i * 25), y: clampY(this.y + 27 + i * 5) };
        }

        // --- a little hen house ---
        drawCoopHouse() {
            let x = this.x, y = this.y;
            drawShadow(x, y, 50, 13);
            ctx.fillStyle = '#b23c2e'; ctx.fillRect(x - 44, y - 58, 88, 60);
            ctx.fillStyle = '#7a2820';
            ctx.beginPath(); ctx.moveTo(x - 52, y - 55); ctx.lineTo(x, y - 86); ctx.lineTo(x + 52, y - 55); ctx.closePath(); ctx.fill();
            ctx.fillStyle = '#5f1f18'; ctx.fillRect(x - 52, y - 58, 104, 5);
            ctx.fillStyle = '#f4ede0'; ctx.fillRect(x - 44, y - 20, 88, 5);
            ctx.fillStyle = '#2a1712';
            ctx.beginPath(); ctx.arc(x, y - 10, 14, Math.PI, 0); ctx.fill();
            ctx.fillRect(x - 14, y - 10, 28, 10);
            ctx.fillStyle = '#8a6a3a'; ctx.fillRect(x - 11, y, 22, 5);
            ctx.fillStyle = '#ffd45e';
            ctx.beginPath(); ctx.arc(x - 28, y - 38, 7, 0, Math.PI * 2); ctx.fill();
            ctx.beginPath(); ctx.arc(x + 28, y - 38, 7, 0, Math.PI * 2); ctx.fill();
            ctx.strokeStyle = '#5f1f18'; ctx.lineWidth = 2;
            ctx.beginPath(); ctx.moveTo(x, y - 86); ctx.lineTo(x, y - 98); ctx.stroke();
            ctx.fillStyle = '#e8a020';
            ctx.beginPath();
            ctx.moveTo(x - 6, y - 98); ctx.lineTo(x + 6, y - 102); ctx.lineTo(x + 2, y - 96);
            ctx.lineTo(x + 8, y - 94); ctx.lineTo(x - 6, y - 92); ctx.closePath(); ctx.fill();
        }
        drawCoopLife() {
            // a hen popping in and out of the doorway, for no reason
            let ph = (frameCount * 0.008) % 1;
            if (ph > 0.55) return;
            let out = Math.sin(ph / 0.55 * Math.PI);
            ctx.save();
            ctx.beginPath(); ctx.rect(this.x - 16, this.y - 26, 32, 28); ctx.clip();
            drawMiniChicken(this.x - 6 + out * 12, this.y - 4, 7, 1, frameCount * 0.2, '#ffffff');
            ctx.restore();
        }

        // --- the barn ---

        // --- the castle: proper medieval masonry ---
        // Every stone is picked from a fixed hash of its position, so the
        // wall keeps the same face frame after frame instead of shimmering.
        drawCastle() {
            let x = this.x, y = this.y;
            drawShadow(x, y, 106, 22);
            const WALL = y - 64;
            const seed = (x * 7 + y) | 0;

            // curtain wall
            stoneWall(x - 92, WALL, 184, 66, seed);
            // machicolations -- the corbelled overhang under the parapet
            ctx.fillStyle = '#7e7e75';
            ctx.fillRect(x - 96, WALL - 5, 192, 6);
            ctx.fillStyle = '#66665f';
            for (let i = 0; i < 24; i++) ctx.fillRect(x - 94 + i * 8, WALL - 5, 4, 6);
            // battlements
            for (let i = 0; i < 9; i++) stoneWall(x - 92 + i * 21, WALL - 16, 13, 11, seed + i * 17);

            // towers
            for (let sgn = -1; sgn <= 1; sgn += 2) {
                let tx = x + sgn * 92;
                stoneWall(tx - 20, y - 98, 40, 100, seed + sgn * 91);
                // corbel course under the tower crown
                ctx.fillStyle = '#7e7e75';
                ctx.fillRect(tx - 24, y - 103, 48, 5);
                // tower battlements
                for (let i = 0; i < 3; i++) stoneWall(tx - 20 + i * 15, y - 113, 10, 11, seed + i * 41 + sgn);
                // slate roof, with courses of tiles
                ctx.fillStyle = '#49525c';
                ctx.beginPath();
                ctx.moveTo(tx - 26, y - 113); ctx.lineTo(tx, y - 150); ctx.lineTo(tx + 26, y - 113);
                ctx.closePath(); ctx.fill();
                ctx.strokeStyle = 'rgba(28,34,42,0.55)'; ctx.lineWidth = 1;
                for (let r = 1; r < 5; r++) {
                    let ry = y - 113 - r * 7.2, hw = 26 * (1 - r / 5.15);
                    ctx.beginPath(); ctx.moveTo(tx - hw, ry); ctx.lineTo(tx + hw, ry); ctx.stroke();
                }
                ctx.fillStyle = 'rgba(255,255,255,0.10)';
                ctx.beginPath();
                ctx.moveTo(tx - 26, y - 113); ctx.lineTo(tx, y - 150); ctx.lineTo(tx - 4, y - 113);
                ctx.closePath(); ctx.fill();
                // narrow arrow loop with its splayed sill
                ctx.fillStyle = '#2a2f36';
                ctx.fillRect(tx - 2, y - 88, 4, 15);
                ctx.fillRect(tx - 5, y - 78, 10, 4);
            }

            // gatehouse: a round-headed arch of wedge-shaped voussoir stones
            ctx.fillStyle = '#241d16';
            ctx.beginPath(); ctx.arc(x, y - 30, 20, Math.PI, 0); ctx.fill();
            ctx.fillRect(x - 20, y - 30, 40, 32);
            ctx.strokeStyle = '#a5a59a'; ctx.lineWidth = 7;
            ctx.beginPath(); ctx.arc(x, y - 30, 23.5, Math.PI, 0); ctx.stroke();
            ctx.strokeStyle = '#70706a'; ctx.lineWidth = 1;
            for (let i = 0; i <= 7; i++) {
                let a = Math.PI + (i / 7) * Math.PI;
                ctx.beginPath();
                ctx.moveTo(x + Math.cos(a) * 20, y - 30 + Math.sin(a) * 20);
                ctx.lineTo(x + Math.cos(a) * 27, y - 30 + Math.sin(a) * 27);
                ctx.stroke();
            }
            // jambs either side of the opening
            ctx.fillStyle = '#a5a59a';
            ctx.fillRect(x - 27, y - 30, 7, 32);
            ctx.fillRect(x + 20, y - 30, 7, 32);

            // studded oak gate
            ctx.fillStyle = '#6b4a2a';
            ctx.beginPath(); ctx.arc(x, y - 28, 17, Math.PI, 0); ctx.fill();
            ctx.fillRect(x - 17, y - 28, 34, 30);
            ctx.strokeStyle = '#54381f'; ctx.lineWidth = 1;
            for (let i = -3; i <= 3; i++) {
                ctx.beginPath(); ctx.moveTo(x + i * 5, y - 42); ctx.lineTo(x + i * 5, y + 2); ctx.stroke();
            }
            ctx.fillStyle = '#3d4148';
            ctx.fillRect(x - 17, y - 20, 34, 4);
            ctx.fillRect(x - 17, y - 6, 34, 4);
            ctx.fillStyle = '#5e646c';
            for (let i = -3; i <= 3; i++) {
                ctx.fillRect(x + i * 5 - 1, y - 19, 2, 2);
                ctx.fillRect(x + i * 5 - 1, y - 5, 2, 2);
            }
            // portcullis, half lowered
            ctx.strokeStyle = 'rgba(58,62,70,0.85)'; ctx.lineWidth = 2;
            for (let i = -2; i <= 2; i++) {
                ctx.beginPath(); ctx.moveTo(x + i * 8, y - 44); ctx.lineTo(x + i * 8, y - 32); ctx.stroke();
            }
            ctx.beginPath(); ctx.moveTo(x - 18, y - 34); ctx.lineTo(x + 18, y - 34); ctx.stroke();

            // a bit of weathering, so it doesn't read as brand new
            ctx.fillStyle = 'rgba(96,120,72,0.16)';
            ctx.beginPath(); ctx.ellipse(x - 62, y - 6, 24, 9, 0, 0, Math.PI * 2); ctx.fill();
            ctx.beginPath(); ctx.ellipse(x + 48, y - 4, 18, 7, 0, 0, Math.PI * 2); ctx.fill();

            // banner on the left tower
            let fx = x - 92, ft = frameCount * 0.09;
            ctx.strokeStyle = '#4a3a28'; ctx.lineWidth = 2;
            ctx.beginPath(); ctx.moveTo(fx, y - 150); ctx.lineTo(fx, y - 180); ctx.stroke();
            ctx.fillStyle = '#a32436';
            ctx.beginPath();
            ctx.moveTo(fx, y - 180);
            ctx.quadraticCurveTo(fx + 16, y - 178 + Math.sin(ft) * 4, fx + 32, y - 174 + Math.sin(ft + 1) * 5);
            ctx.lineTo(fx + 32, y - 160 + Math.sin(ft + 1) * 5);
            ctx.quadraticCurveTo(fx + 16, y - 164 + Math.sin(ft) * 4, fx, y - 166);
            ctx.closePath(); ctx.fill();
            // the family crest: a chicken, obviously
            ctx.fillStyle = '#f0e2b8';
            ctx.beginPath();
            ctx.moveTo(fx + 25, y - 170); ctx.lineTo(fx + 13, y - 175); ctx.lineTo(fx + 15, y - 165);
            ctx.closePath(); ctx.fill();
        }
        drawCastleLife() {
            let x = this.x, y = this.y;
            const WALL = y - 64;
            // the guard on the battlements, marching up and down
            for (let i = 0; i < this.patrol.length; i++) {
                let c = this.patrol[i];
                let ph = (frameCount * 0.0035 + i / Math.max(1, this.patrol.length)) % 1;
                let tri = ph < 0.5 ? ph * 2 : 2 - ph * 2;
                let px = x - 78 + tri * 156;
                drawMiniChicken(px, WALL - 14, 7.5, ph < 0.5 ? 1 : -1, frameCount * 0.24 + i,
                                c.crazy ? c.bodyColor : '#ffffff');
                // a pitchfork over the shoulder
                ctx.save();
                ctx.translate(px + (ph < 0.5 ? 4 : -4), WALL - 16);
                ctx.scale(ph < 0.5 ? 1 : -1, 1);
                ctx.rotate(-0.25);
                drawPitchfork(8);
                ctx.restore();
            }
            // everyone else peeping over the wall, safe as houses
            for (let i = 0; i < this.residents.length; i++) {

                let c = this.residents[i];
                ctx.save();

                drawMiniChicken(hx, WALL - 6 + bob, 7, i % 2 ? 1 : -1, 0,
                                c.crazy ? c.bodyColor : '#ffffff');
                ctx.restore();
            }
        }

        // --- the campfire ---
        drawCampfire() {
            let x = this.x, y = this.y;
            // ring of stones
            for (let i = 0; i < 9; i++) {
                let a = (i / 9) * Math.PI * 2;
                ctx.fillStyle = i % 2 ? '#8f959d' : '#a8aeb6';
                ctx.beginPath();
                ctx.ellipse(x + Math.cos(a) * 26, y + Math.sin(a) * 11, 7, 5, 0, 0, Math.PI * 2);
                ctx.fill();
            }
            // logs
            ctx.strokeStyle = '#7a5330'; ctx.lineWidth = 6; ctx.lineCap = 'round';
            ctx.beginPath();
            ctx.moveTo(x - 14, y + 3); ctx.lineTo(x + 12, y - 5);
            ctx.moveTo(x - 12, y - 5); ctx.lineTo(x + 14, y + 3);
            ctx.stroke(); ctx.lineCap = 'butt';
            if (this.done) drawFlame(x, y - 3, 1, frameCount);

        // --- a proper little house, for a person, built by chickens ---
        drawHouse() {
            let x = this.x, y = this.y;
            drawShadow(x, y, 54, 14);
            // walls, with a rendered cream finish and a stone base course
            ctx.fillStyle = '#f2e4c6'; ctx.fillRect(x - 48, y - 66, 96, 66);

            ctx.strokeStyle = '#6b4a2e'; ctx.lineWidth = 3;

            ctx.moveTo(x - 48, y - 40); ctx.lineTo(x + 48, y - 40);
            ctx.moveTo(x - 26, y - 66); ctx.lineTo(x - 26, y - 40);

            ctx.closePath(); ctx.fill();
            ctx.strokeStyle = 'rgba(70,32,24,0.5)'; ctx.lineWidth = 1;
            for (let r = 1; r < 6; r++) {
                let ry = y - 62 - r * 7, hw = 58 * (1 - r / 6.1);
                ctx.beginPath(); ctx.moveTo(x - hw, ry); ctx.lineTo(x + hw, ry); ctx.stroke();
            }
            ctx.fillStyle = 'rgba(255,255,255,0.12)';
            ctx.beginPath();
            ctx.moveTo(x - 58, y - 62); ctx.lineTo(x, y - 104); ctx.lineTo(x - 6, y - 62);
            ctx.closePath(); ctx.fill();
            ctx.fillStyle = '#6d3729'; ctx.fillRect(x - 58, y - 64, 116, 4);
            // brick chimney

            ctx.fillStyle = '#8c4a3a'; ctx.fillRect(x + 24, y - 112, 19, 5);
            ctx.strokeStyle = 'rgba(90,40,32,0.5)'; ctx.lineWidth = 1;
            for (let r = 1; r < 4; r++) {
                ctx.beginPath(); ctx.moveTo(x + 26, y - 108 + r * 7); ctx.lineTo(x + 41, y - 108 + r * 7); ctx.stroke();
            }
            // front door with a step and a knob
            ctx.fillStyle = '#6b4a2a'; ctx.fillRect(x - 11, y - 36, 22, 36);
            ctx.strokeStyle = '#54381f'; ctx.lineWidth = 1;
            for (let i = -1; i <= 1; i++) { ctx.beginPath(); ctx.moveTo(x + i * 7, y - 36); ctx.lineTo(x + i * 7, y); ctx.stroke(); }
            ctx.fillStyle = '#e8c24a';
            ctx.beginPath(); ctx.arc(x + 6, y - 18, 1.8, 0, Math.PI * 2); ctx.fill();
            ctx.fillStyle = '#9b9186'; ctx.fillRect(x - 15, y - 2, 30, 4);
            // two windows, warmly lit, with glazing bars and boxes of flowers
            for (let sgn = -1; sgn <= 1; sgn += 2) {
                let wx = x + sgn * 31;
                ctx.fillStyle = '#6b4a2e'; ctx.fillRect(wx - 13, y - 60, 26, 24);
                ctx.fillStyle = '#ffd97a'; ctx.fillRect(wx - 11, y - 58, 22, 20);
                ctx.strokeStyle = '#6b4a2e'; ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(wx, y - 58); ctx.lineTo(wx, y - 38);
                ctx.moveTo(wx - 11, y - 48); ctx.lineTo(wx + 11, y - 48);
                ctx.stroke();
                ctx.fillStyle = '#7a5330'; ctx.fillRect(wx - 14, y - 36, 28, 6);
                const petals = ['#e8506a', '#ffd23b', '#c58bff'];
                for (let i = 0; i < 4; i++) {
                    ctx.fillStyle = petals[i % 3];
                    ctx.beginPath(); ctx.arc(wx - 10 + i * 7, y - 37, 2.6, 0, Math.PI * 2); ctx.fill();

        }
        drawHouseLife() {
            let x = this.x, y = this.y;
            // smoke curling out of the chimney
            if (frameCount % 14 === 0) {
                particles.push(new Particle(x + 33, y - 114, {
                    z: 4, vx: 0.16 + Math.random() * 0.14, vy: -0.02,
                    vz: 0.7 + Math.random() * 0.5, gravity: -0.006, life: 90,
                    color: 'rgba(225,225,225,0.9)', size: 5
                }));
            }
            // whoever is home, looking out of the windows
            for (let i = 0; i < this.residents.length && i < 4; i++) {
                let c = this.residents[i];
                let wx = x + (i % 2 === 0 ? -31 : 31);
                let bob = Math.sin(frameCount * 0.045 + i * 1.9) * 2;
                ctx.save();
                ctx.beginPath(); ctx.rect(wx - 11, y - 58, 22, 20); ctx.clip();
                drawMiniChicken(wx + (i > 1 ? 5 : -4), y - 38 + bob, 7, i % 2 ? -1 : 1, 0,
                                c.crazy ? c.bodyColor : '#ffffff');
                ctx.restore();
            }
            // and one at the door, seeing them off
            if (this.residents.length > 4) {
                drawMiniChicken(x, y - 2, 7, Math.sin(frameCount * 0.02) > 0 ? 1 : -1,
                                frameCount * 0.08, '#ffffff');
            }
        }

        // --- the market stall ---
        drawMarket() {
            let x = this.x, y = this.y;
            drawShadow(x, y, 52, 13);
            // back posts and counter
            ctx.strokeStyle = '#8a6a3a'; ctx.lineWidth = 4;
            ctx.beginPath();
            ctx.moveTo(x - 44, y - 4); ctx.lineTo(x - 44, y - 66);
            ctx.moveTo(x + 44, y - 4); ctx.lineTo(x + 44, y - 66);
            ctx.stroke();
            // striped awning with a scalloped edge
            const AW = ['#d8443c', '#f4ede0'];
            for (let i = 0; i < 8; i++) {
                ctx.fillStyle = AW[i % 2];
                ctx.beginPath();
                ctx.moveTo(x - 52 + i * 13, y - 66);
                ctx.lineTo(x - 52 + (i + 1) * 13, y - 66);
                ctx.lineTo(x - 50 + (i + 1) * 12.5, y - 50);
                ctx.lineTo(x - 50 + i * 12.5, y - 50);
                ctx.closePath(); ctx.fill();
                ctx.beginPath();
                ctx.arc(x - 44 + i * 12.5, y - 50, 6.2, 0, Math.PI);
                ctx.fill();
            }
            ctx.fillStyle = '#8a6a3a'; ctx.fillRect(x - 54, y - 69, 108, 4);
            // counter top and front boards
            ctx.fillStyle = '#c69b5f'; ctx.fillRect(x - 48, y - 30, 96, 7);
            ctx.fillStyle = '#a17c46'; ctx.fillRect(x - 46, y - 23, 92, 23);
            ctx.strokeStyle = '#8a6a3a'; ctx.lineWidth = 1;
            for (let i = -2; i <= 2; i++) { ctx.beginPath(); ctx.moveTo(x + i * 18, y - 23); ctx.lineTo(x + i * 18, y); ctx.stroke(); }
            // sacks of corn on the counter -- they empty as the stock runs down
            let sacks = Math.max(0, Math.min(4, Math.round(this.stock / 5)));
            for (let i = 0; i < sacks; i++) {
                let sx = x - 33 + i * 18;
                ctx.fillStyle = '#d8c49a';
                ctx.beginPath(); ctx.ellipse(sx, y - 36, 8, 9, 0, 0, Math.PI * 2); ctx.fill();
                ctx.fillStyle = '#bda877';
                ctx.beginPath(); ctx.ellipse(sx, y - 43, 4.5, 3, 0, 0, Math.PI * 2); ctx.fill();
                ctx.fillStyle = '#ffcc00';
                for (let k = 0; k < 3; k++) {
                    ctx.beginPath();
                    ctx.ellipse(sx - 3 + k * 3, y - 45 - (k % 2) * 2, 1.8, 1.1, 0, 0, Math.PI * 2);
                    ctx.fill();
                }
            }
            // a pair of scales at the end of the counter
            ctx.strokeStyle = '#8a94a0'; ctx.lineWidth = 1.5;
            let tilt = Math.sin(frameCount * 0.04) * 2;
            ctx.beginPath();
            ctx.moveTo(x + 36, y - 30); ctx.lineTo(x + 36, y - 46);
            ctx.moveTo(x + 28, y - 46 - tilt); ctx.lineTo(x + 44, y - 46 + tilt);
            ctx.stroke();
            ctx.fillStyle = '#9aa4ae';
            ctx.beginPath(); ctx.ellipse(x + 28, y - 44 - tilt, 4, 1.6, 0, 0, Math.PI * 2); ctx.fill();
            ctx.beginPath(); ctx.ellipse(x + 44, y - 44 + tilt, 4, 1.6, 0, 0, Math.PI * 2); ctx.fill();
            // the sign
            ctx.fillStyle = '#f4ede0'; ctx.fillRect(x - 26, y - 64, 52, 15);
            ctx.strokeStyle = '#8a6a3a'; ctx.lineWidth = 1.5; ctx.strokeRect(x - 26, y - 64, 52, 15);
            ctx.textAlign = 'center';
            ctx.fillStyle = '#7a4a20';
            ctx.font = 'bold 10px "Courier New", monospace';
            ctx.fillText('CORN', x, y - 53);
            ctx.textAlign = 'left';
            // the chicken minding the stall
            if (this.done) {
                drawMiniChicken(x + 8, y - 30, 8, -1, frameCount * 0.05, '#fff0c0');
            }
        }

        // --- the merry-go-round ---
        drawCarousel() {
            let x = this.x, y = this.y;
            drawShadow(x, y, 60, 17);
            const RX = 52, RY = 19;
            // decking
            ctx.fillStyle = '#c9a24a';
            ctx.beginPath(); ctx.ellipse(x, y - 6, RX, RY, 0, 0, Math.PI * 2); ctx.fill();
            ctx.fillStyle = '#a8863a';
            ctx.beginPath(); ctx.ellipse(x, y - 2, RX, RY, 0, 0, Math.PI * 2); ctx.fill();
            ctx.fillStyle = '#c9a24a';
            ctx.beginPath(); ctx.ellipse(x, y - 6, RX, RY, 0, 0, Math.PI * 2); ctx.fill();
            // centre column
            ctx.fillStyle = '#e0d0a8'; ctx.fillRect(x - 5, y - 82, 10, 76);
            ctx.fillStyle = '#c8b488'; ctx.fillRect(x + 1, y - 82, 4, 76);
            // horses, drawn back-to-front so the near ones overlap the far ones
            let order = [];
            for (let i = 0; i < 6; i++) {
                let a = this.spin + (i / 6) * Math.PI * 2;
                order.push({ i: i, a: a, dy: Math.sin(a) * RY });
            }
            order.sort((p, q) => p.dy - q.dy);
            for (let o of order) {
                let hx = x + Math.cos(o.a) * RX;
                let hy = y - 6 + o.dy;
                let rise = Math.sin(this.spin * 3 + o.i * 1.1) * 7;
                let dir = Math.sin(o.a) > 0 ? 1 : -1;
                // brass pole
                ctx.strokeStyle = '#e8c24a'; ctx.lineWidth = 2;
                ctx.beginPath(); ctx.moveTo(hx, hy); ctx.lineTo(hx, y - 78); ctx.stroke();
                // the horse
                ctx.save();
                ctx.translate(hx, hy - 22 + rise);
                ctx.scale(dir, 1);
                ctx.fillStyle = o.i % 2 ? '#f4ede0' : '#e8a0b4';
                ctx.beginPath(); ctx.ellipse(0, 0, 13, 7, 0, 0, Math.PI * 2); ctx.fill();
                ctx.beginPath(); ctx.ellipse(9, -8, 5, 6, 0.5, 0, Math.PI * 2); ctx.fill();
                ctx.beginPath(); ctx.moveTo(11, -12); ctx.lineTo(19, -13); ctx.lineTo(12, -6); ctx.closePath(); ctx.fill();
                ctx.strokeStyle = o.i % 2 ? '#e0d2b8' : '#d98ca2'; ctx.lineWidth = 3; ctx.lineCap = 'round';
                ctx.beginPath();
                ctx.moveTo(-6, 5); ctx.lineTo(-8, 14);
                ctx.moveTo(6, 5); ctx.lineTo(8, 14);
                ctx.stroke(); ctx.lineCap = 'butt';
                ctx.fillStyle = '#c8536a';
                ctx.beginPath(); ctx.moveTo(4, -8); ctx.lineTo(-4, -14); ctx.lineTo(-2, -5); ctx.closePath(); ctx.fill();
                ctx.fillStyle = '#000';
                ctx.beginPath(); ctx.arc(14, -10, 1.3, 0, Math.PI * 2); ctx.fill();
                ctx.restore();
                // and whoever is riding it
                let rider = this.riders[o.i];
                if (rider && !rider.dead) {
                    drawMiniChicken(hx, hy - 30 + rise, 7.5, dir, frameCount * 0.12 + o.i,
                                    rider.crazy ? rider.bodyColor : '#ffffff');
                }
            }
            // striped canopy
            for (let i = 0; i < 10; i++) {
                let a0 = (i / 10) * Math.PI * 2, a1 = ((i + 1) / 10) * Math.PI * 2;
                ctx.fillStyle = i % 2 ? '#d8443c' : '#f4ede0';
                ctx.beginPath();
                ctx.moveTo(x, y - 100);
                ctx.lineTo(x + Math.cos(a0) * 62, y - 76 + Math.sin(a0) * 21);
                ctx.lineTo(x + Math.cos(a1) * 62, y - 76 + Math.sin(a1) * 21);
                ctx.closePath(); ctx.fill();
            }
            ctx.fillStyle = '#c9a24a';
            for (let i = 0; i < 12; i++) {
                let a = (i / 12) * Math.PI * 2;
                ctx.beginPath();
                ctx.arc(x + Math.cos(a) * 61, y - 74 + Math.sin(a) * 21, 4, 0, Math.PI);
                ctx.fill();
            }
            // finial and pennant
            ctx.fillStyle = '#e8c24a';
            ctx.beginPath(); ctx.arc(x, y - 103, 5, 0, Math.PI * 2); ctx.fill();
            ctx.strokeStyle = '#8a6a3a'; ctx.lineWidth = 2;
            ctx.beginPath(); ctx.moveTo(x, y - 106); ctx.lineTo(x, y - 122); ctx.stroke();
            ctx.fillStyle = '#4dd2ff';
            let fw = Math.sin(frameCount * 0.11) * 3;
            ctx.beginPath();
            ctx.moveTo(x, y - 122); ctx.lineTo(x + 18, y - 117 + fw); ctx.lineTo(x, y - 112);
            ctx.closePath(); ctx.fill();
        }

        // --- the ferris wheel ---
        drawFerris() {
            let x = this.x, y = this.y;
            const R = 66;
            let cy = y - R - 26;
            drawShadow(x, y, 46, 12);
            // A-frame
            ctx.strokeStyle = '#7f8792'; ctx.lineWidth = 5;
            ctx.beginPath();
            ctx.moveTo(x - 34, y); ctx.lineTo(x, cy);
            ctx.moveTo(x + 34, y); ctx.lineTo(x, cy);
            ctx.stroke();
            ctx.lineWidth = 3;
            ctx.beginPath(); ctx.moveTo(x - 20, y - 34); ctx.lineTo(x + 20, y - 34); ctx.stroke();
            // rim
            ctx.strokeStyle = '#d8443c'; ctx.lineWidth = 4;
            ctx.beginPath(); ctx.arc(x, cy, R, 0, Math.PI * 2); ctx.stroke();
            ctx.strokeStyle = '#f4ede0'; ctx.lineWidth = 2;
            ctx.beginPath(); ctx.arc(x, cy, R - 6, 0, Math.PI * 2); ctx.stroke();
            // spokes
            ctx.strokeStyle = 'rgba(244,237,224,0.85)'; ctx.lineWidth = 2;
            ctx.beginPath();
            for (let i = 0; i < 8; i++) {
                let a = this.spin + (i / 8) * Math.PI * 2;
                ctx.moveTo(x, cy);
                ctx.lineTo(x + Math.cos(a) * R, cy + Math.sin(a) * R);
            }
            ctx.stroke();
            // hub
            ctx.fillStyle = '#e8c24a';
            ctx.beginPath(); ctx.arc(x, cy, 8, 0, Math.PI * 2); ctx.fill();
            ctx.fillStyle = '#8a6a3a';
            ctx.beginPath(); ctx.arc(x, cy, 3.5, 0, Math.PI * 2); ctx.fill();
            // gondolas -- they hang level however far round the wheel has gone
            const CAR = ['#4dd2ff', '#ffd23b', '#8aff6b', '#c58bff', '#ff9b54', '#ff5a7a', '#4dd2ff', '#ffd23b'];
            for (let i = 0; i < 8; i++) {
                let a = this.spin + (i / 8) * Math.PI * 2;
                let gx = x + Math.cos(a) * R;
                let gy = cy + Math.sin(a) * R;
                let swing = Math.sin(this.spin * 2 + i) * 0.09;
                ctx.save();
                ctx.translate(gx, gy);
                ctx.rotate(swing);
                ctx.strokeStyle = '#7f8792'; ctx.lineWidth = 1.5;
                ctx.beginPath(); ctx.moveTo(-6, 0); ctx.lineTo(-4, 7); ctx.moveTo(6, 0); ctx.lineTo(4, 7); ctx.stroke();
                ctx.fillStyle = CAR[i];
                ctx.beginPath();
                ctx.moveTo(-9, 7); ctx.lineTo(9, 7); ctx.lineTo(7, 20); ctx.lineTo(-7, 20);
                ctx.closePath(); ctx.fill();
                ctx.fillStyle = 'rgba(0,0,0,0.18)'; ctx.fillRect(-9, 13, 18, 3);
                let rider = this.riders[i];
                if (rider && !rider.dead) {
                    ctx.save();
                    ctx.beginPath(); ctx.rect(-9, 0, 18, 14); ctx.clip();
                    drawMiniChicken(0, 12, 7, i % 2 ? 1 : -1, frameCount * 0.1 + i,
                                    rider.crazy ? rider.bodyColor : '#ffffff');
                    ctx.restore();
                }
                ctx.restore();
            }
            // bunting on top
            ctx.fillStyle = '#ffd23b';
            let fw = Math.sin(frameCount * 0.12) * 3;
            ctx.beginPath();
            ctx.moveTo(x, cy - R - 4); ctx.lineTo(x + 16, cy - R + 1 + fw); ctx.lineTo(x, cy - R + 6);
            ctx.closePath(); ctx.fill();
        }

        // Where on the circuit a car sits, and which way it's pointing
        trackAt(u) {
            let pts = this.track, n = pts.length;
            let f = ((u % 1) + 1) % 1 * n;
            let i = f | 0, k = f - i;
            let a = pts[i], b = pts[(i + 1) % n];
            return {
                x: a.x + (b.x - a.x) * k,
                y: a.y + (b.y - a.y) * k,
                ang: Math.atan2(b.y - a.y, b.x - a.x),
                h: a.h + (b.h - a.h) * k
            };
        }

        // --- a cute little roller coaster ---
        drawCoaster() {
            let x = this.x, y = this.y;
            if (!this.track) this.track = coasterTrack(this.spec.w, this.spec.h);
            let pts = this.track, half = pts.length / 2;
            drawShadow(x, y, this.spec.w + 14, 18);

            // trestle supports under the hills, with cross bracing
            ctx.strokeStyle = 'rgba(150,102,54,0.6)'; ctx.lineWidth = 1;
            ctx.beginPath();
            for (let i = 0; i < half - 4; i += 4) {
                let a = pts[i], b = pts[i + 4];
                ctx.moveTo(x + a.x, y + a.y); ctx.lineTo(x + b.x, y - 10);
                ctx.moveTo(x + b.x, y + b.y); ctx.lineTo(x + a.x, y - 10);
            }
            ctx.stroke();
            ctx.strokeStyle = '#a9743d'; ctx.lineWidth = 2.5;
            ctx.beginPath();
            for (let i = 0; i < half; i += 4) {
                ctx.moveTo(x + pts[i].x, y + pts[i].y);
                ctx.lineTo(x + pts[i].x, y - 9);
            }
            ctx.stroke();
            // ground beam
            ctx.fillStyle = '#8a6a3a';
            ctx.fillRect(x - this.spec.w - 6, y - 9, (this.spec.w + 6) * 2, 6);

            // the track: a dark sleeper line with a bright rail on top
            ctx.lineJoin = 'round'; ctx.lineCap = 'round';
            ctx.strokeStyle = '#6b4a2e'; ctx.lineWidth = 5;
            ctx.beginPath();
            ctx.moveTo(x + pts[0].x, y + pts[0].y);
            for (let i = 1; i < pts.length; i++) ctx.lineTo(x + pts[i].x, y + pts[i].y);
            ctx.closePath(); ctx.stroke();
            ctx.strokeStyle = '#d8dee6'; ctx.lineWidth = 1.6;
            ctx.beginPath();
            ctx.moveTo(x + pts[0].x, y + pts[0].y - 1.6);
            for (let i = 1; i < pts.length; i++) ctx.lineTo(x + pts[i].x, y + pts[i].y - 1.6);
            ctx.closePath(); ctx.stroke();
            ctx.lineJoin = 'miter'; ctx.lineCap = 'butt';
            // chain-lift rungs up the first hill
            ctx.strokeStyle = 'rgba(90,96,104,0.8)'; ctx.lineWidth = 1;
            ctx.beginPath();
            for (let i = 2; i < half * 0.42; i += 3) {
                let p = pts[i];
                ctx.moveTo(x + p.x - 2, y + p.y + 1); ctx.lineTo(x + p.x + 2, y + p.y + 1);
            }
            ctx.stroke();

            // the little station, tucked under the start of the lift
            let sx = x - this.spec.w + 6;
            ctx.fillStyle = '#c69b5f'; ctx.fillRect(sx - 14, y - 22, 44, 5);
            for (let i = 0; i < 4; i++) {
                ctx.fillStyle = i % 2 ? '#d8443c' : '#f4ede0';
                ctx.fillRect(sx - 14 + i * 11, y - 32, 11, 8);
            }
            ctx.fillStyle = '#8a6a3a';
            ctx.fillRect(sx - 15, y - 34, 46, 3);
            ctx.fillRect(sx - 13, y - 22, 3, 13);
            ctx.fillRect(sx + 27, y - 22, 3, 13);

            // the train: three little cars nose to tail
            const CARS = ['#d8443c', '#ffd23b', '#4dd2ff'];
            for (let c = 0; c < 3; c++) {
                let at = this.trackAt(this.carU - c * 0.028);
                let dropping = Math.sin(at.ang) > 0.28;   // nose-down: wings up!
                ctx.save();
                ctx.translate(x + at.x, y + at.y);
                ctx.rotate(at.ang);
                // riders, two to a car
                for (let r = 0; r < 2; r++) {
                    let rider = this.riders[c * 2 + r];
                    if (!rider || rider.dead) continue;
                    let rx = -3 + r * 7;
                    ctx.save();
                    ctx.translate(rx, -7);
                    if (dropping) {   // wings in the air
                        ctx.fillStyle = '#f2f2f2';
                        ctx.beginPath();
                        ctx.moveTo(-2, -1); ctx.lineTo(-6, -9); ctx.lineTo(0, -3); ctx.closePath(); ctx.fill();
                        ctx.beginPath();
                        ctx.moveTo(2, -1); ctx.lineTo(6, -9); ctx.lineTo(0, -3); ctx.closePath(); ctx.fill();
                    }
                    drawMiniChicken(0, 2, 5.5, r ? 1 : -1, dropping ? frameCount * 0.5 : 0,
                                    rider.crazy ? rider.bodyColor : '#ffffff');
                    ctx.restore();
                }
                // the car body, drawn over their legs
                ctx.fillStyle = CARS[c];
                ctx.beginPath();
                ctx.moveTo(-9, -6); ctx.lineTo(9, -6); ctx.lineTo(8, 3); ctx.lineTo(-8, 3);
                ctx.closePath(); ctx.fill();
                ctx.fillStyle = 'rgba(0,0,0,0.2)'; ctx.fillRect(-9, 0, 18, 3);
                ctx.fillStyle = '#f4ede0'; ctx.fillRect(-9, -7, 18, 2);
                ctx.fillStyle = '#3a3f46';
                ctx.beginPath(); ctx.arc(-5, 4, 2.2, 0, Math.PI * 2); ctx.fill();
                ctx.beginPath(); ctx.arc(5, 4, 2.2, 0, Math.PI * 2); ctx.fill();
                ctx.restore();
            }
        }

        // --- the aeroplane shed ---
        drawHangar() {
            let x = this.x, y = this.y;
            drawShadow(x, y, 60, 14);
            // trestles and a scattering of parts
            ctx.strokeStyle = '#a9743d'; ctx.lineWidth = 4;
            for (let sgn = -1; sgn <= 1; sgn += 2) {
                ctx.beginPath();
                ctx.moveTo(x + sgn * 34 - 10, y); ctx.lineTo(x + sgn * 34, y - 22);
                ctx.lineTo(x + sgn * 34 + 10, y); ctx.stroke();
            }
            ctx.fillStyle = '#c69b5f'; ctx.fillRect(x - 46, y - 26, 92, 6);
            ctx.fillStyle = '#8a94a0';
            ctx.fillRect(x - 20, y - 6, 14, 6);
            ctx.beginPath(); ctx.arc(x + 24, y - 3, 5, 0, Math.PI * 2); ctx.fill();
            // windsock, once the thing is finished and gone
            if (this.done) {
                ctx.strokeStyle = '#8a8a8a'; ctx.lineWidth = 2;
                ctx.beginPath(); ctx.moveTo(x + 52, y); ctx.lineTo(x + 52, y - 46); ctx.stroke();
                let w = Math.sin(frameCount * 0.05) * 4;
                ctx.fillStyle = '#ff7b1c';
                ctx.beginPath();
                ctx.moveTo(x + 52, y - 46); ctx.lineTo(x + 80, y - 42 + w);
                ctx.lineTo(x + 80, y - 34 + w); ctx.lineTo(x + 52, y - 34);
                ctx.closePath(); ctx.fill();
            }
        }
    }

    // --- The aeroplane. There is no reason for it. ---
    class Plane {
        constructor(x, y) {
            this.x = x; this.y = y; this.sx = x; this.sy = y;
            this.t = 0; this.state = 'takeoff';
            this.ang = 0; this.prop = 0; this.dir = 1;
        }
        update() {
            this.prop += 1.2;
            let px = this.x, py = this.y;
            if (this.state === 'takeoff') {
                this.t += 1 / 160;
                let k = Math.min(1, this.t), e = k * k * (3 - 2 * k);
                this.x = this.sx + (canvas.width * 0.9 - this.sx) * e;
                this.y = this.sy + (196 - this.sy) * e;
                if (k >= 1) {
                    this.state = 'fly'; this.t = 1.55;
                    showBanner('CHICKEN AIRLINES!', '#9ad8ff');
                    sndSparkle();
                }
            } else {
                this.t += 0.0055;
                this.x = canvas.width / 2 + Math.sin(this.t) * canvas.width * 0.44;
                this.y = 192 + Math.sin(this.t * 2) * 34;
            }
            let dx = this.x - px, dy = this.y - py;
            if (Math.abs(dx) > 0.2) this.dir = dx > 0 ? 1 : -1;
            this.ang = Math.atan2(dy, Math.abs(dx) < 0.001 ? 0.001 : Math.abs(dx)) * 0.55;
        }
        draw() {
            // banner streaming out behind, always the right way up
            let bx = this.x - this.dir * 62, by = this.y + 6;
            ctx.strokeStyle = 'rgba(60,60,60,0.7)'; ctx.lineWidth = 1;
            ctx.beginPath(); ctx.moveTo(this.x - this.dir * 24, this.y + 2); ctx.lineTo(bx, by); ctx.stroke();
            ctx.save();
            ctx.translate(bx - this.dir * 34, by);
            ctx.rotate(Math.sin(frameCount * 0.08) * 0.06);
            ctx.fillStyle = '#ffd23b'; ctx.fillRect(0, -9, 68, 18);
            ctx.strokeStyle = '#c9992a'; ctx.lineWidth = 1; ctx.strokeRect(0, -9, 68, 18);
            ctx.fillStyle = '#7a4a20';
            ctx.font = 'bold 11px "Courier New", monospace';
            ctx.textAlign = 'center';
            ctx.fillText('CLUCK!', 34, 4);
            ctx.textAlign = 'left';
            ctx.restore();

            ctx.save();
            ctx.translate(this.x, this.y);
            ctx.scale(this.dir, 1);
            ctx.rotate(this.ang);
            // lower wing
            ctx.fillStyle = '#d94f3d'; ctx.fillRect(-20, 6, 46, 4);
            // fuselage
            ctx.fillStyle = '#e8603f';
            ctx.beginPath();
            ctx.moveTo(-30, 2); ctx.lineTo(-8, -8); ctx.lineTo(26, -6);
            ctx.lineTo(30, 2); ctx.lineTo(-30, 8); ctx.closePath(); ctx.fill();
            // tail
            ctx.fillStyle = '#c33f2f';
            ctx.beginPath(); ctx.moveTo(-30, 2); ctx.lineTo(-38, -14); ctx.lineTo(-24, -6); ctx.closePath(); ctx.fill();
            // upper wing on struts
            ctx.strokeStyle = '#8a6a3a'; ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(-6, -8); ctx.lineTo(-6, -20); ctx.moveTo(16, -7); ctx.lineTo(16, -19);
            ctx.stroke();
            ctx.fillStyle = '#f2f2f2'; ctx.fillRect(-24, -24, 52, 5);
            // pilots
            drawMiniChicken(2, -10, 6, 1, 0, '#ffffff');
            drawMiniChicken(-14, -9, 5.5, 1, 0, '#fff0c0');
            // goggles and a scarf on the front one
            ctx.fillStyle = '#3a3a3a'; ctx.fillRect(2, -14, 6, 3);
            ctx.fillStyle = '#e03b5a';
            ctx.beginPath();
            ctx.moveTo(0, -10);
            ctx.quadraticCurveTo(-12, -12 + Math.sin(frameCount * 0.3) * 3, -24, -8 + Math.sin(frameCount * 0.3 + 1) * 4);
            ctx.lineTo(-24, -4 + Math.sin(frameCount * 0.3 + 1) * 4);
            ctx.quadraticCurveTo(-12, -7, 0, -6);
            ctx.closePath(); ctx.fill();
            // propeller, spinning
            ctx.strokeStyle = 'rgba(60,60,60,0.75)'; ctx.lineWidth = 2;
            let pw = Math.abs(Math.cos(this.prop)) * 13 + 2;
            ctx.beginPath(); ctx.ellipse(31, -1, 2, pw, 0, 0, Math.PI * 2); ctx.stroke();
            ctx.fillStyle = '#8a94a0';
            ctx.beginPath(); ctx.arc(30, -1, 3, 0, Math.PI * 2); ctx.fill();
            ctx.restore();
        }
    }

    // --- A football falls out of the sky. Chickens being chickens. ---
    class Ball {
        constructor() {
            this.x = canvas.width / 2 + (Math.random() - 0.5) * 300;
            this.y = playArea.minY + 120 + Math.random() * 180;
            this.z = 460; this.vz = 0; this.vx = 0; this.vy = 0;
            this.rot = 0; this.landed = false; this.kickCd = 0;
        }
        update() {
            if (!this.landed) {
                this.vz -= 0.55; this.z += this.vz;
                if (this.z <= 0) {
                    this.z = 0;
                    if (Math.abs(this.vz) > 2.5) this.vz *= -0.45;
                    else {
                        this.vz = 0; this.landed = true;
                        puff(this.x, this.y, 12, '#e8e8e8', 2.2);
                        showBanner('FOOTBALL!', '#ffffff');
                        sndCornLand();
                    }
                }
                return;
            }
            if (this.z > 0 || this.vz > 0) {
                this.z += this.vz; this.vz -= 0.5;
                if (this.z <= 0) { this.z = 0; this.vz = 0; }
            }
            this.x += this.vx; this.y += this.vy;
            if (this.x < playArea.minX || this.x > playArea.maxX) { this.vx *= -0.8; this.x = clampX(this.x); }
            if (this.y < playArea.minY || this.y > playArea.maxY) { this.vy *= -0.8; this.y = clampY(this.y); }
            this.vx *= 0.975; this.vy *= 0.975;
            this.rot += (Math.abs(this.vx) + Math.abs(this.vy)) * 0.07 * (this.vx >= 0 ? 1 : -1);
            if (this.kickCd > 0) { this.kickCd--; return; }
            let mob = nearHens(this.x, this.y);
            for (let i = 0; i < mob.length; i++) {
                let c = mob[i];
                if (c.dead || c.hidden || c.z > 0) continue;
                if (dist(this.x, this.y, c.x, c.y) < 22) { this.boot(c); break; }
            }
        }
        boot(c) {
            let a = Math.atan2(this.y - c.y, this.x - c.x);
            let p = 4.5 + Math.random() * 4.5;
            this.vx = Math.cos(a) * p;
            this.vy = Math.sin(a) * p * 0.55;
            this.vz = 2.6; this.kickCd = 9;
            puff(this.x, this.y, 5, '#ffffff', 1.5);
            c.faceCd = 0; c.face(this.x - c.x);
            sndPeck();
        }
        draw() {
            let sc = 1 / (1 + this.z * 0.004);
            drawShadow(this.x, this.y, 11 * sc, 4.5 * sc);
            ctx.save();
            ctx.translate(this.x, this.y - this.z - 9);
            ctx.rotate(this.rot);
            ctx.fillStyle = '#ffffff';
            ctx.beginPath(); ctx.arc(0, 0, 10, 0, Math.PI * 2); ctx.fill();
            ctx.strokeStyle = '#cfcfcf'; ctx.lineWidth = 1; ctx.stroke();
            ctx.fillStyle = '#1e1e1e';
            ctx.beginPath();
            for (let i = 0; i < 5; i++) {
                let a = (i / 5) * Math.PI * 2;
                ctx.moveTo(Math.cos(a) * 3, Math.sin(a) * 3);
                ctx.arc(Math.cos(a) * 6.2, Math.sin(a) * 6.2, 2.4, 0, Math.PI * 2);
            }
            ctx.fill();
            ctx.beginPath(); ctx.arc(0, 0, 3.2, 0, Math.PI * 2); ctx.fill();
            ctx.restore();
        }
    }

    // --- Keeping all the hobbies staffed ---
    function updateProjects() {
        // one build at a time, so the crew is never split between two sites
        if (!projects.some(pr => !pr.done)) {
            let spec = nextProject();
            if (spec) {
                projects.push(new Project(spec));
                showBanner('BUILDING ' + projectWords(spec) + '!', '#ffd23b');
                sndSparkle();
            }
        }
        for (let pr of projects) pr.update();

        // pitchfork brigade
        if (chickens.length >= GUARD_AT) {
            for (let i = guards.length - 1; i >= 0; i--) {
                if (guards[i].dead || guards[i].job !== 'guard') guards.splice(i, 1);
            }
            if (guards.length < GUARD_COUNT && frameCount % 24 === 0) {
                let n = chickens.length;
                for (let i = 0; i < 40 && guards.length < GUARD_COUNT; i++) {
                    let c = chickens[(Math.random() * n) | 0];
                    if (!idleHen(c)) continue;
                    c.job = 'guard'; c.guardCd = 0; c.jab = 0;
                    c.stayCd = 60 * (SHIFT.guard[0] + Math.random() * SHIFT.guard[1]);
                    c.patrolT = Math.random() * 6.283;
                    c.releaseFood();
                    guards.push(c);
                    puff(c.x, c.y - 14, 3, '#c8d0d8', 1.2);
                }
                if (guards.length > 0 && !guardsAnnounced) {
                    guardsAnnounced = true;
                    showBanner('PITCHFORK PATROL!', '#8aff6b');
                }
            }
        }

        // football
        if (!ball && chickens.length >= BALL_AT) ball = new Ball();
        if (ball) {
            ball.update();
            if (ball.landed && frameCount % 30 === 0) {
                let squad = 0;
                for (let c of chickens) if (c.job === 'soccer') squad++;
                if (squad < BALL_SQUAD) {
                    let n = chickens.length;
                    for (let i = 0; i < 30 && squad < BALL_SQUAD; i++) {
                        let c = chickens[(Math.random() * n) | 0];
                        if (!idleHen(c)) continue;
                        if (dist(c.x, c.y, ball.x, ball.y) > 320) continue;
                        c.job = 'soccer'; c.releaseFood(); squad++;
                        c.stayCd = 60 * (SHIFT.soccer[0] + Math.random() * SHIFT.soccer[1]);
                    }
                }
            }
        }
    }

    // ============================================================
    //  WINNING: the coop, the confetti, and the parade inside
    // ============================================================

    class Coop {
        constructor(x, y) {
            this.x = x; this.y = y;
            this.doorX = x;        // chickens walk to here
            this.doorY = y + 4;
        }
        draw() {
            drawShadow(this.x, this.y, 62, 16);
            ctx.save();
            ctx.translate(this.x, this.y);
            // back wall / body
            ctx.fillStyle = '#b23c2e';
            ctx.fillRect(-55, -70, 110, 74);
            // roof
            ctx.fillStyle = '#7a2820';
            ctx.beginPath();
            ctx.moveTo(-64, -66); ctx.lineTo(0, -104); ctx.lineTo(64, -66);
            ctx.closePath(); ctx.fill();
            // roof ridge
            ctx.fillStyle = '#5f1f18';
            ctx.fillRect(-64, -70, 128, 6);
            // white trim
            ctx.fillStyle = '#f4ede0';

    const CONFETTI_MAX = 380;
    function spawnConfetti(n) {
        if (confetti.length >= CONFETTI_MAX) return;
        n = Math.min(n, CONFETTI_MAX - confetti.length);
        const cols = ['#ff5a7a', '#ffd23b', '#4dd2ff', '#8aff6b', '#c58bff', '#ff9b54', '#ffffff'];
        for (let i = 0; i < n; i++) {
            confetti.push({
                x: Math.random() * canvas.width,
                y: -10 - Math.random() * 60,
                vx: (Math.random() - 0.5) * 1.6,
                vy: 1.4 + Math.random() * 2.2,
                rot: Math.random() * Math.PI,
                vr: (Math.random() - 0.5) * 0.3,
                w: 5 + Math.random() * 5,
                h: 7 + Math.random() * 6,
                col: cols[(Math.random() * cols.length) | 0],
                sway: Math.random() * Math.PI * 2
            });
        }
    }

    function updateConfetti() {
        for (let c of confetti) {
            c.sway += 0.1;
            c.x += c.vx + Math.sin(c.sway) * 0.8;
            c.y += c.vy;
            c.rot += c.vr;
        }
        confetti = confetti.filter(c => c.y < canvas.height + 20);
    }

    function drawConfetti() {
        for (let c of confetti) {
            ctx.save();
            ctx.translate(c.x, c.y);
            ctx.rotate(c.rot);
            ctx.fillStyle = c.col;
            ctx.fillRect(-c.w / 2, -c.h / 2, c.w, c.h);
            ctx.restore();
        }
    }

    // Kick off the victory: build the coop and send the flock marching in.
    function startWin() {
        gameState = 'winning';
        winHoldTimer = 0;
        coop = new Coop(canvas.width / 2, horizonY + 78);
        // clear the hazards so nothing eats a chicken during the parade
        predators.length = 0;
        farmers.length = 0;
        rabbits.length = 0;
        ball = null;
        for (let c of chickens.slice()) {
            releaseJob(c);
            c.state = 'toCoop'; c.releaseFood();
        }
        showBanner('YOU DID IT!', '#ffd23b');
        playVictory();          // the win track takes over from here
        spawnConfetti(120);
    }

    function finishWin() {
        gameState = 'won';
        endScreenAt = frameCount;
        showBanner('YOU WIN!', '#ffd23b');
        // no sting here -- the victory track is already playing
    }

    function restartGame() {
        chickens = []; horses = []; cows = []; predators = []; eggs = [];
        foods = []; bags = []; particles = []; skyBirds = [];
        bolts = []; grasses = []; rabbits = []; poops = []; flies = [];
        confetti = []; coop = null; chickensHoused = 0;
        farmers = []; angels = []; scorches = [];
        projects = []; guards = []; guardsAnnounced = false; extraBuilds = 0;
        ball = null; plane = null;
        nextPredAt = frameCount + 60 * 26;

        nextStampedeAt = frameCount + 60 * 50;
        bigSackAnnounced = false;

    // --- ENVIRONMENT ---

    // Grass tufts, generated once so they don't crawl around every frame
    const tufts = [];
    (function seedTufts() {
        let seed = 1337;
        function rnd() { seed = (seed * 1103515245 + 12345) % 2147483648; return seed / 2147483648; }
        for (let i = 0; i < 90; i++) {
            tufts.push({
                x: rnd() * canvas.width,
                y: horizonY + 30 + rnd() * (canvas.height - horizonY - 30),
                h: 3 + rnd() * 4,
                shade: rnd() > 0.5 ? '#5b8f5a' : '#71a870'
            });
        }
    })();

    let cloudOffset = 0;

    function drawBackground() {
        // Sky
        ctx.fillStyle = '#87CEEB';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Drifting clouds
        cloudOffset = (cloudOffset + 0.12) % (canvas.width + 200);
        ctx.fillStyle = 'rgba(255, 255, 255, 0.6)';
        function cloud(cx, cy, s) {
            let x = ((cx + cloudOffset) % (canvas.width + 200)) - 100;
            ctx.beginPath();
            ctx.arc(x, cy, 30 * s, 0, Math.PI * 2);
            ctx.arc(x + 40 * s, cy, 40 * s, 0, Math.PI * 2);
            ctx.arc(x + 80 * s, cy, 30 * s, 0, Math.PI * 2);
            ctx.fill();
        }
        cloud(canvas.width * 0.12, 80, 1);
        cloud(canvas.width * 0.55, 130, 0.7);
        cloud(canvas.width * 0.34, 55, 0.5);
        cloud(canvas.width * 0.80, 95, 0.85);

        // Birds passing overhead -- pure scenery, they never land
        skyBirds.forEach(b => b.draw());

        // Hills -- rolling all the way across, whatever the width
        let W = canvas.width;
        ctx.fillStyle = '#4a7c49';
        ctx.beginPath();
        ctx.moveTo(0, horizonY);
        let humps = Math.max(2, Math.round(W / 400));
        for (let i = 0; i < humps; i++) {
            let x0 = (W / humps) * i, x1 = (W / humps) * (i + 1);
            let h = (i % 2 === 0) ? 80 : 120;
            ctx.quadraticCurveTo((x0 + x1) / 2, horizonY - h, x1, horizonY);
        }
        ctx.lineTo(W, horizonY); ctx.lineTo(0, horizonY); ctx.fill();

        // Ground
        ctx.fillStyle = '#659c64'; ctx.fillRect(0, horizonY, canvas.width, canvas.height - horizonY);

        // Grass tufts, all swaying together
        let sway = Math.sin(frameCount * 0.03) * 1.5;
        ctx.lineWidth = 2;
        for (let t of tufts) {
            ctx.strokeStyle = t.shade;
            ctx.beginPath();
            ctx.moveTo(t.x, t.y);
            ctx.lineTo(t.x + sway, t.y - t.h);
            ctx.stroke();
        }

        // Fence
        ctx.strokeStyle = '#5c4033'; ctx.lineWidth = 3;
        ctx.beginPath(); ctx.moveTo(0, horizonY + 10); ctx.lineTo(W, horizonY + 10);
        ctx.moveTo(0, horizonY + 25); ctx.lineTo(W, horizonY + 25); ctx.stroke();
        ctx.fillStyle = '#5c4033';
        for (let x = 20; x < W; x += 80) ctx.fillRect(x, horizonY - 5, 6, 40);
    }

    function horseSizeLabel(p) {
        if (p < 0.12) return 'LEAN';

    // Big tappable LIGHTNING button -- the whole reason mobile needs buttons,
    // since there's no P key on a phone. Shows its own recharge state.
    function drawBoltButton() {
        if (gameState !== 'playing') return;
        let b = BOLT_BTN;
        let ready = boltCd <= 0;
        let frac = ready ? 1 : 1 - boltCd / BOLT_COOLDOWN;
        let hover = inBoltBtn(rawMouseX, rawMouseY);
        let pulse = 0.5 + Math.sin(frameCount * 0.09) * 0.5;
        ctx.save();

        // body -- glows when it's ready to fire
        ctx.fillStyle = ready ? 'rgba(30,70,110,0.92)' : 'rgba(0,0,0,0.5)';
        ctx.fillRect(b.x, b.y, b.w, b.h);
        // recharge fill creeping across
        if (!ready) {
            ctx.fillStyle = 'rgba(90,150,200,0.45)';
            ctx.fillRect(b.x, b.y, b.w * frac, b.h);
        }
        ctx.strokeStyle = ready
            ? (hover ? '#ffffff' : 'rgba(255,235,120,' + (0.65 + 0.35 * pulse) + ')')
            : 'rgba(255,255,255,0.35)';
        ctx.lineWidth = ready ? 3 : 2;
        ctx.strokeRect(b.x, b.y, b.w, b.h);

        // lightning bolt icon
        let ix = b.x + 34, iy = b.y + b.h / 2;
        ctx.beginPath();
        ctx.moveTo(ix + 4, iy - 20);
        ctx.lineTo(ix - 9, iy + 3);
        ctx.lineTo(ix - 1, iy + 3);
        ctx.lineTo(ix - 6, iy + 20);
        ctx.lineTo(ix + 10, iy - 5);
        ctx.lineTo(ix + 1, iy - 5);
        ctx.closePath();
        if (ready) {
            ctx.fillStyle = '#ffe14d';
            ctx.shadowColor = '#ffe14d'; ctx.shadowBlur = 12 * pulse;
        } else {
            ctx.fillStyle = 'rgba(190,205,220,0.5)';
        }
        ctx.fill();
        ctx.shadowBlur = 0;

        // label
        ctx.textAlign = 'left';
        if (ready) {
            ctx.font = 'bold 21px "Courier New", monospace';
            ctx.fillStyle = 'rgba(0,0,0,0.55)';
            ctx.fillText('SCARE!', b.x + 60, b.y + 32 + 2);
            ctx.fillStyle = '#ffe14d';
            ctx.fillText('SCARE!', b.x + 60, b.y + 32);
            ctx.font = 'bold 11px "Courier New", monospace';

            ctx.font = 'bold 19px "Courier New", monospace';
            ctx.fillStyle = (boltDeny > 0 && Math.floor(frameCount / 4) % 2 === 0) ? '#ff9090' : '#c8dcec';
            ctx.fillText('CHARGING', b.x + 60, b.y + 30);
            ctx.font = 'bold 15px "Courier New", monospace';
            ctx.fillStyle = '#9fc4dd';
            ctx.fillText(Math.ceil(boltCd / 60) + 's', b.x + 60, b.y + 49);
        }
        ctx.textAlign = 'left';
        ctx.restore();
    }

    // A proper clickable music button, since a kid won't hunt for a hotkey.
    function drawMusicButton() {
        let b = MUSIC_BTN;
        let hover = inMusicBtn(rawMouseX, rawMouseY);
        let on = musicOn && soundOn;
        ctx.save();
        // body
        ctx.fillStyle = on ? 'rgba(40,120,60,0.85)' : 'rgba(0,0,0,0.5)';
        ctx.fillRect(b.x, b.y, b.w, b.h);
        ctx.strokeStyle = hover ? '#ffffff' : (on ? '#8aff6b' : 'rgba(255,255,255,0.55)');
        ctx.lineWidth = 2;
        ctx.strokeRect(b.x, b.y, b.w, b.h);

        // speaker icon
        let ix = b.x + 15, iy = b.y + b.h / 2;
        ctx.fillStyle = on ? '#dfffd0' : '#cfcfcf';
        ctx.beginPath();
        ctx.moveTo(ix - 5, iy - 4); ctx.lineTo(ix - 1, iy - 4); ctx.lineTo(ix + 4, iy - 9);
        ctx.lineTo(ix + 4, iy + 9); ctx.lineTo(ix - 1, iy + 4); ctx.lineTo(ix - 5, iy + 4);
        ctx.closePath(); ctx.fill();
        if (on) {
            // sound waves
            ctx.strokeStyle = '#dfffd0'; ctx.lineWidth = 2;
            for (let i = 1; i <= 2; i++) {
                ctx.beginPath();
                ctx.arc(ix + 4, iy, 4 + i * 4, -Math.PI / 3, Math.PI / 3);
                ctx.stroke();
            }
        } else {
            // crossed out
            ctx.strokeStyle = '#ff8080'; ctx.lineWidth = 2.5;
            ctx.beginPath();
            ctx.moveTo(ix + 9, iy - 6); ctx.lineTo(ix + 19, iy + 6);
            ctx.moveTo(ix + 19, iy - 6); ctx.lineTo(ix + 9, iy + 6);
            ctx.stroke();
        }

        ctx.font = 'bold 13px "Courier New", monospace';
        ctx.fillStyle = on ? '#eaffe0' : '#e0e0e0';
        ctx.fillText(on ? 'MUSIC ON' : 'MUSIC OFF', b.x + 46, b.y + 21);

        ctx.fillStyle = 'rgba(255,255,255,0.6)';
        ctx.fillText('(N)', b.x + b.w - 26, b.y + 21);
        ctx.restore();
    }
