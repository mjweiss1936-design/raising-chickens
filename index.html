            ctx.fillStyle = '#a0522d'; ctx.beginPath(); ctx.ellipse(38, -12, 6, 4, Math.PI / 4, 0, Math.PI * 2); ctx.fill();

            // Mane
            ctx.fillStyle = 'black';
            ctx.beginPath();
            ctx.moveTo(20, -10);
            ctx.lineTo(32 - stream * 0.4, -22 - stream * 0.3);
            ctx.lineTo(25, -5);
            ctx.fill();

            // Eye -- goes strained and wide once it's really struggling
            if (p > 0.7) {
                ctx.fillStyle = '#ffffff';
                ctx.beginPath(); ctx.arc(32, -15, 3, 0, Math.PI * 2); ctx.fill();
                ctx.fillStyle = 'black';
                ctx.beginPath(); ctx.arc(32.5, -15, 1.6, 0, Math.PI * 2); ctx.fill();
            } else {
                ctx.fillStyle = 'black';
                ctx.beginPath(); ctx.arc(32, -15, 1.5, 0, Math.PI * 2); ctx.fill();
            }
            ctx.restore();

            ctx.restore();
        }
    }

    class Cow {
        constructor(x, y) {
            this.x = x; this.y = y;
            this.facingDir = 1;
            this.speed = 0.5;
            this.state = 'wander';
            this.timer = 0;
            this.walkCycle = 0;
            this.peckCycle = 0;
            this.eatMax = 100;
            this.targetGrass = null;
            this.faceCd = 0;
            this.poopCd = 60 * (10 + Math.random() * 14);
            this.meals = 0; // this cow's own grass count, drives its size
            // Generate fixed spots
            this.spots = Array(3).fill().map(() => ({ x: (Math.random() - 0.5) * 30, y: (Math.random() - 0.5) * 10, r: 4 + Math.random() * 6 }));
        }

        update() {
            let isMoving = false;
            if (this.faceCd > 0) this.faceCd--;

            // Nature takes its course
            if (--this.poopCd <= 0) {
                this.poopCd = 60 * (14 + Math.random() * 16);
                let px = clampX(this.x - 30 * this.facingDir);
                let py = clampY(this.y + 3);
                poops.push(new Poop(px, py));
                sndPlop();
                // Retire the oldest properly, so any fly on it knows to leave
                if (poops.length > POOP_MAX) {
                    let old = poops.shift();
                    old.active = false;
                }
                puff(px, py, 4, '#6b5236', 0.9);
            }

            if (this.state === 'eat_grass') {
                this.peckCycle--;
                if (this.peckCycle % 20 === 0) {
                    puff(this.x + 30 * this.facingDir, this.y, 2, '#a8e063', 0.7);
                }
                if (this.peckCycle <= 0) {
                    if (this.targetGrass && !this.targetGrass.eaten) {
                        this.targetGrass.eaten = true;
                        cowMeals++;
                        this.meals++; // I grow a little with every meal
                        heart(this.x, this.y - 34 * this.girth);
                        sndMoo();
                    }
                    this.targetGrass = null;
                    this.state = 'wander';
                    this.timer = 90 + Math.random() * 60;
                }
                return;
            }

            // Drop a target that got eaten or was trimmed back somehow
            if (this.targetGrass && (this.targetGrass.eaten || !this.targetGrass.ripe)) {
                this.targetGrass = null;
            }
            // Go find the nearest clump worth eating
            if (!this.targetGrass) {
                let best = null, bestD = Infinity;
                for (let g of grasses) {
                    if (g.eaten || !g.ripe) continue;
                    let d = dist(this.x, this.y, g.x, g.y);
                    if (d < bestD) { bestD = d; best = g; }
                }
                if (best) this.targetGrass = best;
            }

            if (this.targetGrass) {
                this.state = 'seek_grass';
                if (dist(this.x, this.y, this.targetGrass.x, this.targetGrass.y) <= 30) {
                    this.state = 'eat_grass';
                    this.peckCycle = this.eatMax;
                } else {
                    // A cow in sight of dinner walks with slightly more purpose
                    isMoving = this.stepTo(this.targetGrass.x, this.targetGrass.y, 0.8);
                }
            } else {
                this.state = 'wander';
                this.timer--;
                if (this.timer <= 0) {
                    this.tX = clampX(this.x + (Math.random() - 0.5) * 200);
                    this.tY = clampY(this.y + (Math.random() - 0.5) * 90);
                    this.timer = 150 + Math.random() * 100;
                }
                if (this.tX !== undefined) isMoving = this.stepTo(this.tX, this.tY, this.speed);
            }

            this.walkCycle = isMoving ? this.walkCycle + 0.1 : 0;
        }

        // Grows up to ~1.7x its size over its first 20 grass clumps
        get girth() { return 1 + Math.min(1, this.meals / 20) * 0.7; }

        stepTo(tx, ty, speed) {
            let dx = tx - this.x; let dy = ty - this.y;
            let d = Math.sqrt(dx * dx + dy * dy);
            let moved = false;
            if (d > 1) {
                this.x += (dx / d) * speed;
                this.y += (dy / d) * (speed * 0.7);
                moved = true;
            }
            if (this.faceCd === 0) {
                let want = dx > 4 ? 1 : (dx < -4 ? -1 : 0);
                if (want !== 0 && want !== this.facingDir) { this.facingDir = want; this.faceCd = 15; }
            }
            this.x = clampX(this.x);
            this.y = clampY(this.y);
            return moved;
        }

        draw() {
            let g = this.girth;
            drawShadow(this.x, this.y, 35 * g, 12 * g);
            ctx.save();
            ctx.translate(this.x, this.y);
            ctx.scale(this.facingDir * g, g);

            let ls1 = Math.sin(this.walkCycle) * 4; let ls2 = Math.sin(this.walkCycle + Math.PI) * 4;

            // Grazing dip for the head only (applied below), 0 -> 1 -> 0
            let eating = this.state === 'eat_grass';
            let eatT = eating ? Math.sin((1 - this.peckCycle / this.eatMax) * Math.PI) : 0;

            // Legs
            ctx.fillStyle = 'black';
            ctx.fillRect(-22 + ls1, 0, 6, 20); ctx.fillRect(-12 + ls2, 0, 6, 20);
            ctx.fillRect(10 + ls2, 0, 6, 20); ctx.fillRect(20 + ls1, 0, 6, 20);

            // Body
            ctx.fillStyle = 'white';
            ctx.fillRect(-28, -20, 56, 28);

            // Spots
            ctx.fillStyle = 'black';
            for (let s of this.spots) { ctx.beginPath(); ctx.arc(s.x, -6 + s.y, s.r, 0, Math.PI * 2); ctx.fill(); }

            // Udder
            ctx.fillStyle = 'pink';
            ctx.beginPath(); ctx.arc(0, 8, 6, 0, Math.PI); ctx.fill();

            // Head group -- swings down to the grass from the base of the neck
            // and chews, instead of the whole cow sinking.
            ctx.save();
            if (eating) {
                let dip = eatT * 0.85;
                let chew = Math.sin(this.peckCycle * 0.45) * 0.06 * (eatT > 0.2 ? 1 : 0);
                ctx.translate(25, -6);
                ctx.rotate(dip + chew);
                ctx.translate(-25, 6);
            }
            // Head
            ctx.fillStyle = 'white'; ctx.fillRect(25, -25, 20, 24);
            // Snout -- opens and closes a touch while chewing
            let jaw = eating ? 2 + Math.abs(Math.sin(this.peckCycle * 0.45)) * 3 : 0;
            ctx.fillStyle = '#f4b6c2'; ctx.fillRect(38, -10 - jaw * 0.4, 10, 12 + jaw); // muzzle
            ctx.fillStyle = 'black'; ctx.fillRect(40, -6, 2, 3); ctx.fillRect(44, -6, 2, 3); // nostrils
            // Eye
            ctx.fillStyle = 'black'; ctx.fillRect(31, -19, 3, 3);
            // Horns
            ctx.fillStyle = '#eeddcc';
            ctx.beginPath(); ctx.moveTo(28, -25); ctx.lineTo(25, -35); ctx.lineTo(32, -25); ctx.fill();
            ctx.beginPath(); ctx.moveTo(40, -25); ctx.lineTo(43, -35); ctx.lineTo(36, -25); ctx.fill();
            ctx.restore();

            ctx.restore();
        }
    }

    class Fox {
        constructor(forceSide) {
            // Spawn left or right off-screen. A wave alternates sides so one
            // lightning bolt can't clear the whole lot.
            let left = forceSide === undefined ? (Math.random() > 0.5) : (forceSide < 0);
            this.x = left ? -50 : canvas.width + 50;
            this.y = horizonY + 40 + Math.random() * (canvas.height - horizonY - 80);
            this.speed = 4;
            this.facingDir = 1;
            this.walkCycle = 0;
            this.active = true;
            this.hasChicken = false;
            this.scared = false;
            this.life = 0;

            this.targetChicken = pickPrey(this);
            this.exitX = this.x < 0 ? canvas.width + 100 : -100; // run to the far side
        }

        // Zapped: abandon the hunt entirely and sprint for the nearest edge.
        scare() {
            if (this.scared) return;
            this.scared = true;
            this.targetChicken = null;
            this.speed = 7;
            // bolt for whichever side is closer, not all the way across
            this.exitX = (this.x < canvas.width / 2) ? -100 : canvas.width + 100;
            puff(this.x, this.y, 8, '#d9d0b0', 2.0);
        }

        update() {
            this.life++;
            // Give up after ~18s so a fox never loiters forever
            if (this.life > 60 * 18) this.hasChicken = true;

            if (!this.scared && !this.hasChicken &&
                (!this.targetChicken || this.targetChicken.dead || this.targetChicken.state === 'toCoop')) {
                this.targetChicken = pickPrey(this);
            }

            let tx, ty;
            if (!this.scared && !this.hasChicken && this.targetChicken) {
                tx = this.targetChicken.x;
                ty = this.targetChicken.y;
                if (dist(this.x, this.y, tx, ty) < 18) {
                    this.targetChicken.dead = true;
                    featherBurst(this.targetChicken.x, this.targetChicken.y);
                    this.hasChicken = true;
                    chickensLost++;
                    sndYip();
                }
            } else {
                tx = this.exitX;
                ty = this.y;
            }

            let dx = tx - this.x; let dy = ty - this.y;
            let d = Math.sqrt(dx * dx + dy * dy);
            if (d > 1) {
                this.x += (dx / d) * this.speed;
                this.y += (dy / d) * (this.speed * 0.7);
            }
            if (Math.abs(dx) > 0.5) this.facingDir = dx > 0 ? 1 : -1;

            // Off the edge of the yard? Then it's gone.
            if ((this.scared || this.hasChicken || !this.targetChicken) &&
                (this.x < -80 || this.x > canvas.width + 80)) {
                this.active = false;
            }

            this.walkCycle += 0.4;
        }

        draw() {
            drawShadow(this.x, this.y, 20, 8);
            ctx.save();
            ctx.translate(this.x, this.y);
            ctx.scale(this.facingDir, 1);

            // Bounding run
            ctx.translate(0, -Math.abs(Math.sin(this.walkCycle)) * 6);

            // Legs
            ctx.strokeStyle = '#222'; ctx.lineWidth = 3; ctx.beginPath();
            let ls1 = Math.sin(this.walkCycle) * 10; let ls2 = Math.sin(this.walkCycle + Math.PI) * 10;
            ctx.moveTo(-10, 5); ctx.lineTo(-10 + ls1, 15);
            ctx.moveTo(10, 5); ctx.lineTo(10 + ls2, 15);
            ctx.stroke();

            // Tail
            ctx.fillStyle = '#ff7700';
            ctx.beginPath(); ctx.ellipse(-20, -5, 12, 5, Math.PI / 6 + Math.sin(this.walkCycle) * 0.2, 0, Math.PI * 2); ctx.fill();
            // Tail tip
            ctx.fillStyle = 'white';
            ctx.beginPath(); ctx.arc(-30, -10, 4, 0, Math.PI * 2); ctx.fill();

            // Body
            ctx.fillStyle = '#d95a00';
            ctx.beginPath(); ctx.ellipse(0, 0, 18, 8, 0, 0, Math.PI * 2); ctx.fill();

            // Head/Snout
            ctx.beginPath(); ctx.moveTo(10, -5); ctx.lineTo(25, 2); ctx.lineTo(10, 5); ctx.fill();

            // Ears
            ctx.fillStyle = '#222';
            ctx.beginPath(); ctx.moveTo(8, -5); ctx.lineTo(5, -12); ctx.lineTo(12, -2); ctx.fill();

            // Eye
            ctx.fillStyle = '#ffe08a';
            ctx.fillRect(12, -4, 3, 2);

            if (this.hasChicken) {
                // A very limp chicken in the mouth
                ctx.fillStyle = 'white';
                ctx.beginPath(); ctx.arc(22, 5, 6, 0, Math.PI * 2); ctx.fill();
                ctx.fillStyle = '#cc0000'; ctx.fillRect(20, 2, 3, 3);
                ctx.strokeStyle = '#ffa500'; ctx.lineWidth = 2;
                ctx.beginPath(); ctx.moveTo(24, 9); ctx.lineTo(28, 14); ctx.stroke();
            }

            ctx.restore();
        }
    }

    class GrassPatch {
        constructor(x, y) {
            this.x = x; this.y = y;
            this.growth = 0;
            this.eaten = false;
            this.blades = [];
            let n = 4 + Math.floor(Math.random() * 3);
            for (let i = 0; i < n; i++) {
                this.blades.push({
                    dx: (Math.random() - 0.5) * 15,
                    h: 9 + Math.random() * 9,
                    lean: (Math.random() - 0.5) * 7
                });
            }
        }
        get ripe() { return this.growth >= GRASS_RIPE; }
        update() {
            if (this.growth < 1) this.growth = Math.min(1, this.growth + GRASS_RATE);
        }
        draw() {
            let g = this.growth;
            // Pale patch of fresh growth on the darker field
            ctx.fillStyle = 'rgba(168, 224, 99,' + (0.2 + 0.35 * g) + ')';
            ctx.beginPath();
            ctx.ellipse(this.x, this.y, 4 + 12 * g, 2 + 5 * g, 0, 0, Math.PI * 2);
            ctx.fill();

            let sway = Math.sin(frameCount * 0.04 + this.x * 0.05) * 2 * g;
            ctx.strokeStyle = this.ripe ? '#b6ee6a' : '#8fc76a';
            ctx.lineWidth = 2;
            ctx.lineCap = 'round';
            ctx.beginPath();
            for (let b of this.blades) {
                ctx.moveTo(this.x + b.dx, this.y);
                ctx.lineTo(this.x + b.dx + b.lean * g + sway, this.y - b.h * g);
            }
            ctx.stroke();
            ctx.lineCap = 'butt';
        }
    }

    // Only one clump per small area: reject any spot too near an existing one.
    function trySpawnGrass() {
        if (grasses.length >= GRASS_MAX) return false;
        for (let attempt = 0; attempt < 25; attempt++) {
            let x = playArea.minX + Math.random() * (playArea.maxX - playArea.minX);
            let y = playArea.minY + Math.random() * (playArea.maxY - playArea.minY);
            let clear = true;
            for (let g of grasses) {
                if (dist(x, y, g.x, g.y) < GRASS_SPACING) { clear = false; break; }
            }
            if (clear) { grasses.push(new GrassPatch(x, y)); return true; }
        }
        return false;
    }

    class Poop {
        constructor(x, y, scale = 1) {
            this.x = x; this.y = y;
            this.age = 0;
            this.blobs = [];
            let n = 2 + Math.floor(Math.random() * 2);
            for (let i = 0; i < n; i++) {
                this.blobs.push({
                    dx: (Math.random() - 0.5) * 9 * scale,
                    dy: (Math.random() - 0.5) * 4 * scale,
                    r: (4 + Math.random() * 3.5) * scale
                });
            }
            this.food = 1;   // eaten down by flies
            this.active = true;
        }
        update() {
            this.age++;
            if (this.food <= 0) this.active = false;
        }
        draw() {
            // dries out and pales with age, and shrinks as the flies work on it
            let dry = Math.min(1, this.age / (60 * 25));
            let shrink = 0.35 + 0.65 * Math.max(0, this.food);
            ctx.fillStyle = dry > 0.5 ? '#6b5236' : '#4a3520';
            for (let b of this.blobs) {
                ctx.beginPath();
                ctx.ellipse(this.x + b.dx * shrink, this.y + b.dy * shrink,
                            b.r * shrink, b.r * 0.55 * shrink, 0, 0, Math.PI * 2);
                ctx.fill();
            }
            // a little shine while it's fresh
            if (dry < 0.4) {
                ctx.fillStyle = 'rgba(255,255,255,0.18)';
                ctx.beginPath();
                ctx.ellipse(this.x - 2, this.y - 2, 2.5 * shrink, 1.2 * shrink, 0, 0, Math.PI * 2);
                ctx.fill();
            }
        }
    }

    class Fly {
        constructor(target) {
            this.target = target;
            this.x = Math.random() > 0.5 ? -20 : canvas.width + 20;
            this.y = clampY(target.y + (Math.random() - 0.5) * 120);
            this.z = 30 + Math.random() * 50;
            this.state = 'incoming';
            this.phase = Math.random() * Math.PI * 2;
            this.freq = 0.18 + Math.random() * 0.14;
            this.orbit = Math.random() * Math.PI * 2;
            this.orbitR = 5 + Math.random() * 9;
            this.spook = 0;
            this.wing = 0;
            this.active = true;
        }

        update() {
            this.phase += this.freq;
            this.wing += 1.1;

            // Dinner gone (or cleaned up)? Off we go.
            if (this.state !== 'leaving' && (!this.target || !this.target.active)) {
                this.state = 'leaving';
            }

            if (this.state === 'feeding') {
                // something big lumbering past sends them up in a cloud
                for (let o of cows) if (dist(this.x, this.y, o.x, o.y) < 75) this.spook = 45;
                for (let o of horses) if (dist(this.x, this.y, o.x, o.y) < 70) this.spook = 45;
                for (let o of bears) if (dist(this.x, this.y, o.x, o.y) < 80) this.spook = 45;
            }
            if (this.spook > 0) this.spook--;

            if (this.state === 'incoming') {
                let dx = this.target.x - this.x, dy = this.target.y - this.y;
                let d = Math.sqrt(dx * dx + dy * dy);
                if (d > 1) {
                    this.x += (dx / d) * 2.6 + Math.sin(this.phase * 1.7) * 1.2;
                    this.y += (dy / d) * 1.6 + Math.cos(this.phase * 1.3) * 0.7;
                }
                this.z += (4 - this.z) * 0.05;
                if (d < 16 && this.z < 10) this.state = 'feeding';

            } else if (this.state === 'feeding') {
                this.orbit += 0.22;
                let r = this.orbitR + (this.spook > 0 ? 24 : 0);
                this.x = this.target.x + Math.cos(this.orbit) * r + Math.sin(this.phase * 2.1) * 1.5;
                this.y = this.target.y + Math.sin(this.orbit) * r * 0.5;
                this.z = (this.spook > 0 ? 18 : 2.5) + Math.abs(Math.sin(this.phase)) * 3;
                // only actually eating when settled
                if (this.spook === 0) this.target.food -= FLY_EAT;

            } else {
                this.z += 1.2;
                this.x += (this.x < canvas.width / 2 ? -2.8 : 2.8) + Math.sin(this.phase);
                this.y += Math.cos(this.phase * 0.8) * 0.5;
                if (this.x < -40 || this.x > canvas.width + 40 || this.z > 220) this.active = false;
            }
        }

        draw() {
            if (this.z < 14) drawShadow(this.x, this.y, 2, 1);
            ctx.save();
            ctx.translate(this.x, this.y - this.z);
            // wing blur
            ctx.fillStyle = 'rgba(225,235,245,0.55)';
            let w = 3 + Math.abs(Math.sin(this.wing)) * 2.5;
            ctx.beginPath(); ctx.ellipse(0, -1.5, w, 1.8, 0, 0, Math.PI * 2); ctx.fill();
            // body
            ctx.fillStyle = '#141414';
            ctx.fillRect(-2, -1.5, 4, 3);
            ctx.restore();
        }
    }

    // Rabbits go for whatever clump is closest and far enough along to bother with
    function pickGrassForRabbit(x, y) {
        let best = null, bestD = Infinity;
        for (let g of grasses) {
            if (g.eaten || g.growth < 0.25) continue;
            if (g.claimedByRabbit) continue;
            let d = dist(x, y, g.x, g.y);
            if (d < bestD) { bestD = d; best = g; }
        }
        return best;
    }

    class Rabbit {
        constructor() {
            this.dir = Math.random() > 0.5 ? 1 : -1;
            this.x = this.dir === 1 ? -50 : canvas.width + 50;
            this.y = playArea.minY + 20 + Math.random() * (playArea.maxY - playArea.minY - 20);
            // Aim well past the despawn boundary -- heading for exactly the
            // spawn point left them parked just short of it, forever.
            this.exitX = this.dir === 1 ? -150 : canvas.width + 150;
            this.speed = 2.5;
            this.facingDir = this.dir;
            this.z = 0;
            this.hop = 0;
            this.state = 'seek';
            this.nibble = 0;
            this.nibbleTime = 55;
            this.swarm = false;
            this.carrying = false;
            this.faceCd = 0;
            this.active = true;
            this.target = null;
        }

        bail() {
            if (this.target) { this.target.claimedByRabbit = false; this.target = null; }
            this.state = 'leave';
        }

        update() {
            if (this.faceCd > 0) this.faceCd--;

            // Skittish -- unless it's in a swarm, where numbers make them bold
            if (this.state !== 'leave' && !this.swarm) {
                let spooked = nearestBully(this.x, this.y, 120);
                if (!spooked) {
                    for (let f of foxes) {
                        if (dist(this.x, this.y, f.x, f.y) < 150) { spooked = true; break; }
                    }
                }
                if (spooked) { this.bail(); puff(this.x, this.y, 4, '#e0d6c8', 1.2); }
            }

            if (this.state === 'nibble') {
                this.nibble--;
                if (this.nibble % 12 === 0) puff(this.x + 8 * this.facingDir, this.y, 2, '#a8e063', 0.6);
                if (this.nibble <= 0) {
                    if (this.target && !this.target.eaten) {
                        this.target.eaten = true;
                        this.target.claimedByRabbit = false;
                        grassStolen++;
                        this.carrying = true;
                    }
                    this.target = null;
                    this.state = 'leave';
                }
                return;
            }

            if (this.state === 'seek') {
                if (!this.target || this.target.eaten) {
                    if (this.target) this.target.claimedByRabbit = false;
                    this.target = pickGrassForRabbit(this.x, this.y);
                    if (this.target) this.target.claimedByRabbit = true;
                }
                if (!this.target) {
                    this.state = 'leave';
                } else if (dist(this.x, this.y, this.target.x, this.target.y) < 18) {
                    this.state = 'nibble';
                    this.nibble = this.nibbleTime;
                } else {
                    this.hopTo(this.target.x, this.target.y);
                }
            }

            if (this.state === 'leave') {
                this.hopTo(this.exitX, this.y);
                if (this.x < -70 || this.x > canvas.width + 70) this.active = false;
            }
        }

        hopTo(tx, ty) {
            let wasDown = this.z < 1;
            this.hop += 0.26;
            this.z = Math.abs(Math.sin(this.hop)) * 10;
            if (wasDown && this.z >= 1) sndHop();
            // most of the ground is covered at the top of the bound
            let sp = this.speed * (0.35 + Math.abs(Math.sin(this.hop)));
            let dx = tx - this.x, dy = ty - this.y;
            let d = Math.sqrt(dx * dx + dy * dy);
            if (d > 1) {
                this.x += (dx / d) * sp;
                this.y += (dy / d) * (sp * 0.7);
            }
            if (this.faceCd === 0) {
                let want = dx > 4 ? 1 : (dx < -4 ? -1 : 0);
                if (want !== 0 && want !== this.facingDir) { this.facingDir = want; this.faceCd = 12; }
            }
            this.y = clampY(this.y);
        }

        draw() {
            let sScale = 1 / (1 + this.z * 0.03);
            drawShadow(this.x, this.y, 11 * sScale, 4.5 * sScale);

            ctx.save();
            ctx.translate(this.x, this.y - this.z);
            ctx.scale(this.facingDir, 1);

            let tuck = this.z * 0.12; // legs tuck up mid-hop

            // Hind legs
            ctx.fillStyle = '#a89684';
            ctx.beginPath(); ctx.ellipse(-6, 1 - tuck, 6, 4, 0, 0, Math.PI * 2); ctx.fill();
            // Front legs
            ctx.strokeStyle = '#a89684'; ctx.lineWidth = 2.5;
            ctx.beginPath();
            ctx.moveTo(6, -1); ctx.lineTo(7, 4 - tuck);
            ctx.stroke();

            // Body
            ctx.fillStyle = '#bdab99';
            ctx.beginPath(); ctx.ellipse(0, -4, 12, 7.5, -0.15, 0, Math.PI * 2); ctx.fill();

            // Cotton tail
            ctx.fillStyle = '#fdfaf5';
            ctx.beginPath(); ctx.arc(-11, -5, 3.5, 0, Math.PI * 2); ctx.fill();

            // Head
            ctx.fillStyle = '#bdab99';
            ctx.beginPath(); ctx.ellipse(9, -9, 6, 5, 0, 0, Math.PI * 2); ctx.fill();

            // Ears -- laid back when running away
            let lay = this.state === 'leave' ? 0.9 : 0.15;
            ctx.save();
            ctx.translate(8, -12);
            for (let i = 0; i < 2; i++) {
                ctx.save();
                ctx.rotate(-0.25 + lay + i * 0.28);
                ctx.fillStyle = '#bdab99';
                ctx.beginPath(); ctx.ellipse(0, -6, 2.6, 7, 0, 0, Math.PI * 2); ctx.fill();
                ctx.fillStyle = '#e6b8b8';
                ctx.beginPath(); ctx.ellipse(0, -6, 1.2, 4.5, 0, 0, Math.PI * 2); ctx.fill();
                ctx.restore();
            }
            ctx.restore();

            // Eye + nose
            ctx.fillStyle = '#1a1a1a';
            ctx.beginPath(); ctx.arc(11, -10, 1.4, 0, Math.PI * 2); ctx.fill();
            ctx.fillStyle = '#d98a8a';
            ctx.beginPath(); ctx.arc(14.5, -8, 1.2, 0, Math.PI * 2); ctx.fill();

            // Swag
            if (this.carrying) {
                ctx.strokeStyle = '#b6ee6a'; ctx.lineWidth = 2; ctx.lineCap = 'round';
                ctx.beginPath();
                ctx.moveTo(14, -7); ctx.lineTo(21, -11);
                ctx.moveTo(16, -7); ctx.lineTo(22, -5);
                ctx.stroke();
                ctx.lineCap = 'butt';
            }

            ctx.restore();
        }
    }

    // The field got overgrown -- every rabbit in the county turns up at once,
    // one per clump, and strips the lot.
    function triggerRabbitSwarm() {
        let targets = grasses.filter(g => !g.eaten);
        if (targets.length === 0) return;
        showBanner('RABBIT SWARM!', '#f0e2cc',
            'Rabbits! They are eating all of the grass!');
        for (let g of targets) {
            let r = new Rabbit();
            r.swarm = true;
            r.speed = 3.8;
            r.nibbleTime = 22;
            r.y = clampY(g.y + (Math.random() - 0.5) * 90);
            r.target = g;
            g.claimedByRabbit = true;
            rabbits.push(r);
        }
    }

    // ============================================================
    //  HAZARDS
    //  Each one makes a patch of the yard unsafe. Hens naturally shy
    //  away from them -- but greed beats fear, so if you drop corn in
    //  a danger zone they will walk right into it. Placement is the game.
    // ============================================================

    function eatChicken(c, byWhat) {
        if (!c || c.dead) return false;
        c.dead = true;
        chickensLost++;
        featherBurst(c.x, c.y);
        puff(c.x, c.y, 6, '#d8d8d8', 1.2);
        sndYip();
        return true;
    }

    class Wolf {
        constructor() {
            this.dir = Math.random() > 0.5 ? 1 : -1;
            this.x = this.dir === 1 ? -70 : canvas.width + 70;
            this.y = playArea.minY + 40 + Math.random() * (playArea.maxY - playArea.minY - 60);
            this.homeX = playArea.minX + 150 + Math.random() * (playArea.maxX - playArea.minX - 300);
            this.facingDir = this.dir;
            this.speed = 2.4;
            this.state = 'arrive';
            this.lurk = 60 * (11 + Math.random() * 6); // hangs about this long
            this.walkCycle = 0;
            this.blink = 0;
            this.active = true;
            this.killR = 52; this.scareR = 98;
        }
        update() {
            this.walkCycle += 0.18;
            if (this.state === 'arrive') {
                let dx = this.homeX - this.x;
                if (Math.abs(dx) < 4) { this.state = 'lurk'; }
                else { this.x += Math.sign(dx) * this.speed; this.facingDir = Math.sign(dx); }
            } else if (this.state === 'lurk') {
                // shifts about a little, looking for a meal
                this.x += Math.sin(frameCount * 0.01) * 0.3;
                if (--this.lurk <= 0) { this.state = 'leave'; }
                if (Math.random() < 0.01) this.facingDir *= -1;
            } else {
                this.x += this.dir * this.speed;
                if (this.x < -110 || this.x > canvas.width + 110) this.active = false;
            }
            // Only snaps once it has settled -- so the flock gets a moment to
            // scatter as it walks in, and deaths come from bad corn placement
            // rather than bad luck.
            if (this.state === 'lurk') {
                for (let c of chickens) {
                    if (c.dead || c.state === 'exodus' || c.state === 'toCoop') continue;
                    if (dist(this.x, this.y, c.x, c.y) < this.killR) {
                        if (eatChicken(c, 'wolf')) { this.chomp = 12; }
                    }
                }
            }
            if (this.chomp > 0) this.chomp--;
        }
        draw() {
            drawShadow(this.x, this.y, 30, 11);
            ctx.save();
            ctx.translate(this.x, this.y);
            ctx.scale(this.facingDir, 1);
            let bob = this.state === 'lurk' ? Math.sin(frameCount * 0.05) * 1.2 : -Math.abs(Math.sin(this.walkCycle)) * 3;
            ctx.translate(0, bob);
            let sw = this.state === 'lurk' ? Math.sin(frameCount * 0.06) * 2 : Math.sin(this.walkCycle) * 8;
            // legs
            ctx.strokeStyle = '#3b3f45'; ctx.lineWidth = 4; ctx.lineCap = 'round';
            ctx.beginPath();
            ctx.moveTo(-14, 2); ctx.lineTo(-14 + sw, 20);
            ctx.moveTo(-5, 2); ctx.lineTo(-5 - sw * 0.6, 20);
            ctx.moveTo(9, 2); ctx.lineTo(9 - sw * 0.6, 20);
            ctx.moveTo(18, 2); ctx.lineTo(18 + sw, 20);
            ctx.stroke(); ctx.lineCap = 'butt';
            // bushy tail
            ctx.fillStyle = '#4a5058';
            ctx.beginPath(); ctx.ellipse(-24, -6, 13, 6, -0.4 + Math.sin(frameCount * 0.05) * 0.15, 0, Math.PI * 2); ctx.fill();
            // body
            ctx.fillStyle = '#5a616b';
            ctx.beginPath(); ctx.ellipse(0, -6, 22, 11, 0, 0, Math.PI * 2); ctx.fill();
            // shaggy ruff
            ctx.fillStyle = '#4a5058';
            ctx.beginPath(); ctx.ellipse(9, -8, 11, 10, 0, 0, Math.PI * 2); ctx.fill();
            // head
            ctx.fillStyle = '#5a616b';
            ctx.beginPath(); ctx.ellipse(21, -13, 11, 8, 0, 0, Math.PI * 2); ctx.fill();
            // snout
            ctx.beginPath(); ctx.moveTo(27, -14); ctx.lineTo(40, -10); ctx.lineTo(27, -6); ctx.closePath(); ctx.fill();
            ctx.fillStyle = '#20242a';
            ctx.beginPath(); ctx.arc(39, -10, 2.4, 0, Math.PI * 2); ctx.fill();
            // teeth when it snaps
            if (this.chomp > 0) {
                ctx.fillStyle = '#ffffff';
                ctx.beginPath(); ctx.moveTo(30, -10); ctx.lineTo(34, -5); ctx.lineTo(36, -10); ctx.closePath(); ctx.fill();
            }
            // ears
            ctx.fillStyle = '#4a5058';
            ctx.beginPath(); ctx.moveTo(16, -19); ctx.lineTo(19, -29); ctx.lineTo(23, -18); ctx.closePath(); ctx.fill();
            ctx.beginPath(); ctx.moveTo(24, -19); ctx.lineTo(28, -28); ctx.lineTo(30, -17); ctx.closePath(); ctx.fill();
            // EVIL RED EYES -- glowing, with a menacing flicker
            let glow = 0.65 + Math.sin(frameCount * 0.12) * 0.35;
            ctx.globalAlpha = glow;
            ctx.fillStyle = '#ff2b2b';
            ctx.beginPath(); ctx.arc(24, -15, 4.2, 0, Math.PI * 2); ctx.fill();
            ctx.globalAlpha = 1;
            ctx.fillStyle = '#ff0000';
            ctx.beginPath(); ctx.arc(24, -15, 2.3, 0, Math.PI * 2); ctx.fill();
            ctx.fillStyle = '#ffd0d0';
            ctx.fillRect(23.3, -16.2, 1.4, 1.4);
            ctx.restore();
        }
    }

    class Gator {
        constructor() {
            this.side = Math.random() > 0.5 ? 1 : -1; // -1 = left edge, 1 = right
            this.y = playArea.minY + 50 + Math.random() * (playArea.maxY - playArea.minY - 80);
            // resting spot is just INSIDE the field, so it's visible once out
            this.x = this.side === -1 ? playArea.minX + 48 : playArea.maxX - 48;
            this.facingDir = this.side === -1 ? 1 : -1; // faces into the field
            this.emerge = 0;                 // 0..1 slides out of the edge
            this.life = 60 * (13 + Math.random() * 7);
            this.snap = 0;
            this.active = true;
            this.killR = 60; this.scareR = 98;
        }
        update() {
            this.life--;
            if (this.life > 60 * 3) {
                this.emerge = Math.min(1, this.emerge + 0.02);   // slides out
            } else {
                this.emerge = Math.max(0, this.emerge - 0.02);   // slides back
                if (this.emerge <= 0) this.active = false;       // gone the moment it's back in
            }
            if (this.snap > 0) this.snap--;
            if (this.emerge > 0.6) {
                for (let c of chickens) {
                    if (c.dead || c.state === 'exodus' || c.state === 'toCoop') continue;
                    if (dist(this.x, this.y, c.x, c.y) < this.killR) {
                        if (eatChicken(c, 'gator')) this.snap = 16;
                    }
                }
            }
        }
        draw() {
            let e = this.emerge;
            if (e <= 0.02) return;
            let px = this.x + (this.side === -1 ? -1 : 1) * (1 - e) * 95;
            drawShadow(px, this.y, 40 * e, 10 * e);
            ctx.save();
            ctx.translate(px, this.y);
            ctx.scale(this.facingDir, 1);
            let jaw = this.snap > 0 ? 9 : 2 + Math.sin(frameCount * 0.04) * 1.2;
            // tail
            ctx.fillStyle = '#3f6b3a';
            ctx.beginPath(); ctx.moveTo(-30, -6); ctx.lineTo(-62, 2); ctx.lineTo(-30, 4); ctx.closePath(); ctx.fill();
            // body
            ctx.fillStyle = '#4c7d44';
            ctx.beginPath(); ctx.ellipse(-6, -4, 30, 10, 0, 0, Math.PI * 2); ctx.fill();
            // scaly ridges
            ctx.fillStyle = '#3f6b3a';
            for (let i = -3; i < 4; i++) {
                ctx.beginPath(); ctx.moveTo(i * 8 - 4, -12); ctx.lineTo(i * 8, -18); ctx.lineTo(i * 8 + 4, -12); ctx.closePath(); ctx.fill();
            }
            // legs
            ctx.fillStyle = '#3f6b3a';
            ctx.fillRect(-16, 2, 7, 9); ctx.fillRect(8, 2, 7, 9);
            // upper jaw
            ctx.fillStyle = '#4c7d44';
            ctx.beginPath(); ctx.moveTo(20, -10); ctx.lineTo(62, -6 - jaw * 0.3); ctx.lineTo(62, -1 - jaw * 0.3); ctx.lineTo(20, -1); ctx.closePath(); ctx.fill();
            // lower jaw (opens)
            ctx.fillStyle = '#43703c';
            ctx.beginPath(); ctx.moveTo(20, 0); ctx.lineTo(60, 1 + jaw); ctx.lineTo(60, 5 + jaw); ctx.lineTo(20, 4); ctx.closePath(); ctx.fill();
            // teeth
            ctx.fillStyle = '#ffffff';
            for (let i = 0; i < 5; i++) {
                let tx = 28 + i * 7;
                ctx.beginPath(); ctx.moveTo(tx, -1); ctx.lineTo(tx + 3, 3); ctx.lineTo(tx + 5, -1); ctx.closePath(); ctx.fill();
            }
            // eye ridge + eye
            ctx.fillStyle = '#4c7d44';
            ctx.beginPath(); ctx.arc(22, -14, 6, 0, Math.PI * 2); ctx.fill();
            ctx.fillStyle = '#e8d24a';
            ctx.beginPath(); ctx.arc(23, -14, 3.4, 0, Math.PI * 2); ctx.fill();
            ctx.fillStyle = '#000';
            ctx.fillRect(22.4, -16.4, 1.6, 4.8);
            ctx.restore();
        }
    }

    class Farmer {
        constructor() {
            this.dir = Math.random() > 0.5 ? 1 : -1;
            this.x = this.dir === 1 ? -50 : canvas.width + 50;
            this.y = playArea.minY + 60 + Math.random() * (playArea.maxY - playArea.minY - 90);
            this.stopX = this.dir === 1
                ? playArea.minX + 120 + Math.random() * 200
                : playArea.maxX - 120 - Math.random() * 200;
            this.facingDir = this.dir;
            this.speed = 2.0;
            this.state = 'arrive';
            this.rant = 60 * (5 + Math.random() * 3);
            this.walkCycle = 0;
            this.active = true;
            this.grab = 0;
            this.killR = 58;     // get within arm's reach and he grabs one
            this.scareR = 125;
        }
        update() {
            this.walkCycle += 0.22;
            if (this.state === 'arrive') {
                let dx = this.stopX - this.x;
                if (Math.abs(dx) < 5) this.state = 'rant';
                else { this.x += Math.sign(dx) * this.speed; this.facingDir = Math.sign(dx); }
            } else if (this.state === 'rant') {
                if (--this.rant <= 0) { this.state = 'leave'; this.facingDir = -this.dir; }
            } else {
                this.x -= this.dir * this.speed;
                if (this.x < -90 || this.x > canvas.width + 90) this.active = false;
            }
            if (this.grab > 0) this.grab--;
            // Once he's stopped and shouting, anything in arm's reach gets nabbed
            if (this.state === 'rant') {
                for (let c of chickens) {
                    if (c.dead || c.state === 'exodus' || c.state === 'toCoop') continue;
                    if (dist(this.x, this.y, c.x, c.y) < this.killR) {
                        if (eatChicken(c, 'farmer')) this.grab = 16;
                    }
                }
            }
        }
        draw() {
            drawShadow(this.x, this.y, 16, 6);
            ctx.save();
            ctx.translate(this.x, this.y);
            ctx.scale(this.facingDir, 1);
            let ranting = this.state === 'rant';
            let step = this.state === 'rant' ? 0 : Math.sin(this.walkCycle) * 6;
            let wave = ranting ? Math.sin(frameCount * 0.35) * 22 : 0;
            let hop = ranting ? Math.abs(Math.sin(frameCount * 0.18)) * 3 : 0;
            ctx.translate(0, -hop);
            // legs (denim)
            ctx.strokeStyle = '#3a5a8c'; ctx.lineWidth = 6; ctx.lineCap = 'round';
            ctx.beginPath();
            ctx.moveTo(-3, -18); ctx.lineTo(-3 + step, 2);
            ctx.moveTo(3, -18); ctx.lineTo(3 - step, 2);
            ctx.stroke();
            // boots
            ctx.fillStyle = '#4a3520';
            ctx.fillRect(-7 + step, 0, 9, 4); ctx.fillRect(-1 - step, 0, 9, 4);
            // body / overalls
            ctx.fillStyle = '#4f7fbf';
            ctx.fillRect(-9, -42, 18, 26);
            // shirt sleeves
            ctx.fillStyle = '#c9524a';
            ctx.fillRect(-11, -42, 22, 9);
            // arms -- one shaking a fist
            ctx.strokeStyle = '#e8b98c'; ctx.lineWidth = 4;
            ctx.beginPath();
            ctx.moveTo(-9, -38); ctx.lineTo(-16, -30 + step * 0.4);
            ctx.moveTo(9, -38); ctx.lineTo(17, -44 - wave);
            ctx.stroke();
            ctx.lineCap = 'butt';
            // fist
            ctx.fillStyle = '#e8b98c';
            ctx.beginPath(); ctx.arc(17, -45 - wave, 4, 0, Math.PI * 2); ctx.fill();
            // head
            ctx.fillStyle = '#f0c49a';
            ctx.beginPath(); ctx.arc(0, -50, 8.5, 0, Math.PI * 2); ctx.fill();
            // angry red face when ranting
            if (ranting) {
                ctx.fillStyle = 'rgba(220,60,50,0.45)';
                ctx.beginPath(); ctx.arc(0, -50, 8.5, 0, Math.PI * 2); ctx.fill();
            }
            // angry brows + eyes + shouting mouth
            ctx.strokeStyle = '#3a2a1a'; ctx.lineWidth = 2;
            ctx.beginPath(); ctx.moveTo(-6, -54); ctx.lineTo(-1, -52); ctx.moveTo(6, -54); ctx.lineTo(1, -52); ctx.stroke();
            ctx.fillStyle = '#000';
            ctx.beginPath(); ctx.arc(-3, -50, 1.4, 0, Math.PI * 2); ctx.fill();
            ctx.beginPath(); ctx.arc(3, -50, 1.4, 0, Math.PI * 2); ctx.fill();
            ctx.fillStyle = '#6b2020';
            if (ranting) { ctx.beginPath(); ctx.ellipse(0, -45, 3.5, 2.5 + Math.abs(Math.sin(frameCount * 0.3)) * 1.5, 0, 0, Math.PI * 2); ctx.fill(); }
            else ctx.fillRect(-3, -46, 6, 1.6);
            // straw hat
            ctx.fillStyle = '#d9b451';
            ctx.beginPath(); ctx.ellipse(0, -57, 15, 4, 0, 0, Math.PI * 2); ctx.fill();
            ctx.beginPath(); ctx.ellipse(0, -61, 7.5, 6, 0, 0, Math.PI * 2); ctx.fill();
            ctx.restore();
            // shouting marks
            if (ranting && Math.floor(frameCount / 12) % 2 === 0) {
                ctx.fillStyle = '#fff2a8';
                ctx.font = 'bold 16px "Courier New", monospace';
                ctx.fillText('!', this.x + 22 * this.facingDir, this.y - 62);
            }
        }
    }

    class Puddle {
        constructor(x, y) {
            this.x = x; this.y = y;
            this.grow = 0;
            this.life = 60 * (38 + Math.random() * 22);
            this.active = true;
            this.stickR = 36;
            this.blobs = [];
            for (let i = 0; i < 4; i++) {
                this.blobs.push({ dx: (Math.random() - 0.5) * 34, dy: (Math.random() - 0.5) * 14,
                    rx: 14 + Math.random() * 14, ry: 6 + Math.random() * 6 });
            }
            // Any corn here is washed away -- a hazard must never turn corn you
            // already placed safely into a death trap.
            for (let f of foods) if (dist(f.x, f.y, this.x, this.y) < this.stickR + 40) f.consumed = true;
        }
        update() {
            // grow in while alive, then dry up and vanish
            if (this.life > 0) { this.life--; this.grow = Math.min(1, this.grow + 0.02); }
            else { this.grow -= 0.018; if (this.grow <= 0) { this.grow = 0; this.active = false; } }
        }
        draw() {
            let g = Math.max(0, this.grow);
            ctx.save();
            ctx.globalAlpha = 0.85 * g;
            ctx.fillStyle = '#5b4a33';
            for (let b of this.blobs) {
                ctx.beginPath(); ctx.ellipse(this.x + b.dx * g, this.y + b.dy * g, b.rx * g, b.ry * g, 0, 0, Math.PI * 2); ctx.fill();
            }
            // wet shine
            ctx.globalAlpha = 0.30 * g;
            ctx.fillStyle = '#9fc0d8';
            for (let b of this.blobs) {
                ctx.beginPath(); ctx.ellipse(this.x + b.dx * g - 2, this.y + b.dy * g - 2, b.rx * 0.55 * g, b.ry * 0.45 * g, 0, 0, Math.PI * 2); ctx.fill();
            }
            ctx.restore();
        }
    }

    class ThornBush {
        constructor(x, y) {
            this.x = x; this.y = y;
            this.grow = 0;
            this.life = 60 * (45 + Math.random() * 30);
            this.active = true;
            this.stickR = 30;
            this.arms = [];
            for (let i = 0; i < 9; i++) {
                let a = (i / 9) * Math.PI * 2 + Math.random() * 0.4;
                this.arms.push({ a: a, len: 12 + Math.random() * 12 });
            }
            // Corn here gets buried under the bush -- same fairness rule as mud.
            for (let f of foods) if (dist(f.x, f.y, this.x, this.y) < this.stickR + 40) f.consumed = true;
        }
        update() {
            // grow in while alive, then wither away and vanish
            if (this.life > 0) { this.life--; this.grow = Math.min(1, this.grow + 0.012); }
            else { this.grow -= 0.014; if (this.grow <= 0) { this.grow = 0; this.active = false; } }
        }
        draw() {
            let g = Math.max(0, this.grow);
            if (g <= 0.02) return;
            drawShadow(this.x, this.y, 22 * g, 8 * g);
            ctx.save();
            ctx.translate(this.x, this.y);
            // dark tangled mass
            ctx.fillStyle = '#2f4a2a';
            ctx.beginPath(); ctx.ellipse(0, -8 * g, 20 * g, 13 * g, 0, 0, Math.PI * 2); ctx.fill();
            // spiky arms
            ctx.strokeStyle = '#3d5c33'; ctx.lineWidth = 2.5;
            ctx.beginPath();
            for (let arm of this.arms) {
                let L = arm.len * g;
                ctx.moveTo(0, -8 * g);
                ctx.lineTo(Math.cos(arm.a) * L, -8 * g + Math.sin(arm.a) * L * 0.6);
            }
            ctx.stroke();
            // thorns
            ctx.fillStyle = '#d8d0a8';
            for (let arm of this.arms) {
                let L = arm.len * g;
                let tx = Math.cos(arm.a) * L, ty = -8 * g + Math.sin(arm.a) * L * 0.6;
                ctx.beginPath(); ctx.arc(tx, ty, 1.8 * g, 0, Math.PI * 2); ctx.fill();
            }
            // a few mean little berries
            ctx.fillStyle = '#8b2f3f';
            ctx.beginPath(); ctx.arc(-6 * g, -12 * g, 2.4 * g, 0, Math.PI * 2); ctx.fill();
            ctx.beginPath(); ctx.arc(7 * g, -6 * g, 2.4 * g, 0, Math.PI * 2); ctx.fill();
            ctx.restore();
        }
    }

    class RainCloud {
        constructor() {
            this.dir = Math.random() > 0.5 ? 1 : -1;
            this.x = this.dir === 1 ? -80 : canvas.width + 80;
            this.y = playArea.minY + 40 + Math.random() * (playArea.maxY - playArea.minY - 70);
            this.stopX = playArea.minX + 100 + Math.random() * (playArea.maxX - playArea.minX - 200);
            this.z = 95;               // floats above the field
            this.speed = 1.6;
            this.state = 'arrive';
            this.rain = 60 * 4;
            this.drops = [];
            this.dropped = false;
            this.active = true;
        }
        update() {
            if (this.state === 'arrive') {
                let dx = this.stopX - this.x;
                if (Math.abs(dx) < 6) this.state = 'rain';
                else this.x += Math.sign(dx) * this.speed;
            } else if (this.state === 'rain') {
                if (frameCount % 2 === 0) {
                    this.drops.push({ x: (Math.random() - 0.5) * 54, y: 0, v: 3 + Math.random() * 2 });
                }
                if (--this.rain <= 0) {
                    // don't drop the puddle right on top of a hen
                    if (!this.dropped && !chickens.some(c => dist(this.x, this.y, c.x, c.y) < 70)) {
                        puddles.push(new Puddle(this.x, this.y));
                        this.dropped = true;
                    }
                    this.state = 'leave';
                }
            } else {
                this.x += this.dir * this.speed;
                if (this.x < -140 || this.x > canvas.width + 140) this.active = false;
            }
            for (let d of this.drops) d.y += d.v;
            this.drops = this.drops.filter(d => d.y < this.z);
        }
        draw() {
            ctx.save();
            // rain
            ctx.strokeStyle = 'rgba(150,190,225,0.75)'; ctx.lineWidth = 2;
            ctx.beginPath();
            for (let d of this.drops) {
                ctx.moveTo(this.x + d.x, this.y - this.z + d.y);
                ctx.lineTo(this.x + d.x, this.y - this.z + d.y + 6);
            }
            ctx.stroke();
            // little grey cloud, about horse-sized
            ctx.translate(this.x, this.y - this.z);
            ctx.fillStyle = '#7d8894';
            ctx.beginPath();
            ctx.arc(-20, 0, 15, 0, Math.PI * 2);
            ctx.arc(0, -6, 20, 0, Math.PI * 2);
            ctx.arc(22, 0, 15, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#6b747f';
            ctx.beginPath();
            ctx.arc(-16, 6, 11, 0, Math.PI * 2);
            ctx.arc(4, 8, 13, 0, Math.PI * 2);
            ctx.arc(20, 5, 10, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();
        }
    }

    // Everything a hen should think twice about walking into.
    function killZones() {
        let z = [];
        // `a` is how strongly to draw the warning ring, so it fades in and out
        // with the hazard instead of popping on.
        for (let w of wolves) if (w.state !== 'leave') z.push({ x: w.x, y: w.y, kill: w.killR, scare: w.scareR, kind: 'WOLF!', a: 1 });
        for (let g of gators) if (g.emerge > 0.4) z.push({ x: g.x, y: g.y, kill: g.killR, scare: g.scareR, kind: 'GATOR!', a: Math.min(1, (g.emerge - 0.4) / 0.3) });
        for (let f of farmers) if (f.state === 'rant') z.push({ x: f.x, y: f.y, kill: f.killR, scare: f.scareR, kind: 'FARMER!', a: 1 });
        return z;
    }
    function stickZones() {
        let z = [];
        for (let p of puddles) if (p.grow > 0.5) z.push({ x: p.x, y: p.y, r: p.stickR, kind: 'MUD!', a: Math.min(1, (p.grow - 0.5) / 0.35) });
        for (let t of thorns) if (t.grow > 0.5) z.push({ x: t.x, y: t.y, r: t.stickR, kind: 'THORNS!', a: Math.min(1, (t.grow - 0.5) / 0.35) });
        return z;
    }

    // One roaming hazard at a time, so the yard never becomes unplayable.
    function spawnRoamingHazard() {
        let roll = Math.random();
        if (roll < 0.4) {
            wolves.push(new Wolf());
            showBanner('A WOLF!', '#ff5a5a');
            sndGrowl();
        } else if (roll < 0.7) {
            gators.push(new Gator());
            showBanner('ALLIGATOR!', '#8aff6b');
            sndGrowl();
        } else {
            farmers.push(new Farmer());
            showBanner('ANGRY FARMER!', '#ffbe50');
            sndDud();
        }
    }

    // Is this spot a bad place to put corn? Used by the aiming reticle.
    function spotDanger(x, y) {
        // Margins allow for the corn scattering after it lands, so a "safe"
        // reticle really is safe.
        for (let z of killZones()) if (dist(x, y, z.x, z.y) < z.kill + 78) return z.kind;
        for (let z of stickZones()) if (dist(x, y, z.x, z.y) < z.r + 62) return z.kind;
        return null;
    }

    class Lightning {
        constructor(x, y) {
            this.x = x; this.y = y;
            this.maxLife = 30;
            this.life = this.maxLife;
            this.active = true;
            // Jagged path from the clouds down to the strike point
            this.pts = [];
            let cx = x;
            let steps = Math.max(4, Math.floor(y / 26));
            for (let i = 0; i <= steps; i++) {
                let t = i / steps;
                this.pts.push({ x: cx, y: t * y });
                cx = x + (Math.random() - 0.5) * 34 * (1 - t) + (x - x) * t;
            }
            this.pts.push({ x: x, y: y });
        }
        update() {
            this.life--;
            if (this.life <= 0) this.active = false;
        }
        draw() {
            // Only the first third of the life is the visible flash
            let t = this.life / this.maxLife;
            if (t < 0.55) return;
            let a = (t - 0.55) / 0.45;
            // flicker
            if (Math.floor(this.life / 2) % 2 === 0 && t < 0.85) return;
            ctx.save();
            ctx.globalAlpha = a;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            // outer glow
            ctx.strokeStyle = 'rgba(180,210,255,0.55)';
            ctx.lineWidth = 9;
            ctx.beginPath();
            ctx.moveTo(this.pts[0].x, this.pts[0].y);
            for (let p of this.pts) ctx.lineTo(p.x, p.y);
            ctx.stroke();
            // hot core
            ctx.strokeStyle = '#ffffff';
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.moveTo(this.pts[0].x, this.pts[0].y);
            for (let p of this.pts) ctx.lineTo(p.x, p.y);
            ctx.stroke();
            // scorch flare at the ground
            ctx.fillStyle = 'rgba(255,255,220,' + (0.5 * a) + ')';
            ctx.beginPath();
            ctx.ellipse(this.x, this.y, 26, 10, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();
        }
    }

    // P key: call down a bolt. Foxes bolt for the exit and go home hungry.
    function strikeLightning() {
        if (boltCd > 0) return false;
        boltCd = BOLT_COOLDOWN;

        // Aim at a fox if there is one, otherwise just put on a show
        let target = foxes.length > 0 ? foxes[0] : null;
        let sx = target ? target.x : playArea.minX + Math.random() * (playArea.maxX - playArea.minX);
        let sy = target ? target.y : playArea.minY + Math.random() * (playArea.maxY - playArea.minY);

        bolts.push(new Lightning(sx, sy));
        sndThunder();
        flash = 1;
        puff(sx, sy, 16, '#e8e4c8', 3.0);

        // The whole thunderclap rolls across the farm -- EVERY fox on the field
        // turns tail, wherever it is. This is the player's big moment.
        for (let f of foxes) {
            if (!f.scared) { f.scare(); foxesZapped++; addScore(100); }
        }
        // Everyone else jumps out of their skin too
        for (let c of chickens) {
            if (c.z === 0 && c.vz === 0 && c.flutterCd <= 0 && dist(c.x, c.y, sx, sy) < 260) c.flutter(sx, sy);
        }
        for (let h of horses) h.spook(sx, sy);
        return true;
    }

    class Bear {
        constructor() {
            this.dir = Math.random() > 0.5 ? 1 : -1;
            this.x = this.dir === 1 ? -110 : canvas.width + 110;
            this.y = playArea.minY + 30 + Math.random() * (playArea.maxY - playArea.minY - 30);
            this.baseY = this.y;
            this.speed = 2.6 + Math.random() * 1.2;
            this.facingDir = this.dir;
            this.walkCycle = 0;
            this.dustCd = 0;
            this.calledExodus = false;
            this.active = true;
        }
        update() {
            // Once it's properly on the field, the crazy ones go with it
            if (!this.calledExodus &&
                ((this.dir === 1 && this.x > canvas.width * 0.3) ||
                 (this.dir === -1 && this.x < canvas.width * 0.7))) {
                this.calledExodus = true;
                let crazies = chickens.filter(c => c.crazy && c.state !== 'exodus');
                if (crazies.length > 0) {
                    showBanner('THE CRAZY ONES LEAVE!', '#ff6bcb',
                        'The crazy chickens are flying away with the bear! Bye bye!');
                    crazies.forEach(c => c.startExodus(this.dir));
                }
            }
            this.x += this.speed * this.dir;
            // lazy weave so it isn't a straight line
            this.y = clampY(this.baseY + Math.sin(this.x * 0.012) * 18);
            this.walkCycle += 0.26;
            if (--this.dustCd <= 0) {
                this.dustCd = 6;
                puff(this.x - 20 * this.dir, this.y + 4, 2, '#8f9c6a', 1.0);
            }
            if ((this.dir === 1 && this.x > canvas.width + 130) ||
                (this.dir === -1 && this.x < -130)) this.active = false;
        }
        draw() {
            drawShadow(this.x, this.y, 32, 12);
            ctx.save();
            ctx.translate(this.x, this.y);
            ctx.scale(this.facingDir, 1);
            // lumbering bound
            ctx.translate(0, -Math.abs(Math.sin(this.walkCycle)) * 5);

            let front = Math.sin(this.walkCycle) * 11;
            let back = Math.sin(this.walkCycle + 2.4) * 11;

            // Legs
            ctx.strokeStyle = '#3a2416'; ctx.lineWidth = 7; ctx.lineCap = 'round';
            ctx.beginPath();
            ctx.moveTo(-16, 0); ctx.lineTo(-16 + back, 18);
            ctx.moveTo(-6, 0); ctx.lineTo(-6 + back * 0.8, 18);
            ctx.moveTo(12, 0); ctx.lineTo(12 + front * 0.8, 18);
            ctx.moveTo(21, 0); ctx.lineTo(21 + front, 18);
            ctx.stroke();
            ctx.lineCap = 'butt';

            // Body with a shoulder hump
            ctx.fillStyle = '#4a2f1c';
            ctx.beginPath(); ctx.ellipse(0, -10, 27, 15, 0, 0, Math.PI * 2); ctx.fill();
            ctx.beginPath(); ctx.ellipse(8, -20, 13, 9, 0, 0, Math.PI * 2); ctx.fill();

            // Head
            ctx.beginPath(); ctx.ellipse(28, -18, 13, 11, 0, 0, Math.PI * 2); ctx.fill();
            // Ears
            ctx.beginPath(); ctx.arc(23, -28, 5, 0, Math.PI * 2); ctx.fill();
            ctx.beginPath(); ctx.arc(34, -27, 5, 0, Math.PI * 2); ctx.fill();
            // Muzzle
            ctx.fillStyle = '#8a6a4a';
            ctx.beginPath(); ctx.ellipse(38, -14, 8, 6, 0, 0, Math.PI * 2); ctx.fill();
            ctx.fillStyle = '#1a1008';
            ctx.beginPath(); ctx.arc(44, -15, 3, 0, Math.PI * 2); ctx.fill();
            // Eye
            ctx.fillRect(30, -22, 3, 3);

            ctx.restore();
        }
    }

    class SkyBird {
        constructor(x, y, dir, speed, scale) {
            this.x = x; this.y = y;
            this.dir = dir;
            this.speed = speed;
            this.scale = scale;
            this.flap = Math.random() * Math.PI * 2;
            this.active = true;
        }
        update() {
            this.x += this.speed * this.dir;
            this.y += Math.sin(this.x * 0.008) * 0.12;
            this.flap += 0.22;
            if (this.x < -60 || this.x > canvas.width + 60) this.active = false;
        }
        draw() {
            let s = this.scale;
            let w = Math.sin(this.flap);
            ctx.save();
            ctx.translate(this.x, this.y);
            ctx.scale(this.dir * s, s);
            ctx.strokeStyle = 'rgba(40,50,60,0.75)';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(-7, w * 4);
            ctx.quadraticCurveTo(-3, -3 - w * 2, 0, 0);
            ctx.quadraticCurveTo(3, -3 - w * 2, 7, w * 4);
            ctx.stroke();
            ctx.restore();
        }
    }

    function spawnFlock() {
        let dir = Math.random() > 0.5 ? 1 : -1;
        let n = 3 + Math.floor(Math.random() * 4);
        let y = 45 + Math.random() * 95;
        let x = dir === 1 ? -40 : canvas.width + 40;
        let speed = 0.7 + Math.random() * 0.8;
        let scale = 0.7 + Math.random() * 0.6;
        for (let i = 0; i < n; i++) {
            // loose V formation
            skyBirds.push(new SkyBird(
                x - dir * i * 16,
                y + Math.abs(i - (n - 1) / 2) * 7 + (Math.random() - 0.5) * 4,
                dir, speed, scale
            ));
        }
    }

    // The fox is an opportunist: it goes for the fattest, slowest bird out there.
    function pickPrey(forFox) {
        // Prefer the fattest bird nobody else is already hunting, so a whole
        // wave of foxes threatens several chickens instead of ganging up on one.
        let taken = new Set();
        for (let f of foxes) {
            if (f !== forFox && f.targetChicken && !f.targetChicken.dead) taken.add(f.targetChicken);
        }
        let best = null, bestFree = null;
        for (let c of chickens) {
            if (c.dead || c.state === 'exodus' || c.state === 'toCoop') continue;
            if (!best || c.fatness > best.fatness) best = c;
            if (!taken.has(c) && (!bestFree || c.fatness > bestFree.fatness)) bestFree = c;
        }
        return bestFree || best;
    }

    // ============================================================
    //  WINNING: the coop, the confetti, and the parade inside
    // ============================================================

    class Coop {
        constructor(x, y) {
            this.x = x; this.y = y;
            this.doorX = x;        // chickens walk to here
            this.doorY = y + 4;
        }
        draw() {
            drawShadow(this.x, this.y, 62, 16);
            ctx.save();
            ctx.translate(this.x, this.y);
            // back wall / body
            ctx.fillStyle = '#b23c2e';
            ctx.fillRect(-55, -70, 110, 74);
            // roof
            ctx.fillStyle = '#7a2820';
            ctx.beginPath();
            ctx.moveTo(-64, -66); ctx.lineTo(0, -104); ctx.lineTo(64, -66);
            ctx.closePath(); ctx.fill();
            // roof ridge
            ctx.fillStyle = '#5f1f18';
            ctx.fillRect(-64, -70, 128, 6);
            // white trim
            ctx.fillStyle = '#f4ede0';
            ctx.fillRect(-55, -20, 110, 6);
            // round doorway
            ctx.fillStyle = '#2a1712';
            ctx.beginPath();
            ctx.arc(0, -8, 18, Math.PI, 0);
            ctx.fill();
            ctx.fillRect(-18, -8, 36, 12);
            // little ramp
            ctx.fillStyle = '#8a6a3a';
            ctx.fillRect(-14, 4, 28, 6);
            // a window with a heart
            ctx.fillStyle = '#ffd45e';
            ctx.beginPath(); ctx.arc(-34, -44, 9, 0, Math.PI * 2); ctx.fill();
            ctx.beginPath(); ctx.arc(34, -44, 9, 0, Math.PI * 2); ctx.fill();
            // sign
            ctx.fillStyle = '#f4ede0';
            ctx.fillRect(-30, -96, 60, 16);
            ctx.fillStyle = '#7a2820';
            ctx.font = 'bold 11px "Courier New", monospace';
            ctx.textAlign = 'center';
            ctx.fillText('HEN HOUSE', 0, -84);
            ctx.textAlign = 'left';
            // a rooster weathervane
            ctx.strokeStyle = '#5f1f18'; ctx.lineWidth = 2;
            ctx.beginPath(); ctx.moveTo(0, -104); ctx.lineTo(0, -116); ctx.stroke();
            ctx.fillStyle = '#e8a020';
            ctx.beginPath();
            ctx.moveTo(-6, -116); ctx.lineTo(6, -120); ctx.lineTo(2, -114);
            ctx.lineTo(8, -112); ctx.lineTo(-6, -110); ctx.closePath(); ctx.fill();
            ctx.restore();
        }
    }

    function spawnConfetti(n) {
        const cols = ['#ff5a7a', '#ffd23b', '#4dd2ff', '#8aff6b', '#c58bff', '#ff9b54', '#ffffff'];
        for (let i = 0; i < n; i++) {
            confetti.push({
                x: Math.random() * canvas.width,
                y: -10 - Math.random() * 60,
                vx: (Math.random() - 0.5) * 1.6,
                vy: 1.4 + Math.random() * 2.2,
                rot: Math.random() * Math.PI,
                vr: (Math.random() - 0.5) * 0.3,
                w: 5 + Math.random() * 5,
                h: 7 + Math.random() * 6,
                col: cols[(Math.random() * cols.length) | 0],
                sway: Math.random() * Math.PI * 2
            });
        }
    }

    function updateConfetti() {
        for (let c of confetti) {
            c.sway += 0.1;
            c.x += c.vx + Math.sin(c.sway) * 0.8;
            c.y += c.vy;
            c.rot += c.vr;
        }
        confetti = confetti.filter(c => c.y < canvas.height + 20);
    }

    function drawConfetti() {
        for (let c of confetti) {
            ctx.save();
            ctx.translate(c.x, c.y);
            ctx.rotate(c.rot);
            ctx.fillStyle = c.col;
            ctx.fillRect(-c.w / 2, -c.h / 2, c.w, c.h);
            ctx.restore();
        }
    }

    // Kick off the victory: build the coop and send the flock marching in.
    function startWin() {
        gameState = 'winning';
        winHoldTimer = 0;
        coop = new Coop(canvas.width / 2, horizonY + 78);
        // clear the hazards so nothing eats a chicken during the parade
        foxes.length = 0;
        bears.length = 0;
        rabbits.length = 0;
        for (let c of chickens) { c.state = 'toCoop'; c.releaseFood(); }
        showBanner('YOU DID IT!', '#ffd23b');
        playVictory();          // the win track takes over from here
        spawnConfetti(120);
    }

    function finishWin() {
        gameState = 'won';
        endScreenAt = frameCount;
        showBanner('YOU WIN!', '#ffd23b');
        // no sting here -- the victory track is already playing
    }

    // Wipe the board and start a brand new game.
    function restartGame() {
        chickens = []; horses = []; cows = []; foxes = []; eggs = [];
        foods = []; bags = []; particles = []; bears = []; skyBirds = [];
        bolts = []; grasses = []; rabbits = []; poops = []; flies = [];
        confetti = []; coop = null; chickensHoused = 0;
        wolves = []; gators = []; farmers = []; puddles = []; thorns = []; rainClouds = [];
        stuckLosses = 0;
        nextHazardAt = frameCount + 60 * 25;
        nextRainAt = frameCount + 60 * 34;
        nextThornAt = frameCount + 60 * 45;
        score = 0; scorePop = 0;
        chickensLost = 0; foxesZapped = 0; chickensStarved = 0;
        grassStolen = 0; cowMeals = 0; crazyDeparted = 0;
        boltCd = 0; boltDeny = 0; flash = 0; denyFlash = 0;
        banner = null;
        eggBoomDone = false; crazyEraAnnounced = false;
        cornReady = CORN_MAG; cornRefillCd = CORN_REFILL_FRAMES; cornThrowCd = 0;
        stopVictory();          // new game -- back to the normal soundtrack
        updateMusic();
        gameState = 'playing';
        // reset the timed events relative to now
        nextBearAt = frameCount + 60 * (25 + Math.random() * 45);
        nextFlockAt = frameCount + 60 * (5 + Math.random() * 8);
        nextGrassAt = frameCount + 60 * 2;
        nextRabbitAt = frameCount + 60 * 6;
        nextFlyAt = frameCount + 60 * 4;
        gameStartFrame = frameCount;
        seedWorld();
    }

    // --- ENVIRONMENT ---

    // Grass tufts, generated once so they don't crawl around every frame
    const tufts = [];
    (function seedTufts() {
        let seed = 1337;
        function rnd() { seed = (seed * 1103515245 + 12345) % 2147483648; return seed / 2147483648; }
        for (let i = 0; i < 90; i++) {
            tufts.push({
                x: rnd() * canvas.width,
                y: horizonY + 30 + rnd() * (canvas.height - horizonY - 30),
                h: 3 + rnd() * 4,
                shade: rnd() > 0.5 ? '#5b8f5a' : '#71a870'
            });
        }
    })();

    let cloudOffset = 0;

    function drawBackground() {
        // Sky
        ctx.fillStyle = '#87CEEB';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Drifting clouds
        cloudOffset = (cloudOffset + 0.12) % (canvas.width + 200);
        ctx.fillStyle = 'rgba(255, 255, 255, 0.6)';
        function cloud(cx, cy, s) {
            let x = ((cx + cloudOffset) % (canvas.width + 200)) - 100;
            ctx.beginPath();
            ctx.arc(x, cy, 30 * s, 0, Math.PI * 2);
            ctx.arc(x + 40 * s, cy, 40 * s, 0, Math.PI * 2);
            ctx.arc(x + 80 * s, cy, 30 * s, 0, Math.PI * 2);
            ctx.fill();
        }
        cloud(canvas.width * 0.12, 80, 1);
        cloud(canvas.width * 0.55, 130, 0.7);
        cloud(canvas.width * 0.34, 55, 0.5);
        cloud(canvas.width * 0.80, 95, 0.85);

        // Birds passing overhead -- pure scenery, they never land
        skyBirds.forEach(b => b.draw());

        // Hills -- rolling all the way across, whatever the width
        let W = canvas.width;
        ctx.fillStyle = '#4a7c49';
        ctx.beginPath();
        ctx.moveTo(0, horizonY);
        let humps = Math.max(2, Math.round(W / 400));
        for (let i = 0; i < humps; i++) {
            let x0 = (W / humps) * i, x1 = (W / humps) * (i + 1);
            let h = (i % 2 === 0) ? 80 : 120;
            ctx.quadraticCurveTo((x0 + x1) / 2, horizonY - h, x1, horizonY);
        }
        ctx.lineTo(W, horizonY); ctx.lineTo(0, horizonY); ctx.fill();

        // Ground
        ctx.fillStyle = '#659c64'; ctx.fillRect(0, horizonY, canvas.width, canvas.height - horizonY);

        // Grass tufts, all swaying together
        let sway = Math.sin(frameCount * 0.03) * 1.5;
        ctx.lineWidth = 2;
        for (let t of tufts) {
            ctx.strokeStyle = t.shade;
            ctx.beginPath();
            ctx.moveTo(t.x, t.y);
            ctx.lineTo(t.x + sway, t.y - t.h);
            ctx.stroke();
        }

        // Fence
        ctx.strokeStyle = '#5c4033'; ctx.lineWidth = 3;
        ctx.beginPath(); ctx.moveTo(0, horizonY + 10); ctx.lineTo(W, horizonY + 10);
        ctx.moveTo(0, horizonY + 25); ctx.lineTo(W, horizonY + 25); ctx.stroke();
        ctx.fillStyle = '#5c4033';
        for (let x = 20; x < W; x += 80) ctx.fillRect(x, horizonY - 5, 6, 40);
    }

    function horseSizeLabel(p) {
        if (p < 0.12) return 'LEAN';
        if (p < 0.30) return 'WELL FED';
        if (p < 0.48) return 'CHONKY';
        if (p < 0.66) return 'ROTUND';
        if (p < 0.82) return 'ENORMOUS';
        if (p < 0.95) return 'ABSURD';
        return 'A BOULDER';
    }

    // Big tappable LIGHTNING button -- the whole reason mobile needs buttons,
    // since there's no P key on a phone. Shows its own recharge state.
    function drawBoltButton() {
        if (gameState !== 'playing') return;
        let b = BOLT_BTN;
        let ready = boltCd <= 0;
        let frac = ready ? 1 : 1 - boltCd / BOLT_COOLDOWN;
        let hover = inBoltBtn(rawMouseX, rawMouseY);
        let pulse = 0.5 + Math.sin(frameCount * 0.09) * 0.5;
        ctx.save();

        // body -- glows when it's ready to fire
        ctx.fillStyle = ready ? 'rgba(30,70,110,0.92)' : 'rgba(0,0,0,0.5)';
        ctx.fillRect(b.x, b.y, b.w, b.h);
        // recharge fill creeping across
        if (!ready) {
            ctx.fillStyle = 'rgba(90,150,200,0.45)';
            ctx.fillRect(b.x, b.y, b.w * frac, b.h);
        }
        ctx.strokeStyle = ready
            ? (hover ? '#ffffff' : 'rgba(255,235,120,' + (0.65 + 0.35 * pulse) + ')')
            : 'rgba(255,255,255,0.35)';
        ctx.lineWidth = ready ? 3 : 2;
        ctx.strokeRect(b.x, b.y, b.w, b.h);

        // lightning bolt icon
        let ix = b.x + 34, iy = b.y + b.h / 2;
        ctx.beginPath();
        ctx.moveTo(ix + 4, iy - 20);
        ctx.lineTo(ix - 9, iy + 3);
        ctx.lineTo(ix - 1, iy + 3);
        ctx.lineTo(ix - 6, iy + 20);
        ctx.lineTo(ix + 10, iy - 5);
        ctx.lineTo(ix + 1, iy - 5);
        ctx.closePath();
        if (ready) {
            ctx.fillStyle = '#ffe14d';
            ctx.shadowColor = '#ffe14d'; ctx.shadowBlur = 12 * pulse;
        } else {
            ctx.fillStyle = 'rgba(190,205,220,0.5)';
        }
        ctx.fill();
        ctx.shadowBlur = 0;

        // label
        ctx.textAlign = 'left';
        if (ready) {
            ctx.font = 'bold 21px "Courier New", monospace';
            ctx.fillStyle = 'rgba(0,0,0,0.55)';
            ctx.fillText('ZAP FOX!', b.x + 60, b.y + 32 + 2);
            ctx.fillStyle = '#ffe14d';
            ctx.fillText('ZAP FOX!', b.x + 60, b.y + 32);
            ctx.font = 'bold 11px "Courier New", monospace';
            ctx.fillStyle = 'rgba(255,255,255,0.7)';
            ctx.fillText('tap  or press P', b.x + 60, b.y + 50);
        } else {
            ctx.font = 'bold 19px "Courier New", monospace';
            ctx.fillStyle = (boltDeny > 0 && Math.floor(frameCount / 4) % 2 === 0) ? '#ff9090' : '#c8dcec';
            ctx.fillText('CHARGING', b.x + 60, b.y + 30);
            ctx.font = 'bold 15px "Courier New", monospace';
            ctx.fillStyle = '#9fc4dd';
            ctx.fillText(Math.ceil(boltCd / 60) + 's', b.x + 60, b.y + 49);
        }
        ctx.textAlign = 'left';
        ctx.restore();
    }

    // EASY / HARD switch, so a small child and a big one can both play.

    // A proper clickable music button, since a kid won't hunt for a hotkey.
    function drawMusicButton() {
        let b = MUSIC_BTN;
        let hover = inMusicBtn(rawMouseX, rawMouseY);
        let on = musicOn && soundOn;
        ctx.save();
        // body
        ctx.fillStyle = on ? 'rgba(40,120,60,0.85)' : 'rgba(0,0,0,0.5)';
        ctx.fillRect(b.x, b.y, b.w, b.h);
        ctx.strokeStyle = hover ? '#ffffff' : (on ? '#8aff6b' : 'rgba(255,255,255,0.55)');
        ctx.lineWidth = 2;
        ctx.strokeRect(b.x, b.y, b.w, b.h);

        // speaker icon
        let ix = b.x + 15, iy = b.y + b.h / 2;
        ctx.fillStyle = on ? '#dfffd0' : '#cfcfcf';
        ctx.beginPath();
        ctx.moveTo(ix - 5, iy - 4); ctx.lineTo(ix - 1, iy - 4); ctx.lineTo(ix + 4, iy - 9);
        ctx.lineTo(ix + 4, iy + 9); ctx.lineTo(ix - 1, iy + 4); ctx.lineTo(ix - 5, iy + 4);
        ctx.closePath(); ctx.fill();

            // sound waves
            ctx.strokeStyle = '#dfffd0'; ctx.lineWidth = 2;

            ctx.strokeStyle = '#ff8080'; ctx.lineWidth = 2.5;
            ctx.beginPath();
            ctx.moveTo(ix + 9, iy - 6); ctx.lineTo(ix + 19, iy + 6);
            ctx.moveTo(ix + 19, iy - 6); ctx.lineTo(ix + 9, iy + 6);
            ctx.stroke();

        ctx.fillStyle = on ? '#eaffe0' : '#e0e0e0';

        ctx.font = 'bold 9px "Courier New", monospace';
        ctx.fillStyle = 'rgba(255,255,255,0.6)';
        ctx.fillText('(N)', b.x + b.w - 26, b.y + 21);

    // Audio can't start until the player touches something, so ask them to.
    // Pick your difficulty before the first game starts.
    function drawStartGate() {
        let cx = canvas.width / 2, cy = canvas.height / 2;
        ctx.save();

        ctx.fillRect(0, 0, canvas.width, canvas.height);

        ctx.font = 'bold 46px "Courier New", monospace';
        ctx.fillStyle = '#000000';

        ctx.fillStyle = '#FFD700';
        ctx.fillText('FARM YARD CHAOS', cx, cy - 120);
        ctx.font = 'bold 22px "Courier New", monospace';
        ctx.fillStyle = '#ffffff';
        ctx.fillText('Pick how hard you want it', cx, cy - 78);

        // the two choices
        let opts = [
            { b: START_EASY_BTN, on: true,  title: 'EASY',

            ctx.fillStyle = 'rgba(255,255,255,0.85)';
            ctx.fillText(o.sub[0], b.x + b.w / 2, b.y + 102);
            ctx.fillText(o.sub[1], b.x + b.w / 2, b.y + 119);

        ctx.textAlign = 'center';
        ctx.font = 'bold 15px "Courier New", monospace';
        ctx.fillStyle = 'rgba(255,255,255,0.8)';
        ctx.fillText('you can switch any time with the button or the E key', cx, cy + 150);
        ctx.restore();
        ctx.textAlign = 'left';
