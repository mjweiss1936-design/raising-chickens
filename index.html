            let front = g ? Math.sin(this.walkCycle) * 13 : Math.sin(this.walkCycle + Math.PI) * 8;
            let back = g ? Math.sin(this.walkCycle + 2.2) * 13 : Math.sin(this.walkCycle) * 8;
            let ls1 = Math.sin(this.walkCycle) * 8;

            // Grazing: 0 -> 1 -> 0 dip over the peck, with a chewing wiggle
            let eating = this.state === 'peck';
            let eatT = eating ? Math.sin((1 - this.peckCycle / this.peckMax) * Math.PI) : 0;

            if (g) {
                // Bound + a slight forward pitch as it drives off the hind legs
                ctx.translate(0, -Math.abs(Math.sin(this.walkCycle)) * 9);
                ctx.rotate(Math.sin(this.walkCycle) * 0.07);
            }

            let p = this.plump;

            // The fatter it gets the more it rocks side to side
            if (p > 0.3) ctx.rotate(Math.sin(this.walkCycle) * p * 0.09);

            // Legs -- swallowed up by the belly, ending as little stubs
            let legLen = 25 - p * 9;
            ctx.strokeStyle = '#5c4033'; ctx.lineWidth = 4 + p * 2; ctx.beginPath();
            ctx.moveTo(-15, 5); ctx.lineTo(-15 + back * (1 - p * 0.7), legLen);
            ctx.moveTo(-5, 5); ctx.lineTo(-5 + back * 0.8 * (1 - p * 0.7), legLen);
            ctx.moveTo(10, 5); ctx.lineTo(10 + front * 0.8 * (1 - p * 0.7), legLen);
            ctx.moveTo(20, 5); ctx.lineTo(20 + front * (1 - p * 0.7), legLen);
            ctx.stroke();

            // Body -- becomes an absolute boulder. Wobbles as it goes.
            let jig = Math.sin(this.walkCycle * 2) * p * 2.4
                    + Math.sin(frameCount * 0.05) * p * 1.1; // always breathing
            ctx.fillStyle = '#8b4513';
            ctx.beginPath();
            ctx.ellipse(0, -5 + p * 9, 22 + p * 24 + jig, 12 + p * 15 - jig * 0.4, 0, 0, Math.PI * 2);
            ctx.fill();
            if (p > 0.15) {
                // belly, sagging further the bigger it gets
                ctx.beginPath();
                ctx.ellipse(-1, 2 + p * 15, 17 + p * 20 + jig * 0.6, 6 + p * 12, 0, 0, Math.PI * 2);
                ctx.fill();
            }

            // Once the belly has swallowed the legs, four little hooves twiddle
            // out from underneath. This is the entire joke.
            if (p > 0.45) {
                let by = 2 + p * 15 + (6 + p * 12) * 0.72;
                ctx.strokeStyle = '#5c4033'; ctx.lineWidth = 5; ctx.lineCap = 'round';
                ctx.beginPath();
                [-16, -6, 11, 20].forEach((lx, i) => {
                    let sw = (i < 2 ? back : front) * (1 - p * 0.75) * 0.6;
                    ctx.moveTo(lx, by - 5);
                    ctx.lineTo(lx + sw, by + 5);
                });
                ctx.stroke();
                ctx.lineCap = 'butt';
            }

            let stream = g ? 10 : 0;
            let lift = g ? Math.sin(this.walkCycle) * 5 : ls1;

            // Tail, shoved out the back by the sheer mass
            ctx.save();
            ctx.translate(-p * 20, p * 4);
            ctx.fillStyle = 'black';
            ctx.beginPath();
            ctx.moveTo(-20, -10);
            ctx.lineTo(-35 - stream, -5 - lift - stream * 0.5);
            ctx.lineTo(-20, -2);
            ctx.fill();
            ctx.restore();

            // Head stays exactly the same size -- that's the joke. It just ends
            // up perched on top of the boulder.
            ctx.save();
            ctx.translate(p * 18, -p * 5 + jig * 0.3);

            // Grazing: swing the whole head+neck down to the grass from the
            // base of the neck, and chew.
            if (eating) {
                let dip = eatT * 1.0;
                let chew = Math.sin(this.peckCycle * 0.8) * 0.07 * (eatT > 0.25 ? 1 : 0);
                ctx.translate(17, 0);
                ctx.rotate(dip + chew);
                ctx.translate(-17, 0);
            }

            // Neck/Head
            ctx.fillStyle = '#8b4513';
            ctx.beginPath(); ctx.moveTo(15, -5); ctx.lineTo(35, -20); ctx.lineTo(38, -10); ctx.lineTo(20, 5); ctx.fill();

            // Snout
            ctx.fillStyle = '#a0522d'; ctx.beginPath(); ctx.ellipse(38, -12, 6, 4, Math.PI / 4, 0, Math.PI * 2); ctx.fill();

            // Mane
            ctx.fillStyle = 'black';
            ctx.beginPath();
            ctx.moveTo(20, -10);
            ctx.lineTo(32 - stream * 0.4, -22 - stream * 0.3);
            ctx.lineTo(25, -5);
            ctx.fill();

            // Eye -- goes strained and wide once it's really struggling
            if (p > 0.7) {
                ctx.fillStyle = '#ffffff';
                ctx.beginPath(); ctx.arc(32, -15, 3, 0, Math.PI * 2); ctx.fill();
                ctx.fillStyle = 'black';
                ctx.beginPath(); ctx.arc(32.5, -15, 1.6, 0, Math.PI * 2); ctx.fill();
            } else {
                ctx.fillStyle = 'black';
                ctx.beginPath(); ctx.arc(32, -15, 1.5, 0, Math.PI * 2); ctx.fill();
            }
            ctx.restore();

            ctx.restore();
        }
    }

    class Cow {
        constructor(x, y) {
            this.x = x; this.y = y;
            this.facingDir = 1;
            this.speed = 0.5;
            this.state = 'wander';
            this.timer = 0;
            this.walkCycle = 0;
            this.peckCycle = 0;
            this.eatMax = 100;
            this.targetGrass = null;
            this.faceCd = 0;
            this.poopCd = 60 * (10 + Math.random() * 14);
            this.meals = 0; // this cow's own grass count, drives its size
            // Generate fixed spots
            this.spots = Array(3).fill().map(() => ({ x: (Math.random() - 0.5) * 30, y: (Math.random() - 0.5) * 10, r: 4 + Math.random() * 6 }));
        }

        update() {
            let isMoving = false;
            if (this.faceCd > 0) this.faceCd--;

            // Nature takes its course
            if (--this.poopCd <= 0) {
                this.poopCd = 60 * (14 + Math.random() * 16);
                let px = clampX(this.x - 30 * this.facingDir);
                let py = clampY(this.y + 3);
                poops.push(new Poop(px, py));
                sndPlop();
                // Retire the oldest properly, so any fly on it knows to leave
                if (poops.length > POOP_MAX) {
                    let old = poops.shift();
                    old.active = false;
                }
                puff(px, py, 4, '#6b5236', 0.9);
            }

            if (this.state === 'eat_grass') {
                this.peckCycle--;
                if (this.peckCycle % 20 === 0) {
                    puff(this.x + 30 * this.facingDir, this.y, 2, '#a8e063', 0.7);
                }
                if (this.peckCycle <= 0) {
                    if (this.targetGrass && !this.targetGrass.eaten) {
                        this.targetGrass.eaten = true;
                        cowMeals++;
                        this.meals++; // I grow a little with every meal
                        heart(this.x, this.y - 34 * this.girth);
                        sndMoo();
                    }
                    this.targetGrass = null;
                    this.state = 'wander';
                    this.timer = 90 + Math.random() * 60;
                }
                return;
            }

            // Drop a target that got eaten or was trimmed back somehow
            if (this.targetGrass && (this.targetGrass.eaten || !this.targetGrass.ripe)) {
                this.targetGrass = null;
            }
            // Go find the nearest clump worth eating
            if (!this.targetGrass) {
                let best = null, bestD = Infinity;
                for (let g of grasses) {
                    if (g.eaten || !g.ripe) continue;
                    let d = dist(this.x, this.y, g.x, g.y);
                    if (d < bestD) { bestD = d; best = g; }
                }
                if (best) this.targetGrass = best;
            }

            if (this.targetGrass) {
                this.state = 'seek_grass';
                if (dist(this.x, this.y, this.targetGrass.x, this.targetGrass.y) <= 30) {
                    this.state = 'eat_grass';
                    this.peckCycle = this.eatMax;
                } else {
                    // A cow in sight of dinner walks with slightly more purpose
                    isMoving = this.stepTo(this.targetGrass.x, this.targetGrass.y, 0.8);
                }
            } else {
                this.state = 'wander';
                this.timer--;
                if (this.timer <= 0) {
                    this.tX = clampX(this.x + (Math.random() - 0.5) * 200);
                    this.tY = clampY(this.y + (Math.random() - 0.5) * 90);
                    this.timer = 150 + Math.random() * 100;
                }
                if (this.tX !== undefined) isMoving = this.stepTo(this.tX, this.tY, this.speed);
            }

            this.walkCycle = isMoving ? this.walkCycle + 0.1 : 0;
        }

        // Grows up to ~1.7x its size over its first 20 grass clumps
        get girth() { return 1 + Math.min(1, this.meals / 20) * 0.7; }

        stepTo(tx, ty, speed) {
            let dx = tx - this.x; let dy = ty - this.y;
            let d = Math.sqrt(dx * dx + dy * dy);
            let moved = false;
            if (d > 1) {
                this.x += (dx / d) * speed;
                this.y += (dy / d) * (speed * 0.7);
                moved = true;
            }
            if (this.faceCd === 0) {
                let want = dx > 4 ? 1 : (dx < -4 ? -1 : 0);
                if (want !== 0 && want !== this.facingDir) { this.facingDir = want; this.faceCd = 15; }
            }
            this.x = clampX(this.x);
            this.y = clampY(this.y);
            return moved;
        }

        draw() {
            let g = this.girth;
            drawShadow(this.x, this.y, 35 * g, 12 * g);
            ctx.save();
            ctx.translate(this.x, this.y);
            ctx.scale(this.facingDir * g, g);

            let ls1 = Math.sin(this.walkCycle) * 4; let ls2 = Math.sin(this.walkCycle + Math.PI) * 4;

            // Grazing dip for the head only (applied below), 0 -> 1 -> 0
            let eating = this.state === 'eat_grass';
            let eatT = eating ? Math.sin((1 - this.peckCycle / this.eatMax) * Math.PI) : 0;

            // Legs
            ctx.fillStyle = 'black';
            ctx.fillRect(-22 + ls1, 0, 6, 20); ctx.fillRect(-12 + ls2, 0, 6, 20);
            ctx.fillRect(10 + ls2, 0, 6, 20); ctx.fillRect(20 + ls1, 0, 6, 20);

            // Body
            ctx.fillStyle = 'white';
            ctx.fillRect(-28, -20, 56, 28);

            // Spots
            ctx.fillStyle = 'black';
            for (let s of this.spots) { ctx.beginPath(); ctx.arc(s.x, -6 + s.y, s.r, 0, Math.PI * 2); ctx.fill(); }

            // Udder
            ctx.fillStyle = 'pink';
            ctx.beginPath(); ctx.arc(0, 8, 6, 0, Math.PI); ctx.fill();

            // Head group -- swings down to the grass from the base of the neck
            // and chews, instead of the whole cow sinking.
            ctx.save();
            if (eating) {
                let dip = eatT * 0.85;
                let chew = Math.sin(this.peckCycle * 0.45) * 0.06 * (eatT > 0.2 ? 1 : 0);
                ctx.translate(25, -6);
                ctx.rotate(dip + chew);
                ctx.translate(-25, 6);
            }
            // Head
            ctx.fillStyle = 'white'; ctx.fillRect(25, -25, 20, 24);
            // Snout -- opens and closes a touch while chewing
            let jaw = eating ? 2 + Math.abs(Math.sin(this.peckCycle * 0.45)) * 3 : 0;
            ctx.fillStyle = '#f4b6c2'; ctx.fillRect(38, -10 - jaw * 0.4, 10, 12 + jaw); // muzzle
            ctx.fillStyle = 'black'; ctx.fillRect(40, -6, 2, 3); ctx.fillRect(44, -6, 2, 3); // nostrils
            // Eye
            ctx.fillStyle = 'black'; ctx.fillRect(31, -19, 3, 3);
            // Horns
            ctx.fillStyle = '#eeddcc';
            ctx.beginPath(); ctx.moveTo(28, -25); ctx.lineTo(25, -35); ctx.lineTo(32, -25); ctx.fill();
            ctx.beginPath(); ctx.moveTo(40, -25); ctx.lineTo(43, -35); ctx.lineTo(36, -25); ctx.fill();
            ctx.restore();

            ctx.restore();
        }
    }

    // ============================================================
    //  PREDATORS
    //  Fox, wolf, alligator and bear all behave identically: charge in,
    //  grab the nearest hen, leg it. Every one of them is scared off by
    //  a bolt of lightning. Only the art and the numbers differ.
    // ============================================================

    // The very limp chicken hanging out of a predator's mouth
    function drawLimpHen(x, y) {
        ctx.fillStyle = 'white';
        ctx.beginPath(); ctx.arc(x, y, 6, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = '#cc0000'; ctx.fillRect(x - 2, y - 3, 3, 3);
        ctx.strokeStyle = '#ffa500'; ctx.lineWidth = 2;
        ctx.beginPath(); ctx.moveTo(x + 2, y + 4); ctx.lineTo(x + 6, y + 9); ctx.stroke();
    }

    class Hunter {
        constructor(kind, opts, forceSide) {
            this.kind = kind;
            let left = forceSide === undefined ? (Math.random() > 0.5) : (forceSide < 0);
            this.x = left ? -70 : canvas.width + 70;
            this.y = playArea.minY + 20 + Math.random() * (playArea.maxY - playArea.minY - 20);
            this.speed = opts.speed;
            this.grabR = opts.grabR;         // how close before it grabs
            this.scareR = opts.scareR;       // how far off a hen notices it
            this.patience = opts.patience;   // seconds before it gives up and goes home
            this.bully = !!opts.bully;       // big enough that hens scatter on sight
            this.label = opts.label;
            this.facingDir = left ? 1 : -1;
            this.walkCycle = 0;
            this.arrive = 0;
            this.chomp = 0;
            this.life = 0;
            this.active = true;
            this.hasChicken = false;
            this.snatched = false;
            this.scared = false;
            this.targetChicken = pickPrey(this);
            this.exitX = left ? canvas.width + 160 : -160;
        }

        // Zapped: abandon the hunt entirely and sprint for the nearest edge.
        scare() {
            if (this.scared) return;
            this.scared = true;
            this.targetChicken = null;
            this.speed = this.speed * 1.7 + 1.6;
            this.exitX = (this.x < canvas.width / 2) ? -160 : canvas.width + 160;
            puff(this.x, this.y, 9, '#eee6cc', 2.2);
        }

        update() {
            this.life++;
            this.arrive = Math.min(1, this.arrive + 0.04);
            if (this.life > 60 * this.patience) this.hasChicken = true;   // gives up

            if (!this.scared && !this.hasChicken && !huntable(this.targetChicken)) {
                this.targetChicken = pickPrey(this);
            }

            let tx, ty;
            if (!this.scared && !this.hasChicken && this.targetChicken) {
                tx = this.targetChicken.x; ty = this.targetChicken.y;
                if (dist(this.x, this.y, tx, ty) < this.grabR) {
                    eatChicken(this.targetChicken);
                    this.hasChicken = true;
                    this.snatched = true;
                    this.chomp = 18;
                }
            } else {
                tx = this.exitX; ty = this.y;
            }

            let dx = tx - this.x, dy = ty - this.y;
            let d = Math.sqrt(dx * dx + dy * dy);
            if (d > 1) {
                this.x += (dx / d) * this.speed;
                this.y = clampY(this.y + (dy / d) * (this.speed * 0.7));
            }
            if (Math.abs(dx) > 0.5) this.facingDir = dx > 0 ? 1 : -1;
            if (this.chomp > 0) this.chomp--;
            this.walkCycle += this.speed * 0.11;

            // Off the edge of the yard? Then it's gone.
            if ((this.scared || this.hasChicken || !this.targetChicken) &&
                (this.x < -140 || this.x > canvas.width + 140)) this.active = false;
        }
    }

    class Fox extends Hunter {
        constructor(side) {
            super('fox', { speed: 4.0, grabR: 18, scareR: 150, patience: 18, label: 'A FOX!' }, side);
        }
        draw() {
            drawShadow(this.x, this.y, 20, 8);
            ctx.save();
            ctx.translate(this.x, this.y);
            ctx.scale(this.facingDir, 1);
            ctx.translate(0, -Math.abs(Math.sin(this.walkCycle)) * 6);
            ctx.strokeStyle = '#222'; ctx.lineWidth = 3; ctx.beginPath();
            let ls1 = Math.sin(this.walkCycle) * 10, ls2 = Math.sin(this.walkCycle + Math.PI) * 10;
            ctx.moveTo(-10, 5); ctx.lineTo(-10 + ls1, 15);
            ctx.moveTo(10, 5); ctx.lineTo(10 + ls2, 15);
            ctx.stroke();
            ctx.fillStyle = '#ff7700';
            ctx.beginPath(); ctx.ellipse(-20, -5, 12, 5, Math.PI / 6 + Math.sin(this.walkCycle) * 0.2, 0, Math.PI * 2); ctx.fill();
            ctx.fillStyle = 'white';
            ctx.beginPath(); ctx.arc(-30, -10, 4, 0, Math.PI * 2); ctx.fill();
            ctx.fillStyle = '#d95a00';
            ctx.beginPath(); ctx.ellipse(0, 0, 18, 8, 0, 0, Math.PI * 2); ctx.fill();
            ctx.beginPath(); ctx.moveTo(10, -5); ctx.lineTo(25, 2); ctx.lineTo(10, 5); ctx.fill();
            ctx.fillStyle = '#222';
            ctx.beginPath(); ctx.moveTo(8, -5); ctx.lineTo(5, -12); ctx.lineTo(12, -2); ctx.fill();
            ctx.fillStyle = '#ffe08a';
            ctx.fillRect(12, -4, 3, 2);
            if (this.hasChicken && this.snatched) drawLimpHen(22, 5);
            ctx.restore();
        }
    }

    class Wolf extends Hunter {
        constructor(side) {
            super('wolf', { speed: 3.5, grabR: 26, scareR: 175, patience: 22, label: 'A WOLF!' }, side);
        }
        draw() {
            drawShadow(this.x, this.y, 30, 11);
            ctx.save();
            ctx.translate(this.x, this.y);
            ctx.scale(this.facingDir, 1);
            ctx.translate(0, -Math.abs(Math.sin(this.walkCycle)) * 4);
            let sw = Math.sin(this.walkCycle) * 9;
            // legs
            ctx.strokeStyle = '#3b3f45'; ctx.lineWidth = 4; ctx.lineCap = 'round';
            ctx.beginPath();
            ctx.moveTo(-14, 2); ctx.lineTo(-14 + sw, 20);
            ctx.moveTo(-5, 2); ctx.lineTo(-5 - sw * 0.6, 20);
            ctx.moveTo(9, 2); ctx.lineTo(9 - sw * 0.6, 20);
            ctx.moveTo(18, 2); ctx.lineTo(18 + sw, 20);
            ctx.stroke(); ctx.lineCap = 'butt';
            // bushy tail streaming behind
            ctx.fillStyle = '#4a5058';
            ctx.beginPath(); ctx.ellipse(-24, -6, 13, 6, -0.4 + Math.sin(this.walkCycle) * 0.25, 0, Math.PI * 2); ctx.fill();
            ctx.fillStyle = '#5a616b';
            ctx.beginPath(); ctx.ellipse(0, -6, 22, 11, 0, 0, Math.PI * 2); ctx.fill();
            ctx.fillStyle = '#4a5058';
            ctx.beginPath(); ctx.ellipse(9, -8, 11, 10, 0, 0, Math.PI * 2); ctx.fill();
            ctx.fillStyle = '#5a616b';
            ctx.beginPath(); ctx.ellipse(21, -13, 11, 8, 0, 0, Math.PI * 2); ctx.fill();
            ctx.beginPath(); ctx.moveTo(27, -14); ctx.lineTo(40, -10); ctx.lineTo(27, -6); ctx.closePath(); ctx.fill();
            ctx.fillStyle = '#20242a';
            ctx.beginPath(); ctx.arc(39, -10, 2.4, 0, Math.PI * 2); ctx.fill();
            if (this.chomp > 0) {
                ctx.fillStyle = '#ffffff';
                ctx.beginPath(); ctx.moveTo(30, -10); ctx.lineTo(34, -5); ctx.lineTo(36, -10); ctx.closePath(); ctx.fill();
            }
            ctx.fillStyle = '#4a5058';
            ctx.beginPath(); ctx.moveTo(16, -19); ctx.lineTo(19, -29); ctx.lineTo(23, -18); ctx.closePath(); ctx.fill();
            ctx.beginPath(); ctx.moveTo(24, -19); ctx.lineTo(28, -28); ctx.lineTo(30, -17); ctx.closePath(); ctx.fill();
            // silly glowing eye
            let glow = 0.65 + Math.sin(frameCount * 0.12) * 0.35;
            ctx.globalAlpha = glow;
            ctx.fillStyle = '#ff2b2b';
            ctx.beginPath(); ctx.arc(24, -15, 4.2, 0, Math.PI * 2); ctx.fill();
            ctx.globalAlpha = 1;
            ctx.fillStyle = '#ff0000';
            ctx.beginPath(); ctx.arc(24, -15, 2.3, 0, Math.PI * 2); ctx.fill();
            ctx.fillStyle = '#ffd0d0';
            ctx.fillRect(23.3, -16.2, 1.4, 1.4);
            if (this.hasChicken && this.snatched) drawLimpHen(38, -4);
            ctx.restore();
        }
    }

    class Gator extends Hunter {
        constructor(side) {
            super('gator', { speed: 4.4, grabR: 32, scareR: 175, patience: 24, label: 'ALLIGATOR!' }, side);
        }
        draw() {
            drawShadow(this.x, this.y, 42, 10);
            ctx.save();
            ctx.translate(this.x, this.y);
            ctx.scale(this.facingDir, 1);
            // low waddling scuttle
            let wag = Math.sin(this.walkCycle * 0.8);
            ctx.translate(0, -Math.abs(Math.sin(this.walkCycle)) * 2);
            let jaw = this.chomp > 0 ? 10 : 2 + Math.sin(frameCount * 0.06) * 1.4;
            // tail, swishing side to side as it runs
            ctx.fillStyle = '#3f6b3a';
            ctx.beginPath(); ctx.moveTo(-30, -6); ctx.lineTo(-62, 2 + wag * 8); ctx.lineTo(-30, 4); ctx.closePath(); ctx.fill();
            ctx.fillStyle = '#4c7d44';
            ctx.beginPath(); ctx.ellipse(-6, -4, 30, 10, 0, 0, Math.PI * 2); ctx.fill();
            ctx.fillStyle = '#3f6b3a';
            for (let i = -3; i < 4; i++) {
                ctx.beginPath(); ctx.moveTo(i * 8 - 4, -12); ctx.lineTo(i * 8, -18); ctx.lineTo(i * 8 + 4, -12); ctx.closePath(); ctx.fill();
            }
            // stubby scurrying legs
            let sw = Math.sin(this.walkCycle) * 6;
            ctx.strokeStyle = '#3f6b3a'; ctx.lineWidth = 6; ctx.lineCap = 'round';
            ctx.beginPath();
            ctx.moveTo(-16, 2); ctx.lineTo(-16 + sw, 12);
            ctx.moveTo(10, 2); ctx.lineTo(10 - sw, 12);
            ctx.stroke(); ctx.lineCap = 'butt';
            ctx.fillStyle = '#4c7d44';
            ctx.beginPath(); ctx.moveTo(20, -10); ctx.lineTo(62, -6 - jaw * 0.3); ctx.lineTo(62, -1 - jaw * 0.3); ctx.lineTo(20, -1); ctx.closePath(); ctx.fill();
            ctx.fillStyle = '#43703c';
            ctx.beginPath(); ctx.moveTo(20, 0); ctx.lineTo(60, 1 + jaw); ctx.lineTo(60, 5 + jaw); ctx.lineTo(20, 4); ctx.closePath(); ctx.fill();
            ctx.fillStyle = '#ffffff';
            for (let i = 0; i < 5; i++) {
                let tx = 28 + i * 7;
                ctx.beginPath(); ctx.moveTo(tx, -1); ctx.lineTo(tx + 3, 3); ctx.lineTo(tx + 5, -1); ctx.closePath(); ctx.fill();
            }
            ctx.fillStyle = '#4c7d44';
            ctx.beginPath(); ctx.arc(22, -14, 6, 0, Math.PI * 2); ctx.fill();
            ctx.fillStyle = '#e8d24a';
            ctx.beginPath(); ctx.arc(23, -14, 3.4, 0, Math.PI * 2); ctx.fill();
            ctx.fillStyle = '#000';
            ctx.fillRect(22.4, -16.4, 1.6, 4.8);
            if (this.hasChicken && this.snatched) drawLimpHen(52, 4);
            ctx.restore();
        }
    }

    class Bear extends Hunter {
        constructor(side) {
            super('bear', { speed: 3.1, grabR: 34, scareR: 240, patience: 26, bully: true, label: 'A BEAR!' }, side);
            this.calledExodus = false;
            this.dustCd = 0;
        }
        update() {
            // The crazy ones always leave with the bear -- that never changes
            if (!this.calledExodus && !this.scared && this.x > -20 && this.x < canvas.width + 20) {
                this.calledExodus = true;
                let dirOut = this.x < canvas.width / 2 ? -1 : 1;
                let crazies = chickens.filter(c => c.crazy && c.state !== 'exodus');
                if (crazies.length > 0) {
                    showBanner('THE CRAZY ONES LEAVE!', '#ff6bcb');
                    crazies.forEach(c => { releaseJob(c); c.startExodus(dirOut); });
                }
            }
            if (--this.dustCd <= 0) {
                this.dustCd = 6;
                puff(this.x - 20 * this.facingDir, this.y + 4, 2, '#8f9c6a', 1.0);
            }
            super.update();
        }
        draw() {
            drawShadow(this.x, this.y, 32, 12);
            ctx.save();
            ctx.translate(this.x, this.y);
            ctx.scale(this.facingDir, 1);
            ctx.translate(0, -Math.abs(Math.sin(this.walkCycle)) * 5);
            let front = Math.sin(this.walkCycle) * 11;
            let back = Math.sin(this.walkCycle + 2.4) * 11;
            ctx.strokeStyle = '#3a2416'; ctx.lineWidth = 7; ctx.lineCap = 'round';
            ctx.beginPath();
            ctx.moveTo(-16, 0); ctx.lineTo(-16 + back, 18);
            ctx.moveTo(-6, 0); ctx.lineTo(-6 + back * 0.8, 18);
            ctx.moveTo(12, 0); ctx.lineTo(12 + front * 0.8, 18);
            ctx.moveTo(21, 0); ctx.lineTo(21 + front, 18);
            ctx.stroke();
            ctx.lineCap = 'butt';
            ctx.fillStyle = '#4a2f1c';
            ctx.beginPath(); ctx.ellipse(0, -10, 27, 15, 0, 0, Math.PI * 2); ctx.fill();
            ctx.beginPath(); ctx.ellipse(8, -20, 13, 9, 0, 0, Math.PI * 2); ctx.fill();
            ctx.beginPath(); ctx.ellipse(28, -18, 13, 11, 0, 0, Math.PI * 2); ctx.fill();
            ctx.beginPath(); ctx.arc(23, -28, 5, 0, Math.PI * 2); ctx.fill();
            ctx.beginPath(); ctx.arc(34, -27, 5, 0, Math.PI * 2); ctx.fill();
            ctx.fillStyle = '#8a6a4a';
            ctx.beginPath(); ctx.ellipse(38, -14, 8, 6, 0, 0, Math.PI * 2); ctx.fill();
            ctx.fillStyle = '#1a1008';
            ctx.beginPath(); ctx.arc(44, -15, 3, 0, Math.PI * 2); ctx.fill();
            ctx.fillRect(30, -22, 3, 3);
            if (this.chomp > 0) {
                ctx.fillStyle = '#ffffff';
                ctx.beginPath(); ctx.moveTo(34, -12); ctx.lineTo(38, -6); ctx.lineTo(42, -12); ctx.closePath(); ctx.fill();
            }
            if (this.hasChicken && this.snatched) drawLimpHen(46, -6);
            ctx.restore();
        }
    }

    class GrassPatch {
        constructor(x, y) {
            this.x = x; this.y = y;
            this.growth = 0;
            this.eaten = false;
            this.blades = [];
            let n = 4 + Math.floor(Math.random() * 3);
            for (let i = 0; i < n; i++) {
                this.blades.push({
                    dx: (Math.random() - 0.5) * 15,
                    h: 9 + Math.random() * 9,
                    lean: (Math.random() - 0.5) * 7
                });
            }
        }
        get ripe() { return this.growth >= GRASS_RIPE; }
        update() {
            if (this.growth < 1) this.growth = Math.min(1, this.growth + GRASS_RATE);
        }
        draw() {
            let g = this.growth;
            // Pale patch of fresh growth on the darker field
            ctx.fillStyle = 'rgba(168, 224, 99,' + (0.2 + 0.35 * g) + ')';
            ctx.beginPath();
            ctx.ellipse(this.x, this.y, 4 + 12 * g, 2 + 5 * g, 0, 0, Math.PI * 2);
            ctx.fill();

            let sway = Math.sin(frameCount * 0.04 + this.x * 0.05) * 2 * g;
            ctx.strokeStyle = this.ripe ? '#b6ee6a' : '#8fc76a';
            ctx.lineWidth = 2;
            ctx.lineCap = 'round';
            ctx.beginPath();
            for (let b of this.blades) {
                ctx.moveTo(this.x + b.dx, this.y);
                ctx.lineTo(this.x + b.dx + b.lean * g + sway, this.y - b.h * g);
            }
            ctx.stroke();
            ctx.lineCap = 'butt';
        }
    }

    // Only one clump per small area: reject any spot too near an existing one.
    function trySpawnGrass() {
        if (grasses.length >= GRASS_MAX) return false;
        for (let attempt = 0; attempt < 25; attempt++) {
            let x = playArea.minX + Math.random() * (playArea.maxX - playArea.minX);
            let y = playArea.minY + Math.random() * (playArea.maxY - playArea.minY);
            let clear = true;
            for (let g of grasses) {
                if (dist(x, y, g.x, g.y) < GRASS_SPACING) { clear = false; break; }
            }
            if (clear) { grasses.push(new GrassPatch(x, y)); return true; }
        }
        return false;
    }

    class Poop {
        constructor(x, y, scale = 1) {
            this.x = x; this.y = y;
            this.age = 0;
            this.blobs = [];
            let n = 2 + Math.floor(Math.random() * 2);
            for (let i = 0; i < n; i++) {
                this.blobs.push({
                    dx: (Math.random() - 0.5) * 9 * scale,
                    dy: (Math.random() - 0.5) * 4 * scale,
                    r: (4 + Math.random() * 3.5) * scale
                });
            }
            this.food = 1;   // eaten down by flies
            this.active = true;
        }
        update() {
            this.age++;
            if (this.food <= 0) this.active = false;
        }
        draw() {
            // dries out and pales with age, and shrinks as the flies work on it
            let dry = Math.min(1, this.age / (60 * 25));
            let shrink = 0.35 + 0.65 * Math.max(0, this.food);
            ctx.fillStyle = dry > 0.5 ? '#6b5236' : '#4a3520';
            for (let b of this.blobs) {
                ctx.beginPath();
                ctx.ellipse(this.x + b.dx * shrink, this.y + b.dy * shrink,
                            b.r * shrink, b.r * 0.55 * shrink, 0, 0, Math.PI * 2);
                ctx.fill();
            }
            // a little shine while it's fresh
            if (dry < 0.4) {
                ctx.fillStyle = 'rgba(255,255,255,0.18)';
                ctx.beginPath();
                ctx.ellipse(this.x - 2, this.y - 2, 2.5 * shrink, 1.2 * shrink, 0, 0, Math.PI * 2);
                ctx.fill();
            }
        }
    }

    class Fly {
        constructor(target) {
            this.target = target;
            this.x = Math.random() > 0.5 ? -20 : canvas.width + 20;
            this.y = clampY(target.y + (Math.random() - 0.5) * 120);
            this.z = 30 + Math.random() * 50;
            this.state = 'incoming';
            this.phase = Math.random() * Math.PI * 2;
            this.freq = 0.18 + Math.random() * 0.14;
            this.orbit = Math.random() * Math.PI * 2;
            this.orbitR = 5 + Math.random() * 9;
            this.spook = 0;
            this.wing = 0;
            this.active = true;
        }

        update() {
            this.phase += this.freq;
            this.wing += 1.1;

            // Dinner gone (or cleaned up)? Off we go.
            if (this.state !== 'leaving' && (!this.target || !this.target.active)) {
                this.state = 'leaving';
            }

            if (this.state === 'feeding') {
                // something big lumbering past sends them up in a cloud
                for (let o of cows) if (dist(this.x, this.y, o.x, o.y) < 75) this.spook = 45;
                for (let o of horses) if (dist(this.x, this.y, o.x, o.y) < 70) this.spook = 45;
                for (let o of predators) if (o.bully && dist(this.x, this.y, o.x, o.y) < 80) this.spook = 45;
            }
            if (this.spook > 0) this.spook--;

            if (this.state === 'incoming') {
                let dx = this.target.x - this.x, dy = this.target.y - this.y;
                let d = Math.sqrt(dx * dx + dy * dy);
                if (d > 1) {
                    this.x += (dx / d) * 2.6 + Math.sin(this.phase * 1.7) * 1.2;
                    this.y += (dy / d) * 1.6 + Math.cos(this.phase * 1.3) * 0.7;
                }
                this.z += (4 - this.z) * 0.05;
                if (d < 16 && this.z < 10) this.state = 'feeding';

            } else if (this.state === 'feeding') {
                this.orbit += 0.22;
                let r = this.orbitR + (this.spook > 0 ? 24 : 0);
                this.x = this.target.x + Math.cos(this.orbit) * r + Math.sin(this.phase * 2.1) * 1.5;
                this.y = this.target.y + Math.sin(this.orbit) * r * 0.5;
                this.z = (this.spook > 0 ? 18 : 2.5) + Math.abs(Math.sin(this.phase)) * 3;
                // only actually eating when settled
                if (this.spook === 0) this.target.food -= FLY_EAT;

            } else {
                this.z += 1.2;
                this.x += (this.x < canvas.width / 2 ? -2.8 : 2.8) + Math.sin(this.phase);
                this.y += Math.cos(this.phase * 0.8) * 0.5;
                if (this.x < -40 || this.x > canvas.width + 40 || this.z > 220) this.active = false;
            }
        }

        draw() {
            if (this.z < 14) drawShadow(this.x, this.y, 2, 1);
            ctx.save();
            ctx.translate(this.x, this.y - this.z);
            // wing blur
            ctx.fillStyle = 'rgba(225,235,245,0.55)';
            let w = 3 + Math.abs(Math.sin(this.wing)) * 2.5;
            ctx.beginPath(); ctx.ellipse(0, -1.5, w, 1.8, 0, 0, Math.PI * 2); ctx.fill();
            // body
            ctx.fillStyle = '#141414';
            ctx.fillRect(-2, -1.5, 4, 3);
            ctx.restore();
        }
    }

    // Rabbits go for whatever clump is closest and far enough along to bother with
    function pickGrassForRabbit(x, y) {
        let best = null, bestD = Infinity;
        for (let g of grasses) {
            if (g.eaten || g.growth < 0.25) continue;
            if (g.claimedByRabbit) continue;
            let d = dist(x, y, g.x, g.y);
            if (d < bestD) { bestD = d; best = g; }
        }
        return best;
    }

    class Rabbit {
        constructor() {
            this.dir = Math.random() > 0.5 ? 1 : -1;
            this.x = this.dir === 1 ? -50 : canvas.width + 50;
            this.y = playArea.minY + 20 + Math.random() * (playArea.maxY - playArea.minY - 20);
            // Aim well past the despawn boundary -- heading for exactly the
            // spawn point left them parked just short of it, forever.
            this.exitX = this.dir === 1 ? -150 : canvas.width + 150;
            this.speed = 2.5;
            this.facingDir = this.dir;
            this.z = 0;
            this.hop = 0;
            this.state = 'seek';
            this.nibble = 0;
            this.nibbleTime = 55;
            this.swarm = false;
            this.carrying = false;
            this.faceCd = 0;
            this.active = true;
            this.target = null;
        }

        bail() {
            if (this.target) { this.target.claimedByRabbit = false; this.target = null; }
            this.state = 'leave';
        }

        update() {
            if (this.faceCd > 0) this.faceCd--;

            // Skittish -- unless it's in a swarm, where numbers make them bold
            if (this.state !== 'leave' && !this.swarm) {
                let spooked = nearestBully(this.x, this.y, 120);
                if (!spooked) {
                    for (let f of predators) {
                        if (dist(this.x, this.y, f.x, f.y) < 150) { spooked = true; break; }
                    }
                }
                if (spooked) { this.bail(); puff(this.x, this.y, 4, '#e0d6c8', 1.2); }
            }

            if (this.state === 'nibble') {
                this.nibble--;
                if (this.nibble % 12 === 0) puff(this.x + 8 * this.facingDir, this.y, 2, '#a8e063', 0.6);
                if (this.nibble <= 0) {
                    if (this.target && !this.target.eaten) {
                        this.target.eaten = true;
                        this.target.claimedByRabbit = false;
                        grassStolen++;
                        this.carrying = true;
                    }
                    this.target = null;
                    this.state = 'leave';
                }
                return;
            }

            if (this.state === 'seek') {
                if (!this.target || this.target.eaten) {
                    if (this.target) this.target.claimedByRabbit = false;
                    this.target = pickGrassForRabbit(this.x, this.y);
                    if (this.target) this.target.claimedByRabbit = true;
                }
                if (!this.target) {
                    this.state = 'leave';
                } else if (dist(this.x, this.y, this.target.x, this.target.y) < 18) {
                    this.state = 'nibble';
                    this.nibble = this.nibbleTime;
                } else {
                    this.hopTo(this.target.x, this.target.y);
                }
            }

            if (this.state === 'leave') {
                this.hopTo(this.exitX, this.y);
                if (this.x < -70 || this.x > canvas.width + 70) this.active = false;
            }
        }

        hopTo(tx, ty) {
            let wasDown = this.z < 1;
            this.hop += 0.26;
            this.z = Math.abs(Math.sin(this.hop)) * 10;
            if (wasDown && this.z >= 1) sndHop();
            // most of the ground is covered at the top of the bound
            let sp = this.speed * (0.35 + Math.abs(Math.sin(this.hop)));
            let dx = tx - this.x, dy = ty - this.y;
            let d = Math.sqrt(dx * dx + dy * dy);
            if (d > 1) {
                this.x += (dx / d) * sp;
                this.y += (dy / d) * (sp * 0.7);
            }
            if (this.faceCd === 0) {
                let want = dx > 4 ? 1 : (dx < -4 ? -1 : 0);
                if (want !== 0 && want !== this.facingDir) { this.facingDir = want; this.faceCd = 12; }
            }
            this.y = clampY(this.y);
        }

        draw() {
            let sScale = 1 / (1 + this.z * 0.03);
            drawShadow(this.x, this.y, 11 * sScale, 4.5 * sScale);

            ctx.save();
            ctx.translate(this.x, this.y - this.z);
            ctx.scale(this.facingDir, 1);

            let tuck = this.z * 0.12; // legs tuck up mid-hop

            // Hind legs
            ctx.fillStyle = '#a89684';
            ctx.beginPath(); ctx.ellipse(-6, 1 - tuck, 6, 4, 0, 0, Math.PI * 2); ctx.fill();
            // Front legs
            ctx.strokeStyle = '#a89684'; ctx.lineWidth = 2.5;
            ctx.beginPath();
            ctx.moveTo(6, -1); ctx.lineTo(7, 4 - tuck);
            ctx.stroke();

            // Body
            ctx.fillStyle = '#bdab99';
            ctx.beginPath(); ctx.ellipse(0, -4, 12, 7.5, -0.15, 0, Math.PI * 2); ctx.fill();

            // Cotton tail
            ctx.fillStyle = '#fdfaf5';
            ctx.beginPath(); ctx.arc(-11, -5, 3.5, 0, Math.PI * 2); ctx.fill();

            // Head
            ctx.fillStyle = '#bdab99';
            ctx.beginPath(); ctx.ellipse(9, -9, 6, 5, 0, 0, Math.PI * 2); ctx.fill();

            // Ears -- laid back when running away
            let lay = this.state === 'leave' ? 0.9 : 0.15;
            ctx.save();
            ctx.translate(8, -12);
            for (let i = 0; i < 2; i++) {
                ctx.save();
                ctx.rotate(-0.25 + lay + i * 0.28);
                ctx.fillStyle = '#bdab99';
                ctx.beginPath(); ctx.ellipse(0, -6, 2.6, 7, 0, 0, Math.PI * 2); ctx.fill();
                ctx.fillStyle = '#e6b8b8';
                ctx.beginPath(); ctx.ellipse(0, -6, 1.2, 4.5, 0, 0, Math.PI * 2); ctx.fill();
                ctx.restore();
            }
            ctx.restore();

            // Eye + nose
            ctx.fillStyle = '#1a1a1a';
            ctx.beginPath(); ctx.arc(11, -10, 1.4, 0, Math.PI * 2); ctx.fill();
            ctx.fillStyle = '#d98a8a';
            ctx.beginPath(); ctx.arc(14.5, -8, 1.2, 0, Math.PI * 2); ctx.fill();

            // Swag
            if (this.carrying) {
                ctx.strokeStyle = '#b6ee6a'; ctx.lineWidth = 2; ctx.lineCap = 'round';
                ctx.beginPath();
                ctx.moveTo(14, -7); ctx.lineTo(21, -11);
                ctx.moveTo(16, -7); ctx.lineTo(22, -5);
                ctx.stroke();
                ctx.lineCap = 'butt';
            }

            ctx.restore();
        }
    }

    // The field got overgrown -- every rabbit in the county turns up at once,
    // one per clump, and strips the lot.
    function triggerRabbitSwarm() {
        let targets = grasses.filter(g => !g.eaten);
        if (targets.length === 0) return;
        showBanner('RABBIT SWARM!', '#f0e2cc',
            'Rabbits! They are eating all of the grass!');
        for (let g of targets) {
            let r = new Rabbit();
            r.swarm = true;
            r.speed = 3.8;
            r.nibbleTime = 22;
            r.y = clampY(g.y + (Math.random() - 0.5) * 90);
            r.target = g;
            g.claimedByRabbit = true;
            rabbits.push(r);
        }
    }

    // A great tide of rabbits pours across the field and straight out the
    // other side. There is no reason for it and no way to stop it.
    function triggerRabbitStampede() {
        let dir = Math.random() > 0.5 ? 1 : -1;
        let n = 14 + Math.floor(Math.random() * 8);
        showBanner('RABBIT STAMPEDE!', '#f0e2cc');
        for (let i = 0; i < n; i++) {
            let r = new Rabbit();
            r.swarm = true;
            r.speed = 3.2 + Math.random() * 1.8;
            r.dir = dir;
            r.facingDir = dir;
            r.x = dir === 1 ? -60 - i * 34 : canvas.width + 60 + i * 34;
            r.exitX = dir === 1 ? canvas.width + 170 : -170;
            r.y = clampY(playArea.minY + Math.random() * (playArea.maxY - playArea.minY));
            r.state = 'leave';
            rabbits.push(r);
        }
    }

    // ============================================================
    //  HAZARDS
    //  Each one makes a patch of the yard unsafe. Hens naturally shy
    //  away from them -- but greed beats fear, so if you drop corn in
    //  a danger zone they will walk right into it. Placement is the game.
    // ============================================================

    function eatChicken(c, byWhat) {
        if (!c || c.dead) return false;
        c.dead = true;
        chickensLost++;
        featherBurst(c.x, c.y);
        puff(c.x, c.y, 6, '#d8d8d8', 1.2);
        sndYip();
        return true;
    }

    // The angry farmer. He turns up shouting about his lawn, and then a
    // chicken looks at him and he completely loses his nerve and runs away.
    // He has never hurt anybody.
    class Farmer {
        constructor() {
            this.dir = Math.random() > 0.5 ? 1 : -1;
            this.x = this.dir === 1 ? -50 : canvas.width + 50;
            this.y = playArea.minY + 60 + Math.random() * (playArea.maxY - playArea.minY - 90);
            this.stopX = this.dir === 1
                ? playArea.minX + 160 + Math.random() * 260
                : playArea.maxX - 160 - Math.random() * 260;
            this.facingDir = this.dir;
            this.speed = 2.0;
            this.state = 'arrive';
            this.rant = 60 * (5 + Math.random() * 3);
            this.walkCycle = 0;
            this.active = true;
            this.scared = false;
            this.panicked = 0;
        }
        // Lightning does it too -- he is not a brave man
        scare() { this.panic(); }
        panic() {
            if (this.scared) return;
            this.scared = true;
            this.panicked = 1;
            this.state = 'leave';
            this.facingDir = -this.dir;
            this.speed = 5.4;
            showBanner('THE FARMER RUNS AWAY!', '#ffbe50');
            sndDud();
            puff(this.x, this.y - 20, 10, '#e8d8b8', 2.4);
        }
        update() {
            this.walkCycle += this.state === 'leave' ? 0.42 : 0.22;
            if (this.state === 'arrive') {
                let dx = this.stopX - this.x;
                if (Math.abs(dx) < 5) this.state = 'rant';
                else { this.x += Math.sign(dx) * this.speed; this.facingDir = Math.sign(dx); }
            } else if (this.state === 'rant') {
                // one chicken wanders over to see what all the noise is about
                for (let c of nearHens(this.x, this.y)) {
                    if (!huntable(c) || c.hidden) continue;
                    if (dist(this.x, this.y, c.x, c.y) < 90) { this.panic(); break; }
                }
                if (this.state === 'rant' && --this.rant <= 0) { this.state = 'leave'; this.facingDir = -this.dir; }
            } else {
                this.x -= this.dir * this.speed;
                if (this.x < -110 || this.x > canvas.width + 110) this.active = false;
            }
        }
        draw() {
            drawShadow(this.x, this.y, 16, 6);
            ctx.save();
            ctx.translate(this.x, this.y);
            ctx.scale(this.facingDir, 1);
            let ranting = this.state === 'rant';
            let fleeing = this.state === 'leave' && this.panicked;
            let step = ranting ? 0 : Math.sin(this.walkCycle) * (fleeing ? 11 : 6);
            let wave = ranting ? Math.sin(frameCount * 0.35) * 22 : 0;
            let hop = ranting ? Math.abs(Math.sin(frameCount * 0.18)) * 3
                              : (fleeing ? Math.abs(Math.sin(this.walkCycle)) * 5 : 0);
            ctx.translate(0, -hop);
            ctx.strokeStyle = '#3a5a8c'; ctx.lineWidth = 6; ctx.lineCap = 'round';
            ctx.beginPath();
            ctx.moveTo(-3, -18); ctx.lineTo(-3 + step, 2);
            ctx.moveTo(3, -18); ctx.lineTo(3 - step, 2);
            ctx.stroke();
            ctx.fillStyle = '#4a3520';
            ctx.fillRect(-7 + step, 0, 9, 4); ctx.fillRect(-1 - step, 0, 9, 4);
            ctx.fillStyle = '#4f7fbf';
            ctx.fillRect(-9, -42, 18, 26);
            ctx.fillStyle = '#c9524a';
            ctx.fillRect(-11, -42, 22, 9);
            ctx.strokeStyle = '#e8b98c'; ctx.lineWidth = 4;
            ctx.beginPath();
            if (fleeing) {
                // both arms straight up in the air, flapping
                let f = Math.sin(this.walkCycle * 1.6) * 5;
                ctx.moveTo(-9, -38); ctx.lineTo(-14, -58 + f);
                ctx.moveTo(9, -38); ctx.lineTo(14, -58 - f);
            } else {
                ctx.moveTo(-9, -38); ctx.lineTo(-16, -30 + step * 0.4);
                ctx.moveTo(9, -38); ctx.lineTo(17, -44 - wave);
            }
            ctx.stroke();
            ctx.lineCap = 'butt';
            if (!fleeing) {
                ctx.fillStyle = '#e8b98c';
                ctx.beginPath(); ctx.arc(17, -45 - wave, 4, 0, Math.PI * 2); ctx.fill();
            }
            ctx.fillStyle = '#f0c49a';
            ctx.beginPath(); ctx.arc(0, -50, 8.5, 0, Math.PI * 2); ctx.fill();
            if (ranting) {
                ctx.fillStyle = 'rgba(220,60,50,0.45)';
                ctx.beginPath(); ctx.arc(0, -50, 8.5, 0, Math.PI * 2); ctx.fill();
            }
            ctx.strokeStyle = '#3a2a1a'; ctx.lineWidth = 2;
            ctx.beginPath();
            if (fleeing) {
                // eyebrows shoot up instead of down -- pure terror
                ctx.moveTo(-6, -55); ctx.lineTo(-1, -57); ctx.moveTo(6, -55); ctx.lineTo(1, -57);
            } else {
                ctx.moveTo(-6, -54); ctx.lineTo(-1, -52); ctx.moveTo(6, -54); ctx.lineTo(1, -52);
            }
            ctx.stroke();
            ctx.fillStyle = '#000';
            if (fleeing) {
                ctx.beginPath(); ctx.arc(-3, -50, 2.4, 0, Math.PI * 2); ctx.fill();
                ctx.beginPath(); ctx.arc(3, -50, 2.4, 0, Math.PI * 2); ctx.fill();
            } else {
                ctx.beginPath(); ctx.arc(-3, -50, 1.4, 0, Math.PI * 2); ctx.fill();
                ctx.beginPath(); ctx.arc(3, -50, 1.4, 0, Math.PI * 2); ctx.fill();
            }
            ctx.fillStyle = '#6b2020';
            if (ranting) { ctx.beginPath(); ctx.ellipse(0, -45, 3.5, 2.5 + Math.abs(Math.sin(frameCount * 0.3)) * 1.5, 0, 0, Math.PI * 2); ctx.fill(); }
            else if (fleeing) { ctx.beginPath(); ctx.ellipse(0, -44, 4, 4.5, 0, 0, Math.PI * 2); ctx.fill(); }
            else ctx.fillRect(-3, -46, 6, 1.6);
            // the hat flies off when he bolts
            ctx.fillStyle = '#d9b451';
            if (fleeing) {
                ctx.save();
                ctx.translate(-16 - this.walkCycle % 6, -74);
                ctx.rotate(this.walkCycle);
                ctx.beginPath(); ctx.ellipse(0, 0, 14, 4, 0, 0, Math.PI * 2); ctx.fill();
                ctx.restore();
            } else {
                ctx.beginPath(); ctx.ellipse(0, -57, 15, 4, 0, 0, Math.PI * 2); ctx.fill();
                ctx.beginPath(); ctx.ellipse(0, -61, 7.5, 6, 0, 0, Math.PI * 2); ctx.fill();
            }
            ctx.restore();
            if (ranting && Math.floor(frameCount / 12) % 2 === 0) {
                ctx.fillStyle = '#fff2a8';
                ctx.font = 'bold 16px "Courier New", monospace';
                ctx.fillText('!', this.x + 22 * this.facingDir, this.y - 62);
            }
            if (fleeing) {
                // sweat drops flying off
                ctx.fillStyle = '#9ad8ff';
                for (let i = 0; i < 3; i++) {
                    let f = (frameCount * 0.16 + i * 2.1) % 6.283;
                    ctx.beginPath();
                    ctx.arc(this.x + this.dir * (14 + Math.sin(f) * 10), this.y - 62 - Math.cos(f) * 8, 2.2, 0, Math.PI * 2);
                    ctx.fill();
                }
            }
        }
    }

    // Everything a hen should think twice about walking into. Rebuilt at most
    // once a frame -- with hundreds of birds asking, allocating a fresh array
    // for each of them was the single most expensive thing in the game.
    let _zones = [], _zonesFrame = -1;
    function killZones() {
        if (_zonesFrame === frameCount) return _zones;
        _zonesFrame = frameCount;
        _zones.length = 0;
        for (let p of predators) {
            if (p.scared || p.hasChicken) continue;   // on its way out, harmless
            _zones.push({ x: p.x, y: p.y, kill: p.grabR, scare: p.scareR, kind: p.label, a: 1 });
        }
        return _zones;
    }

    // A wave of hungry things. They come more often, and in bigger numbers,
    // the more chickens there are to come for.
    function spawnPredatorWave() {
        if (predators.length >= PRED_MAX) return;
        let n = 1 + Math.min(2, (chickens.length / 110) | 0);
        let kinds = [];
        for (let i = 0; i < n && predators.length + kinds.length < PRED_MAX; i++) {
            let roll = Math.random(), side = i % 2 === 0 ? -1 : 1;
            if (roll < 0.46) kinds.push(new Fox(side));
            else if (roll < 0.74) kinds.push(new Wolf(side));
            else if (roll < 0.93) kinds.push(new Gator(side));
            else kinds.push(new Bear(side));
        }
        for (let k of kinds) predators.push(k);
        if (kinds.length) {
            showBanner(kinds.length > 1 ? kinds.length + ' PREDATORS!' : kinds[0].label, '#ff8080');
            if (kinds.some(k => k.kind === 'fox')) sndYip(); else sndGrowl();
        }
    }

    // Is this spot a bad place to be standing?
    function spotDanger(x, y) {
        for (let z of killZones()) if (dist(x, y, z.x, z.y) < z.kill + 70) return z.kind;
        return null;
    }

    class Lightning {
        constructor(x, y) {
            this.x = x; this.y = y;
            this.maxLife = 30;
            this.life = this.maxLife;
            this.active = true;
            // Jagged path from the clouds down to the strike point
            this.pts = [];
            let cx = x;
            let steps = Math.max(4, Math.floor(y / 26));
            for (let i = 0; i <= steps; i++) {
                let t = i / steps;
                this.pts.push({ x: cx, y: t * y });
                cx = x + (Math.random() - 0.5) * 34 * (1 - t) + (x - x) * t;
            }
            this.pts.push({ x: x, y: y });
        }
        update() {
            this.life--;
            if (this.life <= 0) this.active = false;
        }
        draw() {
            // Only the first third of the life is the visible flash
            let t = this.life / this.maxLife;
            if (t < 0.55) return;
            let a = (t - 0.55) / 0.45;
            // flicker
            if (Math.floor(this.life / 2) % 2 === 0 && t < 0.85) return;
            ctx.save();
            ctx.globalAlpha = a;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            // outer glow
            ctx.strokeStyle = 'rgba(180,210,255,0.55)';
            ctx.lineWidth = 9;
            ctx.beginPath();
            ctx.moveTo(this.pts[0].x, this.pts[0].y);
            for (let p of this.pts) ctx.lineTo(p.x, p.y);
            ctx.stroke();
            // hot core
            ctx.strokeStyle = '#ffffff';
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.moveTo(this.pts[0].x, this.pts[0].y);
            for (let p of this.pts) ctx.lineTo(p.x, p.y);
            ctx.stroke();
            // scorch flare at the ground
            ctx.fillStyle = 'rgba(255,255,220,' + (0.5 * a) + ')';
            ctx.beginPath();
            ctx.ellipse(this.x, this.y, 26, 10, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();
        }
    }

    // Little ghost chickens, for the ones that stood in the wrong place
    let angels = [];
    let scorches = [];

    // ZAP. Something was standing right there.
    function vaporise(c) {
        c.dead = true;
        chickensVaporised++;
        releaseJob(c);
        featherBurst(c.x, c.y);
        for (let i = 0; i < 10; i++) {
            particles.push(new Particle(c.x, c.y, {
                z: 4, vx: (Math.random() - 0.5) * 1.6, vy: (Math.random() - 0.5) * 0.8,
                vz: 1.1 + Math.random() * 1.5, gravity: -0.012, life: 60,
                color: '#cfcfcf', size: 5
            }));
        }
        angels.push({ x: c.x, y: c.y, z: 2, life: 130, wob: Math.random() * 6 });
    }

    function drawAngels() {
        for (let a of angels) {
            let t = a.life / 130;
            ctx.save();
            ctx.globalAlpha = Math.min(1, t * 1.6);
            ctx.translate(a.x + Math.sin(a.wob) * 6, a.y - a.z);
            // tiny wings
            ctx.fillStyle = '#ffffff';
            let f = Math.sin(a.wob * 3) * 3;
            ctx.beginPath(); ctx.moveTo(-4, -2); ctx.lineTo(-13, -8 - f); ctx.lineTo(-4, 3); ctx.fill();
            ctx.beginPath(); ctx.moveTo(4, -2); ctx.lineTo(13, -8 - f); ctx.lineTo(4, 3); ctx.fill();
            // ghost hen
            ctx.beginPath(); ctx.moveTo(8, 0); ctx.lineTo(-7, -6); ctx.lineTo(-5, 4); ctx.closePath(); ctx.fill();
            ctx.fillStyle = '#ffa500';
            ctx.beginPath(); ctx.moveTo(7, -1); ctx.lineTo(12, 1); ctx.lineTo(7, 3); ctx.fill();
            ctx.fillStyle = '#000'; ctx.fillRect(3, -2, 1.6, 1.6);
            // halo
            ctx.strokeStyle = '#ffe14d'; ctx.lineWidth = 1.6;
            ctx.beginPath(); ctx.ellipse(0, -12, 7, 2.6, 0, 0, Math.PI * 2); ctx.stroke();
            ctx.restore();
        }
        ctx.globalAlpha = 1;
    }

    function drawScorches() {
        for (let sc of scorches) {
            ctx.globalAlpha = Math.min(0.5, sc.life / 200);
            ctx.fillStyle = '#3a2f22';
            ctx.beginPath(); ctx.ellipse(sc.x, sc.y, 26, 10, 0, 0, Math.PI * 2); ctx.fill();
            ctx.globalAlpha = 1;
        }
    }

    // The bolt. It scares off EVERY predator on the farm -- but you cannot
    // aim the weather, and anything standing under it gets vaporised.
    function strikeLightning() {
        if (boltCd > 0) return false;
        boltCd = BOLT_COOLDOWN;

        let sx = playArea.minX + Math.random() * (playArea.maxX - playArea.minX);
        let sy = playArea.minY + Math.random() * (playArea.maxY - playArea.minY);

        bolts.push(new Lightning(sx, sy));
        sndThunder();
        flash = 1;
        puff(sx, sy, 18, '#e8e4c8', 3.2);
        scorches.push({ x: sx, y: sy, life: 60 * 7 });

        // Everything with teeth turns tail, wherever it happens to be standing
        for (let p of predators) if (!p.scared) { p.scare(); foxesZapped++; addScore(100); }
        for (let f of farmers) if (!f.scared) f.scare();

        // ...and whoever was standing on the spot. Oops.
        let zapped = 0;
        for (let c of nearHens(sx, sy)) {
            if (!huntable(c) || c.hidden) continue;
            if (dist(c.x, c.y, sx, sy) < BOLT_ZAP_R) { vaporise(c); zapped++; }
        }
        if (zapped > 0) {
            showBanner(zapped === 1 ? 'OOPS! ZAPPED A CHICKEN!' : 'OOPS! ZAPPED ' + zapped + ' CHICKENS!', '#ffd0a0');
        }

        // Everyone else jumps out of their skin
        for (let c of nearHens(sx, sy)) {
            if (c.dead || c.hidden) continue;
            if (c.z === 0 && c.vz === 0 && c.flutterCd <= 0 && dist(c.x, c.y, sx, sy) < 200) c.flutter(sx, sy);
        }
        for (let h of horses) h.spook(sx, sy);
        return true;
    }

    class SkyBird {
        constructor(x, y, dir, speed, scale) {
            this.x = x; this.y = y;
            this.dir = dir;
            this.speed = speed;
            this.scale = scale;
            this.flap = Math.random() * Math.PI * 2;
            this.active = true;
        }
        update() {
            this.x += this.speed * this.dir;
            this.y += Math.sin(this.x * 0.008) * 0.12;
            this.flap += 0.22;
            if (this.x < -60 || this.x > canvas.width + 60) this.active = false;
        }
        draw() {
            let s = this.scale;
            let w = Math.sin(this.flap);
            ctx.save();
            ctx.translate(this.x, this.y);
            ctx.scale(this.dir * s, s);
            ctx.strokeStyle = 'rgba(40,50,60,0.75)';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(-7, w * 4);
            ctx.quadraticCurveTo(-3, -3 - w * 2, 0, 0);
            ctx.quadraticCurveTo(3, -3 - w * 2, 7, w * 4);
            ctx.stroke();
            ctx.restore();
        }
    }

    function spawnFlock() {
        let dir = Math.random() > 0.5 ? 1 : -1;
        let n = 3 + Math.floor(Math.random() * 4);
        let y = 45 + Math.random() * 95;
        let x = dir === 1 ? -40 : canvas.width + 40;
        let speed = 0.7 + Math.random() * 0.8;
        let scale = 0.7 + Math.random() * 0.6;
        for (let i = 0; i < n; i++) {
            // loose V formation
            skyBirds.push(new SkyBird(
                x - dir * i * 16,
                y + Math.abs(i - (n - 1) / 2) * 7 + (Math.random() - 0.5) * 4,
                dir, speed, scale
            ));
        }
    }

    // Whoever is nearest and not already being chased by somebody else.
    // With hundreds of birds we sample rather than scan the lot every frame.
    function pickPrey(forWho) {
        let n = chickens.length;
        if (n === 0) return null;
        let taken = null;
        if (predators.length > 1) {
            taken = new Set();
            for (let p of predators) if (p !== forWho && p.targetChicken) taken.add(p.targetChicken);
        }
        let best = null, bestD = Infinity, fallback = null;
        let tries = Math.min(n, 70);
        for (let i = 0; i < tries; i++) {
            let c = chickens[(Math.random() * n) | 0];
            if (!huntable(c)) continue;
            if (!fallback) fallback = c;
            if (taken && taken.has(c)) continue;
            let d = dist(forWho.x, forWho.y, c.x, c.y);
            if (d < bestD) { bestD = d; best = c; }
        }
        return best || fallback;
    }

    // ============================================================
    //  THE FLOCK GETS IDEAS
    //  Once there are enough chickens they stop just milling about and
    //  start BUILDING things. Hard hats, tools, scaffolding, the lot.
    //  Every project needs a bigger flock than the last one.
    // ============================================================

    let projects = [];
    let guards = [];
    let guardsAnnounced = false;
    let ball = null;
    let plane = null;

    const GUARD_AT = 110, GUARD_COUNT = 5;
    const BALL_AT = 100, BALL_SQUAD = 8;

    // How long a shift lasts, in seconds: [minimum, extra at random].
    // Nobody eats while they're working, so everybody clocks off eventually.
    const SHIFT = {
        build:  [40, 25],
        inside: [22, 16],   // a spell indoors where nothing can eat you
        patrol: [26, 16],
        sit:    [24, 18],
        guard:  [34, 22],
        soccer: [26, 20],
        ride:   [20, 16],   // a few turns of the wheel, then off to find lunch
        shop:   [45, 15]    // only a backstop -- they leave once they're served
    };

    // The market: chickens queue up, buy a beakful and toddle off happy. It is
    // a trickle next to a sack of corn, but it is never nothing.
    const MARKET_STOCK = 20;          // sacks on the stall
    const MARKET_RESTOCK = 72;        // a fresh sack every 1.2s -- fast enough
                                      // to keep the queue actually moving
    const MARKET_MEAL = 0.14;         // roughly a dozen kernels' worth
    const MARKET_QUEUE = 4;

    const PROJECT_SPECS = [
        { id: 'coop',   key: 'coop',   need: 20,  x: 148,  y: 336, w: 78,  h: 108, crew: 4, work: 60 * 78,  name: 'HEN HOUSE' },
        { id: 'fire',   key: 'fire',   need: 40,  x: 1122, y: 470, w: 34,  h: 34,  crew: 3, work: 60 * 34,  name: 'CAMPFIRE'  },
        { id: 'market', key: 'market', need: 58,  x: 286,  y: 512, w: 58,  h: 92,  crew: 4, work: 60 * 92,  name: 'MARKET STALL' },
        { id: 'barn',   key: 'barn',   need: 78,  x: 432,  y: 320, w: 104, h: 132, crew: 6, work: 60 * 150, name: 'BARN'      },
        { id: 'house',  key: 'house',  need: 102, x: 1006, y: 330, w: 76,  h: 116, crew: 5, work: 60 * 118, name: 'HOUSE'     },
        { id: 'ride',   key: 'ride',   need: 132, x: 588,  y: 508, w: 66,  h: 106, crew: 5, work: 60 * 124, name: 'MERRY-GO-ROUND' },
        { id: 'castle', key: 'castle', need: 164, x: 752,  y: 372, w: 130, h: 132, crew: 8, work: 60 * 230, name: 'CASTLE'    },
        { id: 'ferris', key: 'ferris', need: 196, x: 906,  y: 556, w: 84,  h: 124, crew: 6, work: 60 * 168, name: 'FERRIS WHEEL' },
        { id: 'coast',  key: 'coast',  need: 216, x: 190,  y: 656, w: 88,  h: 100, crew: 6, work: 60 * 152, name: 'ROLLER COASTER' },
        { id: 'plane',  key: 'plane',  need: 244, x: 640,  y: 672, w: 86,  h: 52,  crew: 6, work: 60 * 140, name: 'AEROPLANE' },
    ];

    // ...and once they have one of everything they simply build MORE houses,
    // for as long as there is room in the yard for them. More houses means
    // more beds, and a hen in a bed is a hen nothing can eat.
    const EXTRA_KINDS = [
        { key: 'barn',   w: 104, h: 132, crew: 6, work: 60 * 120, name: 'BARN'      },
        { key: 'house',  w: 76,  h: 116, crew: 5, work: 60 * 100, name: 'HOUSE'     },
        { key: 'castle', w: 130, h: 132, crew: 8, work: 60 * 170, name: 'CASTLE'    },
        { key: 'coop',   w: 78,  h: 108, crew: 4, work: 60 * 70,  name: 'HEN HOUSE' },
    ];
    const EXTRA_FIRST = 268, EXTRA_STEP = 26;
    let extraBuilds = 0;

    // Somewhere in the yard with elbow room either side. Two rows, so the
    // farm fills up front-to-back rather than in one long line.
    function findSite(w) {
        const bands = [372, 470, 568];
        for (let t = 0; t < 90; t++) {
            let y = bands[(Math.random() * bands.length) | 0];
            let x = 120 + Math.random() * (canvas.width - 240);
            let clear = true;
            for (let pr of projects) {
                if (Math.abs(pr.y - y) < 80 && Math.abs(pr.x - x) < pr.spec.w + w + 54) { clear = false; break; }
            }
            if (clear) return { x: Math.round(x), y: y };
        }
        return null;   // yard's full for now -- it'll try again as things change
    }

    // The next thing worth starting, or null if it isn't time yet.
    function nextProject() {
        for (let spec of PROJECT_SPECS) {
            if (projects.some(pr => pr.id === spec.id)) continue;
            return chickens.length >= spec.need ? spec : null;   // strictly in order
        }
        if (chickens.length < EXTRA_FIRST + extraBuilds * EXTRA_STEP) return null;
        let kind = EXTRA_KINDS[extraBuilds % EXTRA_KINDS.length];
        let at = findSite(kind.w);
        if (!at) return null;
        extraBuilds++;
        return Object.assign({}, kind, { id: 'extra' + extraBuilds, need: 0, x: at.x, y: at.y, extra: true });
    }

    // "a barn", but "an aeroplane", and "another barn" for the later ones
    function projectWords(spec) {
        if (spec.extra) return 'ANOTHER ' + spec.name;
        return ('AEIOU'.includes(spec.name[0]) ? 'AN ' : 'A ') + spec.name;
    }

    // Let a chicken go back to being an ordinary chicken.
    function releaseJob(c) {
        if (!c || !c.job) return;
        let st = c.site;
        if (st) {
            for (let list of [st.crew, st.residents, st.patrol, st.sitters, st.riders, st.shoppers]) {
                let i = list.indexOf(c);
                if (i >= 0) list.splice(i, 1);
            }
        }
        let g = guards.indexOf(c); if (g >= 0) guards.splice(g, 1);
        c.job = null; c.site = null;
        c.hidden = false; c.safe = false;
        c.sitting = false; c.atPost = false;
        c.stayCd = 0; c.shopCd = 0;
        if (c.state !== 'exodus' && c.state !== 'toCoop') c.state = 'wander';
    }

    // --- Little chickens drawn by a building rather than by the flock ---
    function drawMiniChicken(x, y, s, dir, cycle, color) {
        ctx.save();
        ctx.translate(x, y - Math.abs(Math.sin(cycle)) * 1.8);
        ctx.scale(dir, 1);
        ctx.strokeStyle = '#ffa500'; ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.moveTo(-s * 0.2, s * 0.3); ctx.lineTo(-s * 0.2 + Math.sin(cycle) * s * 0.35, s * 0.85);
        ctx.moveTo(s * 0.2, s * 0.3);  ctx.lineTo(s * 0.2 - Math.sin(cycle) * s * 0.35, s * 0.85);
        ctx.stroke();
        ctx.fillStyle = color;
        ctx.beginPath();
        ctx.moveTo(s, 0); ctx.lineTo(-s * 0.8, -s * 0.7); ctx.lineTo(-s * 0.6, s * 0.5);
        ctx.closePath(); ctx.fill();
        ctx.fillStyle = '#ffa500';
        ctx.beginPath(); ctx.moveTo(s - 1, -1); ctx.lineTo(s + s * 0.45, 1); ctx.lineTo(s - 1, 3); ctx.fill();
        ctx.fillStyle = '#cc0000';
        ctx.beginPath();
        ctx.moveTo(s - s * 0.6, -s * 0.4); ctx.lineTo(s - s * 0.35, -s * 0.8); ctx.lineTo(s - s * 0.05, -s * 0.3);
        ctx.fill();
        ctx.fillStyle = '#000';
        ctx.fillRect(s - s * 0.5, -s * 0.22, 1.6, 1.6);
        ctx.restore();
    }

    // --- Site kit, drawn inside the chicken's own flipped transform ---
    function drawHardHat(s) {
        ctx.fillStyle = '#ffcc33';
        ctx.beginPath(); ctx.arc(s * 0.3, -s * 0.6, s * 0.42, Math.PI, 0); ctx.fill();
        ctx.fillRect(s * 0.3 - s * 0.6, -s * 0.64, s * 1.2, s * 0.15);
        ctx.fillStyle = '#e0a800';
        ctx.fillRect(s * 0.26, -s * 1.0, s * 0.09, s * 0.4);
    }
    function drawHelmet(s) {
        ctx.fillStyle = '#9aa4ae';
        ctx.beginPath(); ctx.arc(s * 0.3, -s * 0.58, s * 0.4, Math.PI, 0); ctx.fill();
        ctx.fillRect(s * 0.3 - s * 0.52, -s * 0.62, s * 1.04, s * 0.13);
        ctx.fillStyle = '#cc2222';
        ctx.fillRect(s * 0.25, -s * 1.06, s * 0.1, s * 0.46);
    }
    function drawTool(kind, s) {
        let u = s * 0.11;
        if (kind === 0) {                     // hammer
            ctx.strokeStyle = '#a9743d'; ctx.lineWidth = u * 1.4;
            ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(0, -u * 7); ctx.stroke();
            ctx.fillStyle = '#9aa4ae'; ctx.fillRect(-u * 2.4, -u * 9.6, u * 4.8, u * 2.6);
        } else if (kind === 1) {              // handsaw
            ctx.strokeStyle = '#a9743d'; ctx.lineWidth = u * 1.4;
            ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(0, -u * 3); ctx.stroke();
            ctx.fillStyle = '#c8d0d8';
            ctx.beginPath(); ctx.moveTo(-u, -u * 3); ctx.lineTo(u * 1.3, -u * 3);
            ctx.lineTo(u * 1.3, -u * 10); ctx.closePath(); ctx.fill();
        } else if (kind === 2) {              // a plank over the shoulder
            ctx.fillStyle = '#c69b5f'; ctx.fillRect(-u * 8, -u * 2.4, u * 16, u * 2.6);
            ctx.strokeStyle = '#a9743d'; ctx.lineWidth = 1;
            ctx.strokeRect(-u * 8, -u * 2.4, u * 16, u * 2.6);
        } else if (kind === 3) {              // paint roller
            ctx.strokeStyle = '#8a8a8a'; ctx.lineWidth = u * 1.2;
            ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(0, -u * 6); ctx.lineTo(u * 3, -u * 6); ctx.stroke();
            ctx.fillStyle = '#e85a4a'; ctx.fillRect(u * 2, -u * 8.6, u * 2.4, u * 4.6);
        } else {                              // enormous spanner
            ctx.strokeStyle = '#9aa4ae'; ctx.lineWidth = u * 1.8;
            ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(0, -u * 7); ctx.stroke();
            ctx.lineWidth = u * 1.1;
            ctx.beginPath(); ctx.arc(0, -u * 8.4, u * 1.9, 0.6, 5.7); ctx.stroke();
        }
    }
    function drawPitchfork(s) {
        let u = s * 0.13;
        ctx.strokeStyle = '#a9743d'; ctx.lineWidth = u * 1.2;
        ctx.beginPath(); ctx.moveTo(0, u * 4); ctx.lineTo(0, -u * 9); ctx.stroke();
        ctx.strokeStyle = '#c8d0d8'; ctx.lineWidth = u * 0.9;
        ctx.beginPath();
        ctx.moveTo(-u * 2.4, -u * 13); ctx.lineTo(-u * 2.4, -u * 9);
        ctx.moveTo(0, -u * 13.8); ctx.lineTo(0, -u * 9);
        ctx.moveTo(u * 2.4, -u * 13); ctx.lineTo(u * 2.4, -u * 9);
        ctx.moveTo(-u * 2.4, -u * 9.4); ctx.lineTo(u * 2.4, -u * 9.4);
        ctx.stroke();
    }
    function drawMarshmallow(s) {
        ctx.strokeStyle = '#8a6a3a'; ctx.lineWidth = 1.5;
        ctx.beginPath(); ctx.moveTo(s * 0.3, -s * 0.1); ctx.lineTo(s * 1.6, -s * 0.55); ctx.stroke();
        ctx.fillStyle = '#fff4e0';
        ctx.beginPath(); ctx.arc(s * 1.7, -s * 0.6, s * 0.25, 0, Math.PI * 2); ctx.fill();
    }

    // Coursed rubble masonry. Each block's shade comes from a hash of where
    // it sits, so the wall looks hand-laid but never flickers between frames.
    const STONE = ['#8e8e85', '#9b9b91', '#83837a', '#94948b', '#7c7c74', '#a0a096'];
    function stoneWall(x0, y0, w, h, seed) {
        ctx.fillStyle = '#63635c';                 // mortar showing through
        ctx.fillRect(x0, y0, w, h);
        const CH = 12, BW = 25;
        let rows = Math.ceil(h / CH);
        for (let r = 0; r < rows; r++) {
            let ry = y0 + r * CH;
            let rh = Math.min(CH, y0 + h - ry) - 1.3;
            if (rh <= 0.4) continue;
            let off = (r % 2) ? BW * 0.5 : 0;
            for (let bx = x0 - off; bx < x0 + w; bx += BW) {
                let px = Math.max(x0, bx);
                let pw = Math.min(bx + BW - 1.3, x0 + w) - px;
                if (pw <= 0.6) continue;
                let hsh = Math.sin((seed + r * 37 + Math.round(bx) * 13) * 12.9898) * 43758.5453;
                ctx.fillStyle = STONE[((hsh - Math.floor(hsh)) * STONE.length) | 0];
                ctx.fillRect(px, ry, pw, rh);
            }
        }
    }

    // The profile of a cute little wooden coaster, as heights around the
    // circuit: up the chain lift, a big drop, two smaller hills, home.
    const COASTER_KEYS = [
        [0.00, 0.00], [0.05, 0.09], [0.21, 1.00], [0.26, 0.97],
        [0.41, 0.20], [0.55, 0.63], [0.68, 0.16], [0.80, 0.40],
        [0.92, 0.05], [1.00, 0.00]
    ];
    function coasterHeight(t) {
        for (let i = 0; i < COASTER_KEYS.length - 1; i++) {
            let a = COASTER_KEYS[i], b = COASTER_KEYS[i + 1];
            if (t >= a[0] && t <= b[0]) {
                let k = (t - a[0]) / (b[0] - a[0]);
                let m = (1 - Math.cos(k * Math.PI)) / 2;   // ease in and out
                return a[1] + (b[1] - a[1]) * m;
            }
        }
        return 0;
    }
    // A closed circuit: out along the hills, home along the flat bottom run.
    function coasterTrack(W, H) {
        const N = 120;
        let pts = [];
        for (let i = 0; i < N; i++) {
            let u = i / N;
            if (u < 0.5) {
                let t = u / 0.5;
                let h = coasterHeight(t);
                pts.push({ x: -W + t * 2 * W, y: -12 - h * H, h: h });
            } else {
                let t = (u - 0.5) / 0.5;
                pts.push({ x: W - t * 2 * W, y: -12 - Math.sin(t * Math.PI) * 3, h: 0 });
            }
        }
        return pts;
    }

    // A properly flickery campfire, drawn in three layers
    function drawFlame(x, y, s, t) {
        ctx.globalAlpha = 0.2 + Math.sin(t * 0.21) * 0.06;
        ctx.fillStyle = '#ff9b3b';
        ctx.beginPath(); ctx.ellipse(x, y, 58 * s, 22 * s, 0, 0, Math.PI * 2); ctx.fill();
        ctx.globalAlpha = 1;
        const L = [['#c8380f', 1.0], ['#ff7b1c', 0.7], ['#ffd23b', 0.4]];
        for (let i = 0; i < L.length; i++) {
            let h = (34 + Math.sin(t * 0.33 + i * 1.7) * 7) * s * L[i][1];
            let w = 15 * s * L[i][1];
            let lean = Math.sin(t * 0.19 + i) * 5 * s;
            ctx.fillStyle = L[i][0];
            ctx.beginPath();
            ctx.moveTo(x - w, y);
            ctx.quadraticCurveTo(x - w * 0.7, y - h * 0.55, x + lean, y - h);
            ctx.quadraticCurveTo(x + w * 0.7, y - h * 0.55, x + w, y);
            ctx.closePath(); ctx.fill();
        }
    }

    class Project {
        constructor(spec) {
            this.spec = spec; this.key = spec.key; this.id = spec.id;
            this.x = spec.x; this.y = spec.y;
            this.work = 0;
            this.done = false;
            this.crew = []; this.residents = []; this.patrol = []; this.sitters = [];
            this.riders = []; this.shoppers = [];
            this.spin = Math.random() * 6.283;      // rides turn from wherever
            this.carU = Math.random();              // where the coaster train is
            this.track = null;                      // built the first time it's drawn
            this.stock = MARKET_STOCK;              // sacks of corn on the stall
            this.restock = 0;
            this.pop = 0;
            this.crane = Math.random() * 6;
        }
        get t() { return Math.min(1, this.work / this.spec.work); }

        // Where a worker (or a campfire sitter) should stand
        slotPos(i, sitting) {
            let n = sitting ? 6 : this.spec.crew;
            let a = (i / n) * Math.PI * 2 + (sitting ? 0.5 : 0.2);
            let rx = sitting ? 56 : this.spec.w + 26;
            let ry = sitting ? 24 : this.spec.h * 0.22 + 18;
            return { x: clampX(this.x + Math.cos(a) * rx), y: clampY(this.y + 16 + Math.sin(a) * ry) };
        }

        // Keep a named crew list topped up from whoever is free
        staff(list, job, max) {
            for (let i = list.length - 1; i >= 0; i--) {
                let c = list[i];
                if (c.dead || c.site !== this || c.job !== job) list.splice(i, 1);
            }
            if (list.length < max && frameCount % 10 === 0) {
                let n = chickens.length;
                for (let i = 0; i < 45 && list.length < max; i++) {
                    let c = chickens[(Math.random() * n) | 0];
                    if (!idleHen(c)) continue;
                    c.job = job; c.site = this;
                    c.releaseFood();
                    if (job === 'build') { c.tool = (Math.random() * 5) | 0; c.workCycle = Math.random() * 6; }
                    c.stayCd = 60 * (SHIFT[job][0] + Math.random() * SHIFT[job][1]);
                    // indoors means out of reach of anything with teeth
                    if (job === 'inside' || job === 'patrol') {
                        c.hidden = true; c.safe = true;
                        c.x = this.x; c.y = this.y - 2;   // they live here now
                    }
                    list.push(c);
                    puff(c.x, c.y - 14, 3, job === 'build' ? '#ffcc33' : '#ffffff', 1.1);
                }
            }
            for (let i = 0; i < list.length; i++) list[i].slot = i;
        }

        update() {
            if (this.pop > 0) this.pop--;
            if (!this.done) {
                this.staff(this.crew, 'build', this.spec.crew);
                let onSite = 0;
                for (let c of this.crew) if (c.atPost) onSite++;
                this.work += onSite;
                this.crane += 0.02;
                if (onSite > 0 && frameCount % 16 === 0) {
                    let a = Math.random() * Math.PI * 2;
                    puff(this.x + Math.cos(a) * this.spec.w * 0.8,
                         this.y + Math.sin(a) * 8, 2, '#ded0b4', 1.3);
                }
                if (this.work >= this.spec.work) this.finish();
            } else {
                if (this.key === 'barn') this.staff(this.residents, 'inside', 8);
                else if (this.key === 'house') this.staff(this.residents, 'inside', 6);
                else if (this.key === 'castle') {
                    this.staff(this.patrol, 'patrol', 6);
                    this.staff(this.residents, 'inside', 10);
                } else if (this.key === 'fire') this.staff(this.sitters, 'sit', 6);
                else if (this.key === 'ferris') { this.staff(this.riders, 'ride', 8); this.spin += 0.009; }
                else if (this.key === 'ride')   { this.staff(this.riders, 'ride', 6); this.spin += 0.016; }
                else if (this.key === 'coast') {
                    this.staff(this.riders, 'ride', 6);
                    // slow grind up the lift hill, then let gravity have it
                    if (!this.track) this.track = coasterTrack(this.spec.w, this.spec.h);
                    let h = this.trackAt(this.carU).h;
                    this.carU = (this.carU + 0.0010 + 0.0031 * (1 - h)) % 1;
                }
                else if (this.key === 'market') {
                    this.staff(this.shoppers, 'shop', MARKET_QUEUE);
                    if (this.stock < MARKET_STOCK && --this.restock <= 0) {
                        this.stock++; this.restock = MARKET_RESTOCK;
                    }
                }
                // sparks off the fire
                if (this.key === 'fire' && frameCount % 9 === 0) {
                    particles.push(new Particle(this.x + (Math.random() - 0.5) * 16, this.y - 6, {
                        z: 8, vx: (Math.random() - 0.5) * 0.5, vy: -0.1,
                        vz: 1.4 + Math.random(), gravity: -0.02, life: 45,
                        color: Math.random() > 0.5 ? '#ffd23b' : '#ff7b1c', size: 2
                    }));
                }
            }
        }

        finish() {
            this.done = true;
            this.pop = 70;
            for (let c of this.crew.slice()) releaseJob(c);
            this.crew.length = 0;
            showBanner('THEY BUILT ' + projectWords(this.spec) + '!', '#ffd23b');
            sndFanfare();
            addScore(500);
            spawnConfetti(45);
            puff(this.x, this.y, 26, '#fff2c8', 3.4);
            if (this.key === 'plane') plane = new Plane(this.x, this.y - 10);
        }

        // ---------------- drawing ----------------
        draw() {
            let sp = this.spec;
            if (!this.done) {
                let t = this.t;
                // the building rises out of the ground as the work goes in
                ctx.save();
                ctx.beginPath();
                ctx.rect(this.x - sp.w - 40, this.y - sp.h * t, (sp.w + 40) * 2, sp.h * t + 34);
                ctx.clip();
                this.drawBuilding();
                ctx.restore();
                this.drawScaffold(t);
                this.drawSign(t);
            } else {
                this.drawBuilding();
                this.drawLife();
                if (this.pop > 0) {
                    let a = this.pop / 70;
                    ctx.globalAlpha = a;
                    ctx.strokeStyle = '#ffe14d'; ctx.lineWidth = 3;
                    ctx.beginPath();
                    ctx.ellipse(this.x, this.y, (1 - a) * 160 + 30, ((1 - a) * 160 + 30) * 0.4, 0, 0, Math.PI * 2);
                    ctx.stroke();
