    // The goal, front and centre: score, a progress bar to victory, and the
    // lightning recharge so kids can see why P isn't firing.
    function drawGoalBar() {
        let cx = canvas.width / 2;

        // SCORE -- big, with a little bounce when it just went up
        ctx.textAlign = 'center';
        let s = 1 + scorePop * 0.25;
        ctx.save();
        ctx.translate(cx, 40);
        ctx.scale(s, s);
        ctx.font = 'bold 30px "Courier New", monospace';
        ctx.fillStyle = 'rgba(0,0,0,0.6)';
        ctx.fillText('SCORE ' + score, 2, 2);
        ctx.fillStyle = '#FFD700';
        ctx.fillText('SCORE ' + score, 0, 0);
        ctx.restore();

        // GOAL bar -- plump chickens toward the win
        let have = Math.min(WIN_PLUMP, plumpCount());
        let bw = 300, bh = 22, bx = cx - bw / 2, by = 92;
        ctx.font = 'bold 13px "Courier New", monospace';
        ctx.fillStyle = '#ffffff';
        ctx.fillText('GOAL: ' + WIN_PLUMP + ' PLUMP CHICKENS', cx, by - 6);
        // track
        ctx.fillStyle = 'rgba(0,0,0,0.45)';
        ctx.fillRect(bx - 2, by - 2, bw + 4, bh + 4);
        ctx.fillStyle = 'rgba(255,255,255,0.15)';
        ctx.fillRect(bx, by, bw, bh);
        // fill
        let fillW = bw * (have / WIN_PLUMP);
        ctx.fillStyle = '#8aff6b';
        ctx.fillRect(bx, by, fillW, bh);
        // segment ticks
        ctx.strokeStyle = 'rgba(0,0,0,0.35)'; ctx.lineWidth = 1;
        let tick = WIN_PLUMP > 30 ? 50 : 1;
        for (let i = tick; i < WIN_PLUMP; i += tick) {
            let x = bx + (bw / WIN_PLUMP) * i;
            ctx.beginPath(); ctx.moveTo(x, by); ctx.lineTo(x, by + bh); ctx.stroke();
        }
        ctx.fillStyle = '#123';
        ctx.font = 'bold 14px "Courier New", monospace';
        ctx.fillText(have + ' / ' + WIN_PLUMP, cx, by + bh - 6);

        // LIGHTNING recharge meter
        let lw = 200, lx = cx - lw / 2, ly = by + bh + 10, lh = 8;
        let ready = boltCd <= 0;
        ctx.fillStyle = 'rgba(0,0,0,0.45)';
        ctx.fillRect(lx - 2, ly - 2, lw + 4, lh + 4);
        ctx.fillStyle = 'rgba(255,255,255,0.15)';
        ctx.fillRect(lx, ly, lw, lh);
        let frac = ready ? 1 : 1 - boltCd / BOLT_COOLDOWN;
        ctx.fillStyle = ready ? '#9ad8ff' : '#4a7ba6';
        ctx.fillRect(lx, ly, lw * frac, lh);
        ctx.font = 'bold 11px "Courier New", monospace';
        if (ready) {
            ctx.fillStyle = (boltDeny > 0) ? '#ffffff' : '#9ad8ff';
            ctx.fillText('LIGHTNING READY  (press P)', cx, ly + lh + 12);
        } else {
            ctx.fillStyle = (boltDeny > 0 && Math.floor(frameCount / 4) % 2 === 0) ? '#ff8080' : '#bcdcf0';
            ctx.fillText('lightning charging... ' + Math.ceil(boltCd / 60) + 's', cx, ly + lh + 12);
        }

        // CORN handfuls -- a row of kernels that empty as you throw and refill
        // over time, so the player can see when to feed.
        let ky = ly + lh + 22, kn = CORN_MAG, kgap = 22, kx = cx - (kn - 1) * kgap / 2;
        ctx.font = 'bold 11px "Courier New", monospace';
        ctx.textAlign = 'right';
        ctx.fillStyle = (denyFlash > 0 && Math.floor(frameCount / 4) % 2 === 0) ? '#ff8080' : '#e0c060';
        ctx.fillText('CORN', kx - 16, ky + 5);
        ctx.textAlign = 'center';
        for (let i = 0; i < kn; i++) {
            let hx = kx + i * kgap, full = i < cornReady;
            // refilling kernel grows in
            let grow = (i === cornReady && cornReady < CORN_MAG) ? (1 - cornRefillCd / refillFrames()) : (full ? 1 : 0);
            ctx.globalAlpha = full ? 1 : (i === cornReady ? 0.35 + grow * 0.5 : 0.18);
            let r = 5 * (full ? 1 : Math.max(0.5, grow));
            ctx.fillStyle = full ? '#ffcc00' : '#b8a24a';
            ctx.beginPath(); ctx.ellipse(hx, ky, r, r * 1.3, 0, 0, Math.PI * 2); ctx.fill();
            ctx.globalAlpha = 1;
        }
        ctx.textAlign = 'left';
    }

    // Paint the unsafe patches onto the grass so it's obvious where NOT to feed.
    function drawHUD() {
        if (gameState === 'playing') drawGoalBar();

        ctx.font = 'bold 16px "Courier New", monospace';
        ctx.textAlign = 'right';
        let left = bagsLeft();
        let crazyN = 0;
        for (let c of chickens) if (c.crazy) crazyN++;
        let horsePlump = horses.length ? horses[0].plump : 0;
        // What the flock is up to right now
        let building = null, safeN = 0, jobN = 0;
        for (let pr of projects) {
            if (!pr.done && !building) building = pr;
            safeN += pr.residents.length + pr.patrol.length;
        }
        for (let c of chickens) if (c.job) jobN++;
        let nextUp = null;
        for (let spec of PROJECT_SPECS) {
            if (!projects.some(pr => pr.id === spec.id)) { nextUp = spec; break; }
        }
        let moreAt = EXTRA_FIRST + extraBuilds * EXTRA_STEP;
        let lines = [
            ['CHICKENS ' + chickens.length + (crazyN ? '  (' + crazyN + ' CRAZY)' : ''),
                crazyN ? '#ff6bcb' : '#FFD700'],
            ['PLUMP ' + plumpCount() + ' / ' + WIN_PLUMP, '#8aff6b'],
            ['CORN ' + left + '/' + CORN_MAG + '  (bags of ' + bagKernels() + ')',
                left > 0 ? '#FFD700' : '#ff8080'],
            ['EATEN ' + chickensLost + '   ZAPPED BY YOU ' + chickensVaporised,
                (chickensLost || chickensVaporised) ? '#ff8080' : '#FFD700'],
            ['SCARED OFF ' + foxesZapped + '   FLEW AWAY ' + crazyDeparted, '#9ad8ff'],
            ['AT WORK ' + jobN + '   SAFE INDOORS ' + safeN, '#ffd8a0'],
            [building ? 'BUILDING ' + building.spec.name + ' ' + Math.round(building.t * 100) + '%'
                      : 'NEXT BUILD AT ' + (nextUp ? nextUp.need : moreAt) + ' CHICKENS',
                building ? '#ffd23b' : '#c8d0d8'],
            ['HORSE: ' + horseSizeLabel(horsePlump), horsePlump > 0.75 ? '#ffb060' : '#e0b080']
        ];
        for (let i = 0; i < lines.length; i++) {
            let y = 26 + i * 18;
            ctx.fillStyle = 'rgba(0,0,0,0.6)';
            ctx.fillText(lines[i][0], canvas.width - 18, y + 2);
            ctx.fillStyle = lines[i][1];
            ctx.fillText(lines[i][0], canvas.width - 20, y);
        }

        // Countdown hints
        ctx.font = 'bold 12px "Courier New", monospace';
        let toEgg = Math.ceil((EGG_SPAWN_FRAMES - (frameCount % EGG_SPAWN_FRAMES)) / 60);
        let toPred = Math.max(0, Math.ceil((nextPredAt - frameCount) / 60));
        ctx.fillStyle = 'rgba(255,255,255,0.9)';
        ctx.fillText('egg in ' + toEgg + 's   trouble in ' + toPred + 's', canvas.width - 20, 190);
        if (left < CORN_MAG) {
            ctx.fillStyle = '#ffb0b0';
            ctx.fillText('more corn in ' + Math.ceil(cornRefillCd / 60) + 's', canvas.width - 20, 206);
        }
        ctx.textAlign = 'left';

        // Big event announcement
        if (banner) {
            banner.life--;
            if (banner.life <= 0) { banner = null; }
            else {
                let t = banner.life / banner.maxLife;
                let pop = t > 0.85 ? (1 - t) / 0.15 : 1; // quick scale-in
                ctx.save();
                ctx.textAlign = 'center';
                ctx.translate(canvas.width / 2, horizonY + 90);
                ctx.scale(0.7 + 0.3 * pop, 0.7 + 0.3 * pop);
                ctx.globalAlpha = Math.min(1, t * 3);
                ctx.font = 'bold 30px "Courier New", monospace';
                ctx.fillStyle = 'rgba(0,0,0,0.65)';
                ctx.fillText(banner.text, 3, 3);
                ctx.fillStyle = banner.color;
                ctx.fillText(banner.text, 0, 0);
                ctx.restore();
                ctx.textAlign = 'left';
                ctx.globalAlpha = 1;
            }
        }

        // "Out of corn" nag, centred
        if (denyFlash > 0) {
            ctx.textAlign = 'center';
            ctx.font = 'bold 20px "Courier New", monospace';
            ctx.globalAlpha = Math.min(1, denyFlash / 25);
            ctx.fillStyle = 'rgba(0,0,0,0.7)';
            ctx.fillText('OUT OF CORN!', canvas.width / 2 + 2, horizonY + 152);
            ctx.fillStyle = '#ffd0d0';
            ctx.fillText('OUT OF CORN!', canvas.width / 2, horizonY + 150);
            ctx.globalAlpha = 1;
            ctx.textAlign = 'left';
        }

        // The loser's screen
        if (gameState === 'lost') {
            let cx = canvas.width / 2, cy = canvas.height / 2;
            ctx.save();
            ctx.fillStyle = 'rgba(20,0,0,0.45)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.textAlign = 'center';
            ctx.font = 'bold 60px "Courier New", monospace';
            ctx.fillStyle = 'rgba(0,0,0,0.6)';
            ctx.fillText('THE FLOCK IS GONE', cx + 3, cy - 47);
            ctx.fillStyle = '#ff8080';
            ctx.fillText('THE FLOCK IS GONE', cx, cy - 50);
            ctx.font = 'bold 24px "Courier New", monospace';
            ctx.fillStyle = '#ffffff';
            ctx.fillText('Zap the predators with lightning to scare them off!', cx, cy + 4);
            ctx.font = 'bold 30px "Courier New", monospace';
            ctx.fillStyle = '#FFD700';
            ctx.fillText('SCORE: ' + score, cx, cy + 48);
            if (endScreenReady()) {
                let p = 0.6 + 0.4 * Math.sin(frameCount * 0.08);
                ctx.globalAlpha = p;
                ctx.font = 'bold 22px "Courier New", monospace';
                ctx.fillStyle = '#ffd23b';
                ctx.fillText('press SPACE or CLICK to try again', cx, cy + 96);
                ctx.globalAlpha = 1;
            }
            ctx.textAlign = 'left';
            ctx.restore();
        }

        // The winner's screen
        if (gameState === 'won') {
            let cx = canvas.width / 2, cy = canvas.height / 2;
            ctx.textAlign = 'center';
            let bob = Math.sin(frameCount * 0.05) * 6;
            ctx.save();
            ctx.translate(cx, cy - 60 + bob);
            ctx.font = 'bold 72px "Courier New", monospace';
            ctx.fillStyle = 'rgba(0,0,0,0.6)';
            ctx.fillText('YOU WIN!', 4, 4);
            ctx.fillStyle = '#FFD700';
            ctx.fillText('YOU WIN!', 0, 0);
            ctx.restore();

            ctx.font = 'bold 30px "Courier New", monospace';
            ctx.fillStyle = '#ffffff';
            ctx.fillText('All the chickens are safe in the coop!', cx, cy + 10);

            ctx.font = 'bold 34px "Courier New", monospace';
            ctx.fillStyle = '#8aff6b';
            ctx.fillText('FINAL SCORE: ' + score, cx, cy + 56);

            // gentle pulsing "play again" prompt, once tapping actually works
            if (endScreenReady()) {
                let p = 0.6 + 0.4 * Math.sin(frameCount * 0.08);
                ctx.globalAlpha = p;
                ctx.font = 'bold 22px "Courier New", monospace';
                ctx.fillStyle = '#ffd23b';
                ctx.fillText('press SPACE or CLICK to play again', cx, cy + 104);
                ctx.globalAlpha = 1;
            }
            ctx.textAlign = 'left';
        }
    }

    // --- MAIN LOGIC ---

    // Seed a fresh farm: 1 cow, 1 horse, a small spread-out flock.
    function seedWorld() {
        cows.push(new Cow(canvas.width * 0.3, canvas.height * 0.7));
        horses.push(new Horse(canvas.width * 0.65, canvas.height * 0.5));
        const startCount = 4;
        for (let i = 0; i < startCount; i++) {
            let band = (playArea.maxX - playArea.minX) / startCount;
            chickens.push(new Chicken(
                playArea.minX + band * (i + 0.15 + Math.random() * 0.7),
                playArea.minY + Math.random() * (playArea.maxY - playArea.minY),
                1.0
            ));
        }
    }

    function init() {
        seedWorld();
        requestAnimationFrame(gameLoop);
    }

    // Browsers won't let audio start until the player interacts
    // NB: audio deliberately starts when a difficulty is chosen, not on any
    // stray click -- otherwise the picker would dismiss itself.

    window.addEventListener('keydown', (e) => {
        if (!gameStarted) { beginGame(); e.preventDefault(); return; }
        if (e.code === 'KeyM') {
            e.preventDefault();
            soundOn = !soundOn;
            if (masterGain) masterGain.gain.value = soundOn ? 0.9 : 0;
            if (!soundOn) stopVictory();
            updateMusic();          // muting everything stops the music too
            return;
        }
        if (e.code === 'KeyN') {    // music on/off (starts off)
            e.preventDefault();
            toggleMusic();
            return;
        }
        if (e.code === 'Space') {
            e.preventDefault();
            // Guard key-repeat FIRST -- otherwise holding space on the win
            // screen would restart the game dozens of times a second.
            if (e.repeat) return;
            if (gameState === 'won' || gameState === 'lost') { if (endScreenReady()) restartGame(); return; }
            spaceHeld = true;       // hold to keep feeding at the capped rate
            throwCorn();            // immediate throw for a responsive first tap
        } else if (e.code === 'KeyP') {
            e.preventDefault();
            if (gameState === 'playing' && !strikeLightning()) {
                boltDeny = 45; // pressed while still charging
                sndDud();
            }
        } else if (e.code === 'KeyF') {
            e.preventDefault();
            let stage = document.getElementById('game-container');
            if (!document.fullscreenElement) {
                if (stage.requestFullscreen) stage.requestFullscreen();
                else if (stage.webkitRequestFullscreen) stage.webkitRequestFullscreen();
            } else {
                if (document.exitFullscreen) document.exitFullscreen();
                else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
            }
        }
    });

    // --- Mouse: aim and place the corn ---
    canvas.addEventListener('mousemove', (e) => {
        let p = canvasPos(e);
        rawMouseX = p.x; rawMouseY = p.y;
    });
    canvas.addEventListener('mouseleave', () => { rawMouseX = -999; rawMouseY = -999; });
    canvas.addEventListener('mousedown', (e) => {
        initAudio();
        if (e.button !== 0) return;
        e.preventDefault();
        let p = canvasPos(e);
        if (!gameStarted) { beginGame(); return; }
        // buttons take priority over everything else
        if (inBoltBtn(p.x, p.y)) { pressBolt(); return; }
        if (inMusicBtn(p.x, p.y)) { toggleMusic(); return; }
        if (gameState === 'won' || gameState === 'lost') { if (endScreenReady()) restartGame(); return; }
        throwCorn();
    });
    // Touch: same thing, so it works on a tablet
    canvas.addEventListener('touchstart', (e) => {
        initAudio();
        if (!e.touches.length) return;
        e.preventDefault();
        let t = e.touches[0];
        let r = canvas.getBoundingClientRect();
        let rx = (t.clientX - r.left) * (canvas.width / r.width);
        let ry = (t.clientY - r.top) * (canvas.height / r.height);
        if (!gameStarted) { beginGame(); return; }
        if (inBoltBtn(rx, ry)) { pressBolt(); return; }
        if (inMusicBtn(rx, ry)) { toggleMusic(); return; }
        if (gameState === 'won' || gameState === 'lost') { if (endScreenReady()) restartGame(); return; }
        throwCorn();
    }, { passive: false });

    window.addEventListener('keyup', (e) => {
        if (e.code === 'Space') spaceHeld = false;
    });
    // If focus is lost mid-hold, stop feeding
    window.addEventListener('blur', () => { spaceHeld = false; });

    function gameLoop() {
        // Draw the whole scene into the low-res buffer using logical 800x600 coords
        ctx.setTransform(1 / PIXEL, 0, 0, 1 / PIXEL, 0, 0);
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        drawBackground();
        // Ground-level hazards paint onto the grass, under everything else

        frameCount++;

        // Sky birds keep drifting even after you win -- pure scenery
        if (frameCount >= nextFlockAt) {
            spawnFlock();
            nextFlockAt = frameCount + 60 * (6 + Math.random() * 10);
        }

        // Hazards, hatching and the goal check only run during active play.
        if (gameState === 'playing') {

        // You win the moment you have enough plump chickens
        if (plumpCount() >= WIN_PLUMP) startWin();

        // Spawn Mechanics
        if (frameCount % EGG_SPAWN_FRAMES === 0) {
            // A chicken lays it where it stands, if there is anyone left to lay it
            let layer = chickens.length > 0 ? chickens[Math.floor(Math.random() * chickens.length)] : null;
            if (chickens.length + eggs.length < CHICKEN_CAP) {
                let e = new Egg(
                    layer ? layer.x : playArea.minX + Math.random() * (playArea.maxX - playArea.minX),
                    layer ? layer.y : playArea.minY + Math.random() * (playArea.maxY - playArea.minY)
                );
                e.crazy = crazyEra() && Math.random() < CRAZY_HATCH;
                eggs.push(e);
            }
        }
        // Something hungry turns up on a timer -- more of them, more often,
        // the bigger the flock gets.
        if (frameCount >= nextPredAt) {
            spawnPredatorWave();
            nextPredAt = frameCount + 60 * (19 + Math.random() * 13);
        }
        // A bear specifically, so the crazy ones always have someone to leave with
        if (frameCount >= nextBearAt) {
            if (predators.length < PRED_MAX) { predators.push(new Bear()); sndGrowl(); }
            nextBearAt = frameCount + 60 * (45 + Math.random() * 50);
        }
        // A new clump of grass sprouts somewhere with elbow room
        if (frameCount >= nextGrassAt) {
            trySpawnGrass();
            nextGrassAt = frameCount + 60 * (3 + Math.random() * 4);
        }

        // The farmer stomps in to shout about something. He is harmless.
        if (frameCount >= nextFarmerAt) {
            if (farmers.length === 0) farmers.push(new Farmer());
            nextFarmerAt = frameCount + 60 * (48 + Math.random() * 40);
        }

        // Fifty hungry beaks means bigger sacks of corn
        if (!bigSackAnnounced && chickens.length >= BIG_SACK_AT) {
            bigSackAnnounced = true;
            showBanner('BIGGER SACKS OF CORN!', '#ffd23b');
            sndSparkle();
        }

        // Everything the flock has decided to do with its spare time
        updateProjects();

        // And every so often, rabbits. Simply hundreds of rabbits.
        if (frameCount >= nextStampedeAt) {
            triggerRabbitStampede();
            nextStampedeAt = frameCount + 60 * (48 + Math.random() * 42);
        }
        // Lose: the whole flock is gone and nothing left to hatch
        if (chickens.length === 0 && eggs.length === 0) {
            gameState = 'lost';
            endScreenAt = frameCount;
            showBanner('ALL YOUR CHICKENS ARE GONE', '#ff8080');
        }
        // Two minutes in: every hen lays at once, and what hatches isn't normal
        if (!eggBoomDone && gameAge() >= EGG_BOOM_FRAME) {
            eggBoomDone = true;
            for (let c of chickens) {
                let e = new Egg(c.x, c.y);
                e.crazy = Math.random() < 0.5;
                eggs.push(e);
                puff(c.x, c.y, 9, '#ffd6f5', 1.8);
            }
            if (chickens.length > 0) {
                showBanner('THE FLOCK LAYS!', '#ffd700',
                    'The whole flock is laying eggs! Something funny is going to hatch.');
                sndSparkle();
            }
        }

        // From here on, every egg laid hatches something unhinged
        if (!crazyEraAnnounced && crazyEra()) {
            crazyEraAnnounced = true;
            showBanner('THE FLOCK HAS TURNED', '#ff6bcb',
                'Now every egg hatches a crazy chicken!');
            sndSparkle();
        }

        // Overgrown field? Here come the rabbits, all of them.
        if (swarmCd > 0) swarmCd--;
        if (swarmCd <= 0 && grasses.length >= GRASS_MAX) {
            triggerRabbitSwarm();
            swarmCd = 60 * 50;
        }

        // Flies home in on any pat that's had a few seconds to ripen
        if (frameCount >= nextFlyAt) {
            nextFlyAt = frameCount + 40 + Math.random() * 50;
            if (flies.length < FLY_MAX) {
                let pat = poops.find(p => p.active && p.age > 120 &&
                    flies.filter(f => f.target === p && f.state !== 'leaving').length < FLY_PER_POOP);
                if (pat) flies.push(new Fly(pat));
            }
        }
        // Word gets around: once there's more than 3 clumps going, rabbits raid it
        if (frameCount >= nextRabbitAt) {
            if (grasses.length > RABBIT_THRESHOLD && rabbits.length < RABBIT_MAX) {
                rabbits.push(new Rabbit());
                nextRabbitAt = frameCount + 60 * (9 + Math.random() * 12);
            } else {
                nextRabbitAt = frameCount + 60; // check again shortly
            }
        }

        // Nag about hungry birds now and then -- the main thing a kid needs to know
        if (hungryNagCd > 0) hungryNagCd--;
        if (hungryNagCd <= 0 && chickens.some(c => c.hunger > HUNGER_WARN)) {
            hungryNagCd = 60 * 16;
        }

        } // end gameState === 'playing'

        // Victory sequence: keep confetti going, and once the whole flock is
        // safely in the coop, declare the win.
        if (gameState === 'winning') {
            if (frameCount % 4 === 0) spawnConfetti(3);
            if (chickens.length === 0 || ++winHoldTimer > 60 * 11) finishWin();
        } else if (gameState === 'won') {
            if (frameCount % 10 === 0) spawnConfetti(4);
        }
        if (gameState !== 'playing') updateConfetti();
        if (plane) plane.update();   // it just keeps going, win or lose

        // Corn: refill the magazine on a timer, and if space is held keep
        // throwing at the capped rate (a steady feed, never a flood).
        if (cornThrowCd > 0) cornThrowCd--;
        if (cornReady < CORN_MAG) {
            if (--cornRefillCd <= 0) { cornReady++; cornRefillCd = refillFrames(); }
        } else {
            cornRefillCd = refillFrames();
        }
        if (spaceHeld && gameState === 'playing') throwCorn();

        // Swap between the calm tune and the crazy-chicken theme as they
        // come and go. Cheap check, a couple of times a second is plenty.
        if (musicOn && frameCount % 20 === 0) {
            let wantCrazy = crazyOnTheLoose();
            if ((wantCrazy && musicPlayingEl !== musicCrazyEl) ||
                (!wantCrazy && musicPlayingEl !== musicCalmEl)) updateMusic();
        }

        if (boltCd > 0) boltCd--;
        if (denyFlash > 0) denyFlash--;
        if (boltDeny > 0) boltDeny--;
        if (scorePop > 0) scorePop = Math.max(0, scorePop - 0.06);
        if (flash > 0) flash = Math.max(0, flash - 0.08);

        // Clean up arrays
        foods = foods.filter(f => !f.consumed);
        bags = bags.filter(b => b.active);
        eggs = eggs.filter(e => e.active);
        chickens = chickens.filter(c => !c.dead);
        predators = predators.filter(p => p.active);
        particles = particles.filter(p => p.active);
        skyBirds = skyBirds.filter(b => b.active);
        bolts = bolts.filter(b => b.active);
        grasses = grasses.filter(g => !g.eaten);
        rabbits = rabbits.filter(r => r.active);
        poops = poops.filter(p => p.active);
        flies = flies.filter(f => f.active);
        farmers = farmers.filter(f => f.active);
        for (let a of angels) { a.life--; a.z += 0.55; a.wob += 0.07; }
        angels = angels.filter(a => a.life > 0);
        for (let sc of scorches) sc.life--;
        scorches = scorches.filter(sc => sc.life > 0);

        // Rebuild the lookup grids before anybody consults them
        gridBuild(henGrid, chickens, HEN_CELL);
        gridBuild(cornGrid, foods, CORN_CELL);

        // Update
        foods.forEach(f => f.update());
        bags.forEach(b => b.update());
        eggs.forEach(e => e.update());
        chickens.forEach(c => c.update());
        horses.forEach(h => h.update());
        cows.forEach(c => c.update());
        predators.forEach(p => p.update());
        skyBirds.forEach(b => b.update());
        bolts.forEach(b => b.update());
        grasses.forEach(g => g.update());
        rabbits.forEach(r => r.update());
        poops.forEach(p => p.update());
        flies.forEach(f => f.update());
        farmers.forEach(f => f.update());
        particles.forEach(p => p.update());

        // Scorch marks from the lightning, painted onto the grass
        drawScorches();

        // Y-Sort rendering. Chickens tucked up inside a building are drawn by
        // that building, so they are left out of the sort.
        let onField = [];
        for (let i = 0; i < chickens.length; i++) if (!chickens[i].hidden) onField.push(chickens[i]);
        let renderables = [...poops, ...grasses, ...foods, ...bags, ...eggs, ...flies, ...onField,
                           ...rabbits, ...horses, ...cows, ...predators, ...farmers, ...projects];
        if (coop) renderables.push(coop);
        if (ball) renderables.push(ball);
        renderables.sort((a, b) => a.y - b.y);
        renderables.forEach(entity => entity.draw());

        // Particles ride on top
        particles.forEach(p => p.draw());
        drawAngels();
        if (plane) plane.draw();

        // Confetti falls in front of everything
        if (confetti.length) drawConfetti();

        // Lightning over everything, then the flash of the strike
        bolts.forEach(b => b.draw());
        if (flash > 0) {
            ctx.fillStyle = 'rgba(255,255,255,' + (flash * 0.55) + ')';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        drawTitle();
        drawHUD();
        drawBoltButton();
        drawMusicButton();
        if (!gameStarted) drawStartGate();

        // Blit the buffer up to full size with no smoothing => crunchy pixels
        screenCtx.setTransform(1, 0, 0, 1, 0, 0);
        screenCtx.imageSmoothingEnabled = false;
        screenCtx.clearRect(0, 0, canvas.width, canvas.height);
        screenCtx.drawImage(buffer, 0, 0, canvas.width, canvas.height);

        requestAnimationFrame(gameLoop);
    }

    init();
</script>

</body>
